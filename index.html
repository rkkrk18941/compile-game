<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0e0e11">
<title>COMPILE — Pro Edition</title>
<style>

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --gold:#c9a2ff; }
  html,body{height:100%;}
  body{
    background:#0e0e11;
    background-image:
      radial-gradient(ellipse at 50% 0%, #1a1a20 0%, #0e0e11 60%),
      repeating-linear-gradient(45deg, rgba(255,255,255,.01) 0 2px, transparent 2px 4px);
    color:#cfcfd6; font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",system-ui,sans-serif;
    height:100dvh; display:flex; flex-direction:column; overflow:hidden; user-select:none; -webkit-user-select:none;
  }

  .pile{ display:flex; flex-direction:column; align-items:center; gap:2px; }
  .pile .p{ width:34px; height:46px; border-radius:4px; display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:900; color:#e8e2ff; }
  .pile .lbl{ font-size:8px; letter-spacing:.15em; color:#7a7a88; }
  .p.deck{ background:radial-gradient(60% 50% at 50% 45%, #1b1440, #0b0818);
    border:1px solid rgba(180,160,255,.4); box-shadow:2px 2px 0 #0b0818, 3px 3px 0 rgba(180,160,255,.25); }
  .p.trash{ background:#14141a; border:1px dashed rgba(255,255,255,.25); color:#8f8fa0; }

  .bar{ display:flex; align-items:center; gap:12px; padding:4px 12px; flex:0 0 auto; }
  .bar.opp{ justify-content:space-between; }
  .opphand{ display:flex; }
  .opphand .b{ width:26px; height:38px; border-radius:3px; margin-left:-14px;
    background:radial-gradient(60% 50% at 50% 45%, #1b1440, #0b0818);
    border:1px solid rgba(180,160,255,.35); transform:rotate(var(--r)); }
  .opphand .b:first-child{ margin-left:0; }
  .oppname{ font-size:10px; letter-spacing:.2em; color:#8f8fa0; }

  .field{ flex:1; display:grid; grid-template-rows:1fr auto auto auto 1fr; padding:2px 8px; min-height:0; }
  .stackrow{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; min-height:0; }
  .protorow{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:3px 0; }

  .proto{ height:42px; border-radius:6px; position:relative; cursor:pointer; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    background:linear-gradient(150deg, var(--a), var(--b));
    border:1px solid rgba(255,255,255,.4); box-shadow:0 4px 12px -6px rgba(0,0,0,.8); }
  .proto .nm{ font-family:"Arial Black",sans-serif; font-size:10.5px; font-weight:900; color:#fff;
    letter-spacing:.1em; text-shadow:0 0 6px rgba(0,0,0,.6); }
  .proto .bar2{ width:56%; height:5px; border:1px solid rgba(255,255,255,.55); display:flex; gap:1px; padding:1px;}
  .proto .bar2 i{ flex:1; background:rgba(255,255,255,.85); animation:load 1.4s infinite alternate;}
  .proto .bar2 i:nth-child(2){animation-delay:.25s} .proto .bar2 i:nth-child(3){animation-delay:.5s; background:rgba(255,255,255,.3);}
  @keyframes load{ from{opacity:.25} to{opacity:1} }
  .proto .stamp{ font-family:monospace; font-size:7px; letter-spacing:.28em; color:#fff;
    border:1px solid rgba(255,255,255,.85); padding:0 7px; background:rgba(255,255,255,.14); }
  .proto.done{ box-shadow:0 0 16px var(--b), inset 0 0 14px rgba(255,255,255,.28); }
  .proto .corner{ position:absolute; inset:3px; border:1px solid rgba(255,255,255,.22); pointer-events:none;}

  .stack{ position:relative; display:flex; flex-direction:column; min-height:0;
    justify-content:flex-start; overflow:hidden; border-radius:6px; padding:2px; cursor:pointer; }
  .stack.mine{ justify-content:flex-end; }
  .stack:active{ background:rgba(255,255,255,.03); }
  .total{ position:absolute; z-index:5; right:4px; font-family:monospace; font-size:11px; font-weight:700;
    color:#fff; background:rgba(10,8,20,.8); border:1px solid rgba(255,255,255,.4); padding:1px 6px; border-radius:3px; }
  .stack.opp .total{ top:4px; } .stack.mine .total{ bottom:4px; }
  .total.win{ border-color:var(--gold); color:var(--gold); box-shadow:0 0 8px rgba(201,162,255,.4); }

  .tag{ flex:0 0 auto; font-family:monospace; font-size:7px; font-weight:700; letter-spacing:.05em;
    border:1px solid rgba(255,255,255,.55); padding:0 3px; border-radius:2px; color:#fff; background:rgba(0,0,0,.25);}
  .tag.val{ font-size:8.5px; border-color:#fff; background:rgba(255,255,255,.14); }

  .strip{ height:19px; border-radius:3px 3px 0 0; margin-bottom:-2px; position:relative; z-index:1;
    background:linear-gradient(150deg, var(--a), var(--b));
    border:1px solid rgba(255,255,255,.35); border-bottom:none;
    display:flex; align-items:center; gap:4px; padding:0 5px;
    font-size:7.5px; font-weight:700; color:rgba(255,255,255,.92); white-space:nowrap; overflow:hidden; }
  .strip .txt{ overflow:hidden; text-overflow:ellipsis; }
  .strip.fd{ background:repeating-linear-gradient(135deg,#171034 0 6px,#0f0a22 6px 12px);
    border-color:rgba(180,160,255,.4); color:rgba(200,190,255,.75); font-family:monospace; letter-spacing:.1em; }

  .minicard{ position:relative; z-index:2; border-radius:4px;
    background:linear-gradient(160deg, var(--a), var(--b) 80%);
    border:1px solid rgba(255,255,255,.5); padding:4px 5px;
    box-shadow:0 6px 14px -6px rgba(0,0,0,.9); }
  .minicard .head{ display:flex; align-items:center; gap:4px; margin-bottom:2px;}
  .minicard .nm{ font-family:"Arial Black",sans-serif; font-size:9px; font-weight:900; color:#fff;}
  .minicard .vv{ margin-left:auto; font-family:monospace; font-size:12px; font-weight:900; color:#fff;
    border:1px solid rgba(255,255,255,.7); padding:0 5px; background:rgba(255,255,255,.12);}
  .minicard .row{ display:flex; align-items:center; gap:3px; font-size:7px; line-height:1.35;
    color:rgba(255,255,255,.92); margin-top:1.5px; }
  .minicard .row .t{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .minicard .row.none{ opacity:.35; }
  .minicard.fd{ background:radial-gradient(70% 60% at 50% 45%, #1b1440, #0b0818);
    border-color:rgba(180,160,255,.5); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:2px; min-height:46px;}
  .minicard.fd .fdv{ font-family:monospace; font-size:14px; font-weight:900; color:#cfc2ff;
    border:1px solid rgba(180,160,255,.6); padding:0 6px; background:rgba(20,12,50,.7);}
  .minicard.fd small{ font-size:7px; letter-spacing:.3em; color:rgba(200,190,255,.5); font-family:monospace;}
  .empty-slot{ flex:0 0 40px; border:1px dashed rgba(255,255,255,.15); border-radius:4px;
    display:flex; align-items:center; justify-content:center; font-size:8px; color:#4a4a55; letter-spacing:.2em; }

  .ctrlrow{ display:flex; justify-content:center; align-items:center; height:40px; position:relative; }
  .ctrl{ width:88px; height:30px; cursor:pointer;
    clip-path:polygon(10px 0,calc(100% - 10px) 0,100% 50%,calc(100% - 10px) 100%,10px 100%,0 50%);
    background:linear-gradient(120deg,#2a2440,#3d3560,#2a2440);
    border:1px solid rgba(201,162,255,.6);
    display:flex; align-items:center; justify-content:center;
    font-family:monospace; font-size:8.5px; letter-spacing:.24em; color:#d8ccff;
    box-shadow:0 0 12px rgba(160,130,255,.35);
    transition:transform .4s cubic-bezier(.3,.9,.3,1); }
  .ctrl.opp{ transform:translateY(-34px); box-shadow:0 0 14px rgba(255,110,110,.5); border-color:#ff9a9a;}
  .ctrl.mine{ transform:translateY(34px); box-shadow:0 0 14px rgba(120,255,180,.5); border-color:#8af0b0;}
  .ctrl-lbl{ position:absolute; right:12px; font-size:8px; color:#6a6a78; letter-spacing:.15em; }

  .phase{ display:flex; gap:3px; flex:1; justify-content:center; flex-wrap:wrap;}
  .phase span{ font-size:8px; letter-spacing:.08em; padding:3px 6px; color:#5f5f6c;
    border:1px solid #2c2c34; clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%); }
  .phase span.now{ color:#0e0e11; background:var(--gold); border-color:var(--gold); font-weight:900;}
  .actions{ display:flex; gap:6px; flex-wrap:wrap; justify-content:center;}
  .actions button{ font-family:inherit; font-size:10px; letter-spacing:.08em; font-weight:700;
    padding:6px 11px; color:#e8e2ff; background:rgba(255,255,255,.06);
    border:1px solid rgba(201,162,255,.5); cursor:pointer;
    clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px); }
  .actions button.view{ border-color:rgba(120,220,255,.55); }
  .actions button:active{ background:rgba(201,162,255,.25); }

  .hand{ flex:0 0 auto; display:flex; justify-content:center; align-items:flex-end;
    padding:4px 8px calc(10px + env(safe-area-inset-bottom)); height:112px; }
  .hcard{ width:68px; height:94px; border-radius:6px; margin:0 -10px; position:relative;
    background:linear-gradient(160deg, var(--a), var(--b) 80%);
    border:1px solid rgba(255,255,255,.55); padding:5px 5px 4px;
    transform:rotate(var(--r)) translateY(var(--y));
    box-shadow:0 8px 18px -8px rgba(0,0,0,.9); transition:transform .18s; cursor:pointer; }
  .hcard:active{ transform:rotate(0) translateY(-18px) scale(1.08); z-index:9; }
  .hcard .head{ display:flex; align-items:center; }
  .hcard .nm{ font-family:"Arial Black",sans-serif; font-size:7.5px; color:#fff; font-weight:900;}
  .hcard .vv{ margin-left:auto; font-family:monospace; font-size:12px; font-weight:900;
    color:#fff; border:1px solid rgba(255,255,255,.7); padding:0 4px; background:rgba(0,0,0,.3);}
  .hcard .row{ display:flex; gap:2px; font-size:6.4px; line-height:1.3; color:rgba(255,255,255,.92); margin-top:2.5px;}
  .hcard .row .t{ display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
  .hcard .row.none{ opacity:.35; }
  .hcard .tag{ font-size:6px; padding:0 2px; }

  /* ==== オーバーレイ ==== */
  .overlay{ position:fixed; inset:0; background:rgba(8,8,12,.94); z-index:50;
    display:none; flex-direction:column; padding:16px 10px calc(14px + env(safe-area-inset-bottom)); }
  .overlay.show{ display:flex; }
  .overlay h3{ font-size:11px; letter-spacing:.3em; color:#9a9aa8; margin:0 6px 8px; font-weight:600;}
  .overlay .list{ flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; align-items:center; width:100%;}
  .sechead{ width:100%; font-size:10px; letter-spacing:.2em; color:#9a9aa8;
    border-bottom:1px solid #26262e; padding:6px 6px 4px; display:flex; gap:8px; align-items:baseline;}
  .sechead b{ color:#e8e2ff; font-weight:700; }
  .sechead .tt{ margin-left:auto; font-family:monospace; color:var(--gold); }
  .ovgrid{ display:flex; flex-wrap:wrap; gap:10px 8px; justify-content:center; width:100%; }
  .ovmini{ display:flex; flex-direction:column; align-items:center; gap:3px; }
  .ovmini .st{ font-size:8px; font-family:monospace; letter-spacing:.06em; color:#cfc2ff;
    border:1px dashed rgba(180,160,255,.4); padding:1px 7px; background:rgba(20,12,50,.5); max-width:44vw; text-align:center;}
  .ovmini .st.warn{ color:#ffcf9a; border-color:rgba(255,190,120,.4); }
  .ovitem{ display:flex; flex-direction:column; align-items:center; gap:6px; flex:0 0 auto;}
  .ovitem .st{ font-size:9.5px; font-family:monospace; letter-spacing:.1em; color:#cfc2ff;
    border:1px dashed rgba(180,160,255,.45); padding:3px 10px; background:rgba(20,12,50,.5);}
  .ovitem .st.warn{ color:#ffcf9a; border-color:rgba(255,190,120,.45);}
  .overlay .close{ margin-top:8px; align-self:center; font-family:inherit; font-size:11px; letter-spacing:.2em;
    padding:8px 26px; color:#e8e2ff; background:rgba(255,255,255,.06); border:1px solid rgba(201,162,255,.5); cursor:pointer;}
  .note{ font-size:9px; color:#6a6a78; text-align:center; letter-spacing:.06em; padding-bottom:2px;}

  /* --- 正式カード(基準幅250px、scaleで可変) --- */
  .scale{ position:relative; width:var(--w); height:calc(var(--w)*1.4); flex:0 0 auto; }
  .fc{ position:absolute; top:0; left:0; width:250px; height:350px; border-radius:14px; overflow:hidden;
    transform:scale(var(--sc,1)); transform-origin:top left;
    background:#0c0817; box-shadow:0 10px 26px -10px rgba(0,0,0,.9), 0 0 0 1px rgba(255,255,255,.08); }
  .fc .art{ position:absolute; inset:-8%;
    background:
      radial-gradient(120% 90% at 82% 12%, var(--c4) 0%, transparent 42%),
      radial-gradient(100% 80% at 12% 30%, var(--c3) 0%, transparent 50%),
      radial-gradient(130% 110% at 40% 95%, var(--c2) 0%, transparent 55%),
      linear-gradient(160deg, var(--c1) 0%, #08060f 100%);
    filter:url(#marble) saturate(1.15); }
  .fc .sheen{ position:absolute; inset:0; z-index:3; pointer-events:none;
    background:linear-gradient(115deg,
      rgba(255,0,128,0) 20%, rgba(255,60,60,.5) 34%, rgba(255,220,80,.5) 42%,
      rgba(60,255,140,.5) 50%, rgba(60,180,255,.5) 58%, rgba(180,80,255,.5) 66%,
      rgba(255,0,128,0) 80%);
    background-size:280% 280%; background-position:35% 30%;
    mix-blend-mode:color-dodge; opacity:.3; }
  .fc .frame{ position:absolute; inset:0; z-index:2; padding:15px 15px 16px; display:flex; flex-direction:column; color:#f2ecff;}
  .fc .toprow{ display:flex; align-items:flex-start; gap:8px; margin-bottom:5px; height:50px;}
  .fc .title{ background:rgba(8,6,16,.82); border:1px solid rgba(255,255,255,.35);
    padding:4px 10px 3px 7px; align-self:flex-start; margin-top:7px;
    clip-path:polygon(0 0,100% 0,calc(100% - 8px) 100%,0 100%); min-width:84px;}
  .fc .title h2{ font-family:"Arial Black",sans-serif; font-size:15px; letter-spacing:.05em;
    font-weight:900; color:#fff; text-shadow:0 0 6px rgba(255,255,255,.35);}
  .fc .title small{ display:block; font-size:5px; letter-spacing:.28em; color:rgba(255,255,255,.55); margin-top:1px; font-family:monospace;}
  .fc .valuebox{ margin:0 auto; border:1px solid rgba(255,255,255,.5); background:rgba(255,255,255,.06);
    width:50px; height:100%; display:flex; align-items:center; justify-content:center;}
  .fc .valuebox .v{ font-family:"Arial Black",sans-serif; font-size:29px; font-weight:900; color:#fff;
    text-shadow:0 1px 8px rgba(255,255,255,.5);}
  .fc .hexicon{ width:36px; margin-top:6px; filter:drop-shadow(0 0 4px rgba(255,255,255,.3));}
  .fc .boxes{ flex:1; display:flex; flex-direction:column; gap:6px;}
  .fc .box{ position:relative; border:1px solid rgba(255,255,255,.42); background:rgba(10,8,20,.4);
    padding:7px 11px; font-size:11.5px; line-height:1.45; font-weight:600; display:flex; align-items:center;}
  .fc .box::before,.fc .box::after{ content:""; position:absolute; width:8px; height:8px;
    border-color:rgba(255,255,255,.85); border-style:solid;}
  .fc .box::before{ top:-1px; left:-1px; border-width:2px 0 0 2px;}
  .fc .box::after{ bottom:-1px; right:-1px; border-width:0 2px 2px 0;}
  .fc .box.top{ flex:1.25;} .fc .box.mid{ flex:1.15;} .fc .box.bot{ flex:1.05;}
  .fc .box.empty{ opacity:.26; border-style:dashed;}
  .fc .box.dead{ opacity:.35; }
  .fc .kw{ font-weight:900; text-decoration:underline; text-underline-offset:2px;}
  .fc .side{ position:absolute; right:6px; top:38%; writing-mode:vertical-rl; font-family:monospace;
    font-size:8px; letter-spacing:.35em; color:rgba(255,255,255,.6); z-index:2;}
  .fc.back{ display:flex; align-items:center; justify-content:center;
    background:radial-gradient(80% 60% at 50% 45%, #1b1440 0%, #0b0818 70%);}
  .fc.back .bframe{ position:absolute; inset:11px; border:1px solid rgba(180,160,255,.35);}
  .fc.back .emblem{ text-align:center; z-index:2;}
  .fc.back .emblem svg{ width:80px; filter:drop-shadow(0 0 14px rgba(140,110,255,.5));}
  .fc.back .logo{ font-family:"Arial Black",sans-serif; font-size:18px; font-weight:900;
    letter-spacing:.34em; text-indent:.34em; color:#e8e2ff; margin-top:8px;
    text-shadow:0 0 12px rgba(160,130,255,.8);}
  .fc.back .sub{ font-family:monospace; font-size:8px; letter-spacing:.5em; text-indent:.5em;
    color:rgba(220,210,255,.5); margin-top:4px;}
  .fc.back .fdv{ position:absolute; top:10px; right:12px; z-index:3;
    font-family:monospace; font-size:16px; font-weight:900; color:#cfc2ff;
    border:1px solid rgba(180,160,255,.6); padding:0 7px; background:rgba(20,12,50,.7);}
  .bigproto{ width:min(88vw,360px); aspect-ratio:7/5; border-radius:10px; position:relative; overflow:hidden;
    background:linear-gradient(150deg, var(--a), var(--b));
    border:1px solid rgba(255,255,255,.45); flex:0 0 auto;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:#fff;}
  .bigproto .pl{ font-family:monospace; font-size:10px; letter-spacing:.5em; text-indent:.5em; color:rgba(255,255,255,.6);}
  .bigproto .pn{ font-family:"Arial Black",sans-serif; font-weight:900; font-size:38px; letter-spacing:.1em;
    text-shadow:0 0 18px rgba(255,255,255,.45);}
  .bigproto .bar2{ width:56%; height:11px; border:1px solid rgba(255,255,255,.6); display:flex; gap:2px; padding:2px;}
  .bigproto .bar2 i{ flex:1; background:rgba(255,255,255,.85); animation:load 1.4s infinite alternate;}
  .bigproto .bar2 i:nth-child(2){animation-delay:.25s} .bigproto .bar2 i:nth-child(3){animation-delay:.5s; background:rgba(255,255,255,.3);}
  .bigproto .stamp{ font-family:monospace; font-size:13px; letter-spacing:.4em; text-indent:.4em;
    border:1px solid rgba(255,255,255,.85); padding:7px 16px; background:rgba(255,255,255,.12);
    box-shadow:0 0 20px var(--b);}

  .side-opp,.side-me{ display:none; }
  @media (orientation:landscape){
    body{ flex-direction:row; }
    .bar.opp,.bar.me{ display:none; }
    .side-opp,.side-me{ display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:12px; flex:0 0 96px; padding:8px 4px; }
    .side-opp{ border-right:1px solid #1e1e26; } .side-me{ border-left:1px solid #1e1e26; }
    .main{ flex:1; display:flex; flex-direction:column; min-width:0; }
    .field{ padding:6px 12px; }
    .hand{ height:100px; }
    .hcard{ width:62px; height:86px; }
    .side-me .phase{ flex-direction:column; align-items:stretch; flex:0; }
    .side-me .phase span{ text-align:center; }
    .side-me .actions{ flex-direction:column; }
  }
  .main{ display:flex; flex-direction:column; flex:1; min-height:0; }

  :root{ --danger:#ff8f9c; --ok:#8af0b0; --cyan:#78dcff; --panel:#121219; }
  body{ position:relative; }
  button{ touch-action:manipulation; }
  .hidden{ display:none!important; }
  .main{ position:relative; }
  .topline{ display:flex; align-items:center; justify-content:space-between; padding:5px 10px 2px; gap:8px; }
  .brand{ font:900 11px/1 "Arial Black",sans-serif; letter-spacing:.42em; text-indent:.42em; color:#d8ccff; white-space:nowrap; }
  .turnbadge{ font:700 9px/1.2 monospace; color:#8f8fa0; border:1px solid #34343e; padding:4px 8px; }
  .bar{ min-height:54px; }
  .bar.me{ padding-bottom:2px; }
  .playername{ font-size:10px; letter-spacing:.18em; color:#aaaab8; font-weight:700; }
  .currentname{ color:#e8e2ff; }
  .statusline{ font-size:8px; color:#656574; letter-spacing:.08em; margin-top:2px; }
  .p.trash,.p.deck{ cursor:pointer; }
  .stack{ outline:1px solid transparent; transition:outline-color .18s,background .18s; }
  .stack.legal{ outline-color:var(--cyan); background:rgba(80,190,255,.06); box-shadow:inset 0 0 16px rgba(80,190,255,.12); }
  .stack.blocked{ opacity:.48; }
  .minicard.selected,.hcard.selected{ outline:2px solid var(--cyan); box-shadow:0 0 18px rgba(100,220,255,.5); }
  .hcard{ flex:0 0 auto; }
  .hand{ justify-content:flex-start; overflow-x:auto; overflow-y:hidden; scrollbar-width:none; padding-left:max(18px,calc(50vw - 44px)); padding-right:max(18px,calc(50vw - 44px)); scroll-snap-type:x proximity; }
  .hand::-webkit-scrollbar{ display:none; }
  .hcard{ scroll-snap-align:center; }
  .actions button[disabled]{ opacity:.28; cursor:not-allowed; }
  .actions button.primary{ color:#0e0e11; background:var(--gold); border-color:var(--gold); }
  .actions button.danger{ border-color:rgba(255,110,125,.65); color:#ffb0b8; }
  .actions button.small{ padding:5px 8px; font-size:9px; }
  .phase span.done{ color:#8f8fa0; border-color:#44444e; }
  .phase span.now{ box-shadow:0 0 12px rgba(201,162,255,.35); }
  .toast{ position:fixed; left:50%; top:12px; transform:translateX(-50%) translateY(-20px); z-index:120;
    max-width:min(92vw,560px); opacity:0; pointer-events:none; transition:.22s;

async function beforeCover(p,l,incoming){
  if(decisionActor()!==p)return withDecisionActor(p,()=>beforeCover(p,l,incoming));
  while(true){const top=topCard(p,l);if(!top)return;
    if(!top.faceDown&&top.protocol==='METAL'&&top.value===6){log('METAL 6：覆われる代わりに削除');await announce(top,'METAL 6','覆われることになったとき：先にこのカードを削除する。','誘発効果');await deleteCard(top,{suppressUncover:true});continue;}
    if(!top.faceDown&&top.protocol==='LIFE'&&top.value===3){
      await announce(top,'LIFE 3','覆われることになったとき：先にデッキの一番上を他の1ラインに裏向きでプレイ。','誘発効果');
      const choices=[0,1,2].filter(x=>x!==l),target=await chooseLine('LIFE 3：先に裏向きでプレイ',choices);
      if(target!=null&&topCard(p,l)===top&&!top.faceDown)await playTopDeck(p,target,{faceDown:true});
      if(topCard(p,l)!==top||top.faceDown)continue;
    }
    if(!top.faceDown&&top.protocol==='FIRE'&&top.value===0){
      log('FIRE 0：覆われる前に発動');await announce(top,'FIRE 0','覆われることになったとき：先にカードを1枚引き、他のカードを1枚反転させる。','誘発効果');
      await draw(p,1);if(!topCommandActive(top))continue;
      const c=await chooseFieldCard('FIRE 0：他のカードを反転',c=>c!==top,{allowCancel:false,viewer:p});if(c)await flipCard(c);
      if(topCard(p,l)!==top||top.faceDown)continue;
    }
    return;
  }
}
async function revealTopIfNeeded(p,l,oldTop){const now=topCard(p,l);if(now&&now!==oldTop&&!now.faceDown){await activateVisibleCard(now,{reason:'uncover',holder:p,line:l});}}
async function deleteCard(card,{suppressUncover=false}={}){
  const loc=cardLocation(card);if(!loc||loc.line==null)return false;const del=elOf(card);if(del){const r=del.getBoundingClientRect();fxBurst(card.protocol,55,{x:r.left+r.width/2,y:r.top+r.height/2});}const stack=G.players[loc.player].lines[loc.line],wasTop=loc.index===stack.length-1;stack.splice(loc.index,1);sendToDiscard(card);log(`${cardName(card)} を削除`);render();await pace();if(wasTop&&!suppressUncover)await revealTopIfNeeded(loc.player,loc.line,card);return true;

async function batchRemove(cards,mode){
  const affected=new Map(),actual=[];for(const c of cards){const loc=cardLocation(c);if(loc&&loc.line!=null){const key=`${loc.player}:${loc.line}`;if(!affected.has(key))affected.set(key,topCard(loc.player,loc.line));actual.push({c,loc});}}
  actual.sort((a,b)=>b.loc.index-a.loc.index);for(const {c,loc} of actual){const stack=G.players[loc.player].lines[loc.line],i=stack.indexOf(c);if(i<0)continue;stack.splice(i,1);if(mode==='return'){c.faceDown=false;G.players[c.owner].hand.push(c);}else sendToDiscard(c);}log(`${actual.length}枚を${mode==='return'?'手札に戻した':'削除した'}`);render();
  for(const [key,oldTop] of affected){const[p,l]=key.split(':').map(Number),top=topCard(p,l);if(top&&top!==oldTop&&!top.faceDown)await activateVisibleCard(top,{reason:'uncover',holder:p,line:l});}
}

async function resolveStartPhase(p){

      const options=G.players[p].hand.length?[{title:'手札を1枚捨てる',value:'discard'},{title:'このカードを反転',value:'flip'}]:[{title:'このカードを反転',value:'flip'}];

    <div class="sub" style="padding:0">カードサイズは「手札一覧」「フィールド」「スタック詳細」の一覧表示に反映されます。演出速度「オフ」で待ち時間なしになります。</div></div>`;
  const p=showModal({title:'設定',sub:'変更は即座に保存されます。',body,buttons:[{label:'閉じる',value:true,className:'primary'}]});
  const speeds=[['オフ',0],['はやい',.6],['ふつう',1],['ゆっくり',1.6]];
  const seg=$('#fxSeg');const build1=()=>{seg.innerHTML='';speeds.forEach(([lb,v])=>{const b=document.createElement('button');b.textContent=lb;b.className='choice'+(SET.fx===v?' on':'');b.onclick=()=>{SET.fx=v;saveSettings();build1();};seg.appendChild(b);});};build1();
  const sh=$('#shakeSeg');const build2=()=>{sh.innerHTML='';[['オン',true],['オフ',false]].forEach(([lb,v])=>{const b=document.createElement('button');b.textContent=lb;b.className='choice'+(SET.shake===v?' on':'');b.onclick=()=>{SET.shake=v;saveSettings();build2();};sh.appendChild(b);});};build2();
  $('#setScale').oninput=e=>{SET.scale=+e.target.value;$('#setScaleVal').textContent=SET.scale+'%';saveSettings();};
  await p;
}
function openProto(pr,p,l){openOverlay(`プロトコル — ${pr.name} / LINE ${l+1}`);const st=STYLE[pr.name],d=document.createElement('div');d.className='bigproto';d.style.setProperty('--a',st.c[0]);d.style.setProperty('--b',st.c[2]);d.innerHTML=`<div class="pl">PROTOCOL</div><div class="pn">${pr.name}</div>${pr.compiled?'<div class="stamp">■ COMPILED</div>':'<div class="bar2"><i></i><i></i><i></i></div><div class="pl">LOADING.</div>'}`;$('#ovList').appendChild(d);}
function enableTilt(item){const scale=item.querySelector('.scale');if(!scale)return;item.onpointermove=e=>{const r=item.getBoundingClientRect(),x=(e.clientX-r.left)/r.width-.5,y=(e.clientY-r.top)/r.height-.5;scale.style.transform=`rotateY(${x*10}deg) rotateX(${-y*8}deg)`;};item.onpointerleave=()=>scale.style.transform='';}
function openLog(){openOverlay('対局ログ');$('#ovList').innerHTML=`<div class="loglist">${G.log.map(x=>`<div class="logline"><b>T${x.turn} / ${esc(x.phase)}</b> ${esc(x.msg)}</div>`).join('')}</div>`;}
function openRules(){openOverlay('実装ルール');$('#ovList').innerHTML=`<div class="rules"><h4>目的</h4><p>自分の3枚のプロトコルを先にすべてコンパイルすると勝利です。</p><h4>コンパイル</h4><p>自分側のライン合計が10以上なら、コンパイルフェイズに1ラインを必ずコンパイルします。ライン上の両者のカードは、それぞれの所有者の捨て札へ移動します。既に完了済みのプロトコルを再コンパイルした場合、相手デッキの一番上を自分の手札に加えます。</p><h4>プレイ</h4><p>表向きは通常、同じ名前のプロトコルがあるラインだけ。裏向きは任意の合法ラインへ置け、値は2、効果は無効です。覆われた表向きカードは上段効果だけが残ります。ドローまたはデッキ上からのプレイ中にデッキが足りなくなった場合、捨て札をシャッフルしてデッキに戻し、処理を続けます。</p><h4>リフレッシュ</h4><p>手札はそのままに、5枚になるまで補充します。補充中にデッキが足りなくなった場合も、捨て札をシャッフルして処理を続けます。</p><h4>CONTROL（使用する対局のみ）</h4><p>コントロールフェイズに2ライン以上で相手より合計値が高ければ取得します。保持者がコンパイルかリフレッシュを行うと中立へ戻り、任意でどちらかのプロトコルを並べ替えられます。</p><h4>操作</h4><p>手札をタップしてプレイ。スタックやプロトコルをタップして詳細表示。手札カードを長押し／右クリックすると拡大表示します。</p></div>`;}
function openControlInfo(){if(!controlCardsEnabled()){toast('この対局ではCONTROLカードを使用しません');return;}toast(G.control==null?'CONTROLは中立です':`${playerName(G.control)} がCONTROLを保持`);}

function fxBurst(protocol,n=55,at=null){
  if(!SET.fx)return;
  const cv=$('#fx'),ctx=cv.getContext('2d'),dpr=devicePixelRatio||1;
  cv.width=innerWidth*dpr;cv.height=innerHeight*dpr;
  const cx=(at?at.x:innerWidth/2)*dpr,cy=(at?at.y:innerHeight/2)*dpr;
  const st=STYLE[protocol]||STYLE.SPIRIT,colors=[st.c[1],st.c[2],st.c[3],'#fff'],parts=[];
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1.6+Math.random()*5;
    parts.push({x:cx,y:cy,vx:Math.cos(a)*s*dpr,vy:Math.sin(a)*s*dpr,life:32+Math.random()*36,t:0,r:(1+Math.random()*2.6)*dpr,c:colors[i%colors.length],trail:Math.random()<.42});}
  const ring={t:0,life:24};
  function tick(){ctx.clearRect(0,0,cv.width,cv.height);ctx.globalCompositeOperation='lighter';let alive=false;
    if(ring.t++<ring.life){alive=true;const k=ring.t/ring.life;
      ctx.globalAlpha=(1-k)*.85;ctx.strokeStyle=st.c[3];ctx.lineWidth=Math.max(.5,(3-2.2*k))*dpr;
      ctx.beginPath();ctx.arc(cx,cy,(8+k*115)*dpr,0,7);ctx.stroke();
      ctx.globalAlpha=(1-k)*.35;ctx.beginPath();ctx.arc(cx,cy,(4+k*70)*dpr,0,7);ctx.stroke();}
    for(const p of parts){if(p.t++>=p.life)continue;alive=true;const px=p.x,py=p.y;
      p.x+=p.vx;p.y+=p.vy;p.vx*=.97;p.vy=p.vy*.97+.035*dpr;
      ctx.globalAlpha=1-p.t/p.life;
      if(p.trail){ctx.strokeStyle=p.c;ctx.lineWidth=p.r;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(p.x,p.y);ctx.stroke();}
      else{ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();}}
    ctx.globalAlpha=1;if(alive)requestAnimationFrame(tick);else ctx.clearRect(0,0,cv.width,cv.height);}
  if(!matchMedia('(prefers-reduced-motion: reduce)').matches)tick();}

function autosave(force=false){if(!G||(!stableState&&!force))return;try{localStorage.setItem('compile-hotseat-save',JSON.stringify(G));}catch(e){}}
function loadSave(){try{const s=localStorage.getItem('compile-hotseat-save');if(!s)return null;const g=JSON.parse(s);if(!g.players||g.players.length!==2)return null;if(typeof g.controlEnabled!=='boolean')g.controlEnabled=true;if(!g.controlEnabled)g.control=null;const placed=g.players.map(pl=>!!(pl?.lines?.some(line=>Array.isArray(line)&&line.length)||pl?.protocols?.some(pr=>pr?.compiled)));const progressed=Number(g.turn)>1||g.log?.some(x=>/プレイ|移動|削除|反転|コンパイル/.test(String(x?.msg||'')));if(!Array.isArray(g.protocolOrderLocked)||g.protocolOrderLocked.length!==2)g.protocolOrderLocked=progressed?[true,true]:placed;else g.protocolOrderLocked=g.protocolOrderLocked.map((v,p)=>!!v||placed[p]);if(!Array.isArray(g.protocolOrderRevision)||g.protocolOrderRevision.length!==2)g.protocolOrderRevision=[0,0];else g.protocolOrderRevision=g.protocolOrderRevision.map(v=>Number.isSafeInteger(v)&&v>=0?v:0);return g;}catch(e){return null;}}
function newGame(){localStorage.removeItem('compile-hotseat-save');G=null;$('#handoff').classList.remove('show');$('#ov').classList.remove('show');$('#setup').classList.remove('hidden');renderWelcome();}

const draft={names:['PLAYER 1','PLAYER 2'],first:0,pool:[],picks:[[],[]],step:0,schedule:[],controlEnabled:true};
function controlSettingHTML(){const on=draft.controlEnabled!==false;return `<div class="setupoption" id="controlSetting"><span>CONTROLカード</span><div class="setupseg"><button type="button" data-control="on" class="${on?'on':''}">あり</button><button type="button" data-control="off" class="${on?'':'on'}">なし</button></div><small>ローカル／CPUは開始する人、オンラインは部屋作成者が決定します。「なし」ではCONTROLの取得とプロトコル交換を行いません。</small></div>`;}
function bindControlSetting(){const box=$('#controlSetting');if(!box)return;const paint=()=>box.querySelectorAll('[data-control]').forEach(b=>b.classList.toggle('on',(b.dataset.control==='on')===draft.controlEnabled));box.querySelectorAll('[data-control]').forEach(b=>b.onclick=()=>{draft.controlEnabled=b.dataset.control==='on';paint();});paint();}
function readControlSetting(){const selected=$('#controlSetting [data-control].on');if(selected)draft.controlEnabled=selected.dataset.control==='on';return draft.controlEnabled!==false;}
function renderWelcome(){const save=loadSave();$('#setupBox').innerHTML=`<h1>COMPILE</h1><div class="kicker">HOTSEAT // SINGLE HTML EDITION</div><p>同一端末で2人対戦するデジタル版です。6つの候補から3プロトコルずつドラフトし、先に3つすべてをコンパイルしてください。</p><div class="setupform"><label>PLAYER 1<input id="name0" maxlength="18" value="PLAYER 1"></label><label>PLAYER 2<input id="name1" maxlength="18" value="PLAYER 2"></label>${controlSettingHTML()}</div><div class="setupactions"><button class="primary" id="startDraft">ドラフト開始</button>${save?'<button id="continueGame">保存データを続ける</button>':''}</div>`;bindControlSetting();$('#startDraft').onclick=()=>startDraft();if(save)$('#continueGame').onclick=()=>{G=save;G.busy=true;$('#setup').classList.add('hidden');render();showHandoff();};}
function startDraft(){readControlSetting();draft.names=[$('#name0').value.trim()||'PLAYER 1',$('#name1').value.trim()||'PLAYER 2'];draft.first=Math.random()<.5?0:1;draft.pool=shuffle([...PROTOCOLS]).slice(0,6);draft.picks=[[],[]];draft.step=0;draft.schedule=[draft.first,other(draft.first),other(draft.first),draft.first,draft.first,other(draft.first)];renderDraft();}
function renderDraft(){const picker=draft.schedule[draft.step];$('#setupBox').innerHTML=`<h1 style="font-size:38px">PROTOCOL DRAFT</h1><div class="draftinfo">先攻：<b>${esc(draft.names[draft.first])}</b><br>現在の選択：<b>${esc(draft.names[picker])}</b>（${draft.step+1}/6）</div><div class="draftgrid" id="draftGrid"></div><div class="pickedrow"><div class="picked"><h4>${esc(draft.names[0])}</h4><div class="pills">${draft.picks[0].map(x=>`<span class="pill">${x}</span>`).join('')}</div></div><div class="picked"><h4>${esc(draft.names[1])}</h4><div class="pills">${draft.picks[1].map(x=>`<span class="pill">${x}</span>`).join('')}</div></div></div>`;const grid=$('#draftGrid');let committed=false;draft.pool.forEach(p=>{const b=document.createElement('button');b.className='choice protochoice';b.style.setProperty('--glow',STYLE[p].c[3]);b.innerHTML=`<strong>${p}</strong><small>${Object.values(DB[p]).map(x=>x.m).filter(Boolean).slice(0,2).join(' / ')}</small>`;b.onclick=()=>{const i=draft.pool.indexOf(p);if(committed||draft.schedule[draft.step]!==picker||i<0)return;committed=true;grid.querySelectorAll('button').forEach(x=>{x.disabled=true;});draft.picks[picker].push(p);draft.pool.splice(i,1);draft.step++;if(draft.step>=6)startArrange(0);else renderDraft();};grid.appendChild(b);});}
function startArrange(p){const arr=draft.picks[p];$('#setupBox').innerHTML=`<h1 style="font-size:38px">LINE ORDER</h1><p><b>${esc(draft.names[p])}</b> のプロトコル配置を決めます。</p><div class="arrange" id="setupArrange"></div><div class="setupactions"><button class="primary" id="arrangeDone">配置決定</button></div>`;const holder=$('#setupArrange');const renderA=()=>{holder.innerHTML='';arr.forEach((name,i)=>{const d=document.createElement('div');d.className='arrcard';setPal(d,name);d.innerHTML=`<span>LINE ${i+1}</span><strong>${name}</strong><div class="arrows"></div>`;const a=d.querySelector('.arrows');for(const[txt,di]of[['←',-1],['→',1]]){const b=document.createElement('button');b.textContent=txt;b.disabled=i+di<0||i+di>=arr.length;b.onclick=()=>{[arr[i],arr[i+di]]=[arr[i+di],arr[i]];renderA();};a.appendChild(b);}holder.appendChild(d);});};renderA();$('#arrangeDone').onclick=()=>{if(p===0)startArrange(1);else finishSetup();};}
function finishSetup(){G={version:1,turn:1,current:draft.first,first:draft.first,phase:'handoff',controlEnabled:draft.controlEnabled!==false,control:null,protocolOrderLocked:[false,false],protocolOrderRevision:[0,0],winner:null,busy:true,log:[],players:[0,1].map(p=>({name:draft.names[p],protocols:draft.picks[p].map(name=>({name,compiled:false})),deck:[],hand:[],discard:[],lines:[[],[],[]],noCompileNextTurn:false,noCompileThisTurn:false}))};for(let p=0;p<2;p++){G.players[p].deck=buildDeck(p,G.players[p].protocols);for(let i=0;i<5;i++)G.players[p].hand.push(G.players[p].deck.pop());}log(`先攻は${playerName(G.first)}`);log(`CONTROLカード：${G.controlEnabled?'あり':'なし'}`);stableState=true;autosave(true);$('#setup').classList.add('hidden');render();showHandoff();}

renderWelcome();
</script>

.pcard .pcload{font:700 clamp(7px,3.2cqw,12px) var(--fm);letter-spacing:.3em;color:#fff;text-shadow:0 0 8px rgba(0,0,0,.9);}

.pcard .pcdone{font:900 clamp(8px,3.6cqw,14px) var(--fm);letter-spacing:.24em;color:#131316;

.pcard .pctraits{position:absolute;left:5%;right:5%;bottom:6%;display:flex;align-items:center;gap:3%;

/* ---- full portrait card (fc rebuild) ---- */
.fc{background:#0a0c12;background-size:cover;background-position:center;border-radius:14px;

.fc.fcpro{display:flex;flex-direction:column;}

.fchead{position:relative;display:flex;align-items:flex-start;gap:8px;padding:12px 12px 0;height:66px;}

.fcglx{font-size:17px;letter-spacing:.04em;}

.fcboxes{flex:1;display:flex;flex-direction:column;gap:7px;padding:10px 13px 4px;}
.fbox{position:relative;flex:1;border:1px solid rgba(255,255,255,.46);background:var(--panel);

.fbox::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}
.fbox .fpos{position:absolute;top:-1px;right:6px;font:700 7px var(--fm);color:rgba(255,255,255,.5);

.fbox.empty{background:rgba(7,9,14,.16);border-style:dashed;border-color:rgba(255,255,255,.3);}

.fbox p{margin:0;}
.fcfoot{display:flex;justify-content:space-between;padding:2px 14px 10px;

/* card back */
.fc.cback{display:flex;align-items:center;justify-content:center;

.fc.cback .cbgrid::before{content:"";position:absolute;inset:5px;border:1px dashed rgba(170,150,255,.18);}
.fc.cback .cbcenter{text-align:center;z-index:2;display:flex;flex-direction:column;align-items:center;gap:9px;}
.fc.cback .cbhex{width:84px;filter:drop-shadow(0 0 16px rgba(140,120,255,.55));}
.cblogo{font-size:24px;letter-spacing:.3em;text-indent:.3em;color:#e9e4ff;text-shadow:0 0 16px rgba(150,130,255,.8);}
.fc.cback .cbsub{font:600 7.5px var(--fm);letter-spacing:.44em;text-indent:.44em;color:rgba(210,200,255,.5);}
.fdv2{position:absolute;top:12px;right:14px;z-index:3;font:900 17px var(--fm);color:#cfc4ff;
  border:1px solid rgba(170,150,255,.6);padding:1px 8px;background:rgba(16,12,42,.75);}
/* ---- announce cut-in ---- */
.announce .abox2{position:relative;width:min(92vw,520px);overflow:hidden;
  border:1px solid var(--ac,#c9a2ff);
  clip-path:polygon(18px 0,100% 0,100% calc(100% - 18px),calc(100% - 18px) 100%,0 100%,0 18px);
  box-shadow:0 0 34px rgba(0,0,0,.6),0 24px 60px rgba(0,0,0,.65);}
.abox2 .aart{position:absolute;inset:0;background-size:cover;background-position:50% 35%;filter:saturate(1.15);}
.abox2 .ascrim{position:absolute;inset:0;background:linear-gradient(100deg,rgba(6,7,12,.94) 22%,rgba(6,7,12,.72) 55%,rgba(6,7,12,.9));}
.abox2 .acnt{position:relative;padding:15px 30px 16px;text-align:center;}
.abox2 .atag2{font:700 8.5px var(--fm);letter-spacing:.46em;text-indent:.46em;color:var(--ac,#c9a2ff);
  text-shadow:0 0 10px rgba(0,0,0,.9);}
.abox2 .aname2{font-size:26px;letter-spacing:.08em;margin:5px 0 4px;filter:drop-shadow(0 0 14px rgba(0,0,0,.7));}
.abox2 .atext2{font-size:11.5px;line-height:1.65;color:#e8eaf2;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.9);}
.abox2 .acorn{position:absolute;width:14px;height:14px;border-style:solid;border-color:var(--ac,#c9a2ff);}
.abox2 .acorn.tl{top:4px;left:4px;border-width:2px 0 0 2px;}
.abox2 .acorn.br{bottom:4px;right:4px;border-width:0 2px 2px 0;}
.announce.gold .abox2{border-color:var(--gold);box-shadow:0 0 50px rgba(232,201,106,.4),0 26px 60px rgba(0,0,0,.7);}
.announce.gold .aname2{font-size:30px;color:var(--gold);-webkit-text-fill-color:currentColor;}
.announce.gold .atag2{color:var(--gold);}
/* ---- protocol-specific ability layer (skin-ability-fx.js) ---- */
#abilityfx{position:fixed;inset:0;z-index:113;pointer-events:none;width:100%;height:100%;contain:strict;display:none;}
#abilityfx.is-active{display:block;}
.announce.ability-rich .abox2{isolation:isolate;}
.announce.ability-rich .abox2::after{content:"";position:absolute;inset:-35%;z-index:1;pointer-events:none;
  background:conic-gradient(from var(--fx-spin,0deg),transparent,rgba(255,255,255,.13),transparent 24%);
  mix-blend-mode:screen;animation:abilityCutinSweep 1.2s ease-out both;}
.announce.ability-rich .acnt{z-index:2;}
@keyframes abilityCutinSweep{
  from{transform:translateX(-32%) rotate(-16deg);opacity:0;}
  35%{opacity:1;}
  to{transform:translateX(32%) rotate(18deg);opacity:0;}
}
@media (prefers-reduced-motion:reduce){
  #abilityfx{display:none!important;}
  .announce.show{animation:none!important;opacity:1;}
  .announce.ability-rich .abox2::after{animation:none!important;display:none;}
  .fxhl{animation:none!important;}
}
/* ---- event ticker ---- */
.chip{font-size:9.5px;color:#e2e5ee;background:rgba(9,11,17,.94);
  border-right:2px solid #7fd8f8;padding:4px 10px;box-shadow:0 6px 16px rgba(0,0,0,.5);}

  box-shadow:0 0 14px rgba(232,201,106,.4);}

.actions button.primary{color:#0d0e12;background:var(--gold);border-color:var(--gold);

.note{color:#767d93;}
/* ---- modal / dialogs ---- */
.dialog{background:linear-gradient(165deg,#14161e,#0d0f15);border:1px solid #3c4152;}
.dialog::before{background:linear-gradient(90deg,transparent,var(--gold),transparent);}

.setup{background-size:cover;background-position:center;position:fixed;}
.setup::before{content:"";position:absolute;inset:0;background:radial-gradient(90% 80% at 50% 30%,rgba(7,8,12,.68),rgba(7,8,12,.95));}
.setupbox{position:relative;border:1px solid rgba(150,160,200,.28);background:rgba(10,11,16,.72);

.ttlwrap{text-align:center;margin-bottom:14px;}

/* 覆われたカードの効果も一覧では読めるように（無効表示は残す） */
.fbox.dead{opacity:.55;}
.fbox.dead::before,.fbox.dead::after{opacity:.5;}
/* ゴースト配置プレビュー */
.ghostcard{margin-top:4px;pointer-events:none;display:flex;flex-direction:column;gap:3px;align-items:center;
  animation:ghostpulse 1.1s ease-in-out infinite;}
.ghostcard .gc{width:66px;height:46px;border:2px dashed rgba(120,220,255,.85);border-radius:6px;
  background-size:cover;background-position:50% 15%;opacity:.8;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;gap:5px;color:#fff;
  font:900 13px var(--fm);text-shadow:0 1px 3px #000;}
.ghostcard .gc::before{content:"";position:absolute;inset:0;background:rgba(6,9,14,.35);}
.ghostcard .gc>*{position:relative;}
.ghostcard .gc.back{background:repeating-linear-gradient(135deg,#141230 0 6px,#0c0a1e 6px 12px);}
.ghostcard .gc span{font:700 8px var(--fm);letter-spacing:.06em;}
.ghostcard .gtot{font:700 9.5px var(--fm);color:#bfeeff;background:rgba(6,10,16,.9);
  border:1px solid rgba(110,210,255,.55);padding:1px 8px;border-radius:2px;}
.ghostcard .gtot b{color:#fff;}
@keyframes ghostpulse{50%{opacity:.55}}
#ghostbar{position:fixed;left:50%;bottom:calc(128px + env(safe-area-inset-bottom));transform:translateX(-50%);
  z-index:60;display:flex;gap:12px;align-items:center;max-width:94vw;
  background:rgba(8,10,16,.96);border:1px solid rgba(110,210,255,.55);padding:9px 13px;
  font-size:11px;color:#dfe8f5;box-shadow:0 10px 30px rgba(0,0,0,.65);
  clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);}
#ghostbar button{font-family:inherit;font-size:10px;letter-spacing:.1em;padding:6px 13px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,140,150,.6);color:#ffc2c8;cursor:pointer;}
/* ドラフト詳細（全カード閲覧） */
#draftDetail{position:fixed;inset:0;z-index:220;background:rgba(5,6,10,.97);
  display:flex;flex-direction:column;padding:16px 10px calc(12px + env(safe-area-inset-bottom));overflow:auto;}
#draftDetail .ddhead{text-align:center;margin-bottom:12px;flex:0 0 auto;}
#draftDetail .ddgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;justify-items:center;align-content:start;}
#draftDetail .ddfoot{display:flex;gap:12px;justify-content:center;padding-top:14px;flex:0 0 auto;}
#draftDetail .ddfoot button{font-family:inherit;font-size:11px;letter-spacing:.12em;font-weight:700;
  padding:9px 20px;color:#e8ebf5;background:rgba(255,255,255,.06);border:1px solid rgba(150,180,255,.5);cursor:pointer;}
#draftDetail .ddfoot .ddpick{background:var(--gold);color:#12131a;border-color:var(--gold);}
/* ドラフトカードのボタン */
.dbtns{display:flex;gap:6px;}
.dbtns button{flex:1;font-family:inherit;font-size:9.5px;letter-spacing:.06em;font-weight:700;padding:6px 4px;
  color:#dfe4f2;background:rgba(255,255,255,.05);border:1px solid rgba(150,180,255,.4);cursor:pointer;}
.dbtns .dpickbtn{background:var(--gold);color:#12131a;border-color:var(--gold);}
/* 配置：選択中カード */
.arr2.sel .pcard{border-color:var(--gold);box-shadow:0 0 20px rgba(232,201,106,.45);}
.arr2 .arrows button{font-size:15px;padding:8px 18px;}
/* カットインのスキップ表示 */
.askip{margin-top:6px;font:600 8px var(--fm);letter-spacing:.28em;color:rgba(255,255,255,.4);}
/* 手札一覧のプレイボタン */
.ovplay{font-family:inherit;font-size:10px;font-weight:700;letter-spacing:.08em;padding:6px 12px;
  color:#12131a;background:var(--gold);border:1px solid var(--gold);cursor:pointer;
  clip-path:polygon(5px 0,100% 0,100% calc(100% - 5px),calc(100% - 5px) 100%,0 100%,0 5px);}
/* ================= v3: beginner clarity ================= */
.playpick{display:flex;gap:14px;align-items:center;justify-content:center;flex-wrap:wrap;padding:4px 0;}
.ppbtns{display:flex;flex-direction:column;gap:10px;min-width:min(58vw,260px);flex:1;}
.ppbtn{font-family:inherit;text-align:left;padding:12px 14px;cursor:pointer;
  color:#e8ebf5;background:rgba(255,255,255,.045);border:1px solid rgba(150,180,255,.45);}
.ppbtn strong{display:block;font-size:13px;margin-bottom:4px;color:#fff;}
.ppbtn small{display:block;font-size:10px;line-height:1.5;color:#9aa1b8;}
.ppbtn.gold{border-color:var(--gold);background:rgba(232,201,106,.08);}
.ppbtn.gold strong{color:var(--gold);}
.ppbtn:hover,.ppbtn:focus-visible{filter:brightness(1.25);outline:none;}
.ppnote{font-size:10px;line-height:1.5;color:#8890a8;border:1px dashed #3a4054;padding:9px 12px;}
.movingcard{outline:2px solid var(--gold)!important;box-shadow:0 0 20px rgba(232,201,106,.65)!important;
  animation:ghostpulse 1.1s ease-in-out infinite;}
.handempty{align-self:center;margin:0 auto;text-align:center;font-size:11px;line-height:1.8;color:#8890a8;
  border:1px dashed #3a4054;padding:14px 26px;border-radius:8px;background:rgba(10,12,18,.5);}
.handempty b{color:var(--gold);}
.pulsebtn{animation:btnpulse 1.2s ease-in-out infinite;border-color:var(--gold)!important;color:var(--gold)!important;}
@keyframes btnpulse{50%{box-shadow:0 0 18px rgba(232,201,106,.75);}}
/* ================= v4 ================= */
/* セットアップ画面のスクロール修正（12種全部見えるように） */
.setup{align-items:flex-start;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.setupbox{margin:auto;}
/* 手札を手札一覧と同じフルカード表示に */
.hand{height:176px;padding-left:14px;padding-right:14px;}
/* 収まる時は中央寄せ、あふれた時だけ左起点スクロール（autoマージン方式） */
.hfan:first-child{margin-left:auto;}
.hfan:last-child{margin-right:auto;}
.hfan{flex:0 0 auto;margin:0 -7px;border-radius:9px;cursor:pointer;scroll-snap-align:center;
  transform:rotate(var(--r)) translateY(var(--y));transition:transform .18s;}
.hfan:active{transform:rotate(0) translateY(-18px) scale(1.07);z-index:9;}
.hfan.selected .fc{outline:2px solid #7fd8f8;box-shadow:0 0 18px rgba(110,210,255,.5);}
@media (orientation:landscape){.hand{height:150px;}.hfan .scale{--w:92px!important;}.hfan .fc{--sc:.368!important;}}
/* ================= v5: 演出 & 同一画面UI ================= */
#fxlayer{position:fixed;inset:0;pointer-events:none;z-index:96;}
.flycard{position:absolute;width:48px;height:66px;border-radius:5px;border:1px solid rgba(255,255,255,.7);
  background-size:cover;background-position:50% 15%;box-shadow:0 10px 22px rgba(0,0,0,.65);
  transition:transform .58s cubic-bezier(.32,.72,.3,1),opacity .58s;will-change:transform;}
.flycard.back{background:#0d1020 radial-gradient(70% 55% at 50% 42%,#1c2140 0%,#0d1020 75%);border-color:rgba(150,170,255,.6);}
.floatlabel{position:absolute;transform:translate(-50%,-50%);font:900 16px var(--fd);letter-spacing:.08em;
  white-space:nowrap;text-shadow:0 2px 8px #000,0 0 16px currentColor;animation:floatup 1.3s ease forwards;}
@keyframes floatup{0%{opacity:0;transform:translate(-50%,-30%) scale(.7)}14%{opacity:1;transform:translate(-50%,-52%) scale(1.18)}
  30%{transform:translate(-50%,-56%) scale(1)}78%{opacity:1}100%{opacity:0;transform:translate(-50%,-150%) scale(.95)}}
.slashfx{position:absolute;width:0;height:0;}
.slashfx i{position:absolute;left:-70px;top:-2px;width:140px;height:4px;--r:45deg;
  background:linear-gradient(90deg,transparent,#fff 40%,#ff5a6e 60%,transparent);
  box-shadow:0 0 14px #ff5a6e;transform:rotate(var(--r)) scaleX(0);animation:slashx .5s ease forwards;}
.slashfx i:nth-child(2){--r:-45deg;animation-delay:.12s;}
@keyframes slashx{0%{transform:rotate(var(--r)) scaleX(0);opacity:0}30%{opacity:1}
  60%{transform:rotate(var(--r)) scaleX(1.25);opacity:1}100%{transform:rotate(var(--r)) scaleX(1.3);opacity:0}}
/* 画面下シート */
#uisheet{position:fixed;left:50%;transform:translateX(-50%);z-index:62;
  bottom:calc(190px + env(safe-area-inset-bottom));width:min(96vw,600px);
  background:rgba(8,10,16,.97);border:1px solid rgba(150,180,255,.55);
  box-shadow:0 14px 40px rgba(0,0,0,.7);
  clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
  padding:10px 12px 11px;display:flex;flex-direction:column;gap:8px;animation:sheetin .2s ease;}
@keyframes sheetin{from{opacity:0;transform:translateX(-50%) translateY(12px)}}
#uisheet .ushead{display:flex;flex-direction:column;gap:3px;}
#uisheet .ushead b{font-size:12.5px;letter-spacing:.06em;color:#fff;}
#uisheet .ushead span{font-size:10px;line-height:1.55;color:#9aa1b8;}
#uisheet .usbtns{display:flex;gap:7px;flex-wrap:wrap;}
.usbtn{flex:1 1 auto;min-width:110px;font-family:inherit;text-align:left;padding:8px 11px;cursor:pointer;
  color:#e8ebf5;background:rgba(255,255,255,.05);border:1px solid rgba(150,180,255,.45);}
.usbtn strong{display:block;font-size:11.5px;color:#fff;}
.usbtn small{display:block;font-size:9px;line-height:1.45;color:#9aa1b8;margin-top:2px;}
.usbtn.gold{border-color:var(--gold);background:rgba(232,201,106,.1);}
.usbtn.gold strong{color:var(--gold);}
.usbtn.gold{color:var(--gold);}
.usbtn.danger{border-color:rgba(255,110,125,.6);color:#ffb6bd;flex:0 1 auto;}
.usbtn[disabled]{opacity:.35;cursor:not-allowed;}
.usbtn:not([disabled]):hover{filter:brightness(1.3);}
/* 盤面ターゲティング */
.targetable{outline:2px solid #7fd8f8!important;cursor:pointer;position:relative;z-index:4;
  animation:tgpulse 1s ease-in-out infinite;}
.targetable::after{content:"対象";position:absolute;right:3px;top:3px;z-index:8;padding:2px 5px;
  color:#071018;background:#bfeeff;border:1px solid #fff;font:900 7px var(--fm);letter-spacing:.08em;
  box-shadow:0 0 10px rgba(110,210,255,.65);pointer-events:none;}
.targetable:focus-visible{outline:3px solid #fff!important;outline-offset:2px;}
.targetselected{outline:3px solid var(--gold)!important;box-shadow:0 0 24px rgba(232,201,106,.75)!important;z-index:5!important;}
@keyframes tgpulse{50%{outline-color:#fff;box-shadow:0 0 22px rgba(110,210,255,.75);}}
.targeting .mcard:not(.targetable),.targeting .sstrip:not(.targetable){filter:brightness(.42) saturate(.6);}
.targeting .proto.pchip{filter:brightness(.5);}
/* ghostbar もシートと同じ高さに */
#ghostbar{bottom:calc(190px + env(safe-area-inset-bottom));z-index:62;}
/* ================= v6: オンライン対戦 ================= */
#netwait{position:fixed;left:50%;top:40px;transform:translateX(-50%);z-index:105;display:none;
  background:rgba(8,10,16,.96);border:1px solid rgba(150,180,255,.6);color:#dfe6f5;
  font-size:11px;letter-spacing:.08em;padding:8px 16px;box-shadow:0 10px 28px rgba(0,0,0,.6);
  clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);}
#netwait.show{display:block;animation:netpulse 2s ease-in-out infinite;}
@keyframes netpulse{50%{box-shadow:0 0 20px rgba(120,160,255,.35)}}
.roomcode{font:900 34px var(--fm);letter-spacing:.34em;text-indent:.34em;color:var(--gold);
  border:1px dashed rgba(232,201,106,.55);padding:10px 6px;margin:12px auto;max-width:280px;
  text-shadow:0 0 18px rgba(232,201,106,.5);}
/* セットアップ画面（z-index:150）から開く通信UIも前面に表示する */
.modal{z-index:240;}
.toast{z-index:260;}
/* ================= v7 ================= */
.hand{height:auto;}
#uisheet,#ghostbar{bottom:calc(var(--handH,182px) + 12px + env(safe-area-inset-bottom));}
#uisheet.withcard{flex-direction:row;align-items:center;gap:12px;}
#uisheet .uscard{flex:0 0 auto;}
#uisheet .usmain{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0;}
#uisheet.fieldchoicesheet .usbtns{max-height:min(34vh,250px);overflow-y:auto;overscroll-behavior:contain;}
#uisheet.targetreviewsheet{width:min(96vw,760px);max-height:calc(100vh - var(--handH,182px) - 28px);
  overflow-y:auto;overscroll-behavior:contain;align-items:stretch;}
#uisheet.targetreviewsheet .uscard{min-width:0;max-width:min(52vw,390px);}
.targetreview{display:flex;gap:10px;align-items:flex-start;max-width:390px;min-width:0;}
.trchosen,.trunder{display:flex;flex-direction:column;gap:5px;min-width:0;}
.trchosen{align-items:center;flex:0 0 auto;}
.trchosen>strong,.trunder>strong{font:800 9px var(--fm);line-height:1.4;color:#fff;letter-spacing:.04em;}
.trchosen>span,.trunderitem>span{font:700 7.5px var(--fm);line-height:1.35;color:#aeb6cc;text-align:center;}
.trunder{flex:1 1 0;overflow:hidden;}
.trunderlist{display:flex;gap:7px;align-items:flex-start;overflow-x:auto;overscroll-behavior-x:contain;
  padding:2px 2px 7px;scrollbar-width:thin;}
.trunderitem{display:flex;flex:0 0 auto;flex-direction:column;align-items:center;gap:4px;max-width:78px;}
.trempty{display:flex;align-items:center;justify-content:center;min-height:84px;width:150px;padding:8px;
  color:#8f97aa;border:1px dashed rgba(150,180,255,.35);font:700 9px var(--fm);text-align:center;}
.targetreviewsheet .usbtn{min-height:44px;}
@media (max-width:600px){
  #uisheet.targetreviewsheet{flex-direction:column;gap:8px;max-height:calc(100dvh - var(--handH,150px) - 18px);}
  #uisheet.targetreviewsheet .uscard{width:100%;max-width:none;}
  .targetreview{display:grid;grid-template-columns:120px minmax(0,1fr);width:100%;max-width:none;}
  .trunderlist{width:100%;}
  .usbtn{min-height:44px;}
  .targetable.sstrip{min-height:30px;display:flex;align-items:center;}
}
.pctotal{margin-left:auto;flex:0 0 auto;font:900 19px var(--fm);color:#fff;line-height:1.3;
  background:rgba(4,7,12,.82);border:1px solid rgba(255,255,255,.6);padding:1px 10px;border-radius:3px;
  text-shadow:1px 0 0 rgba(90,220,255,.4),-1px 0 0 rgba(255,80,140,.3);}
.pctotal.win{border-color:#7fd8f8;color:#bfeeff;box-shadow:0 0 10px rgba(110,210,255,.4);}
.pctotal.rdy{border-color:var(--gold);color:var(--gold);animation:rdypulse 1.6s ease-in-out infinite;}
.proto.pchip .pcstamp{margin-left:auto;margin-right:6px;}
.proto.pchip.done .pctotal{margin-left:0;}
.stack .total{opacity:.5;font-size:9px;padding:0 5px;}
@media (max-height:720px){.note{display:none;}.topline{padding-top:2px;padding-bottom:0;}.bar{min-height:44px;}}
.proto.pchip .pcname{min-width:0;overflow:hidden;}
.pcglx{font-size:10.5px;white-space:nowrap;}
.pctotal{font-size:16px;padding:1px 8px;}

/* ================= v8: サウンド&プレミアム演出 (skin-audio.js) ================= */
/* 衝撃波リング */
.fxring{position:absolute;width:var(--rs,130px);height:var(--rs,130px);
  margin:calc(var(--rs,130px)/-2) 0 0 calc(var(--rs,130px)/-2);
  border-radius:50%;border:2.5px solid var(--rc,#fff);pointer-events:none;
  box-shadow:0 0 26px var(--rc,#fff),inset 0 0 20px rgba(255,255,255,.35);
  animation:fxring .68s cubic-bezier(.17,.72,.26,1) forwards;}
.fxring.thin{border-width:1px;animation-duration:.92s;}
@keyframes fxring{0%{transform:scale(.1);opacity:.95}65%{opacity:.55}100%{transform:scale(1);opacity:0}}
/* 破片 */
.fxshard{position:absolute;width:7px;height:13px;pointer-events:none;
  background:linear-gradient(180deg,#fff,var(--sc,#ffd76a));
  clip-path:polygon(50% 0,100% 32%,70% 100%,8% 76%);box-shadow:0 0 9px var(--sc,#ffd76a);
  animation:fxshard var(--sd,.9s) cubic-bezier(.16,.66,.38,1) forwards;}
@keyframes fxshard{
  0%{transform:translate(-50%,-50%) rotate(0deg) scale(var(--ss,1));opacity:1}
  100%{transform:translate(calc(var(--dx,0px) - 50%),calc(var(--dy,-60px) - 50%)) rotate(var(--rr,260deg)) scale(calc(var(--ss,1)*.8));opacity:0}}
/* 勝利紙吹雪 */
.fxconfetti{position:absolute;top:-3vh;width:8px;height:14px;pointer-events:none;opacity:0;
  background:var(--sc,#e8c96a);clip-path:polygon(0 0,100% 12%,88% 100%,6% 86%);
  box-shadow:0 0 8px var(--sc,#e8c96a);
  animation:fxconfetti var(--fd,2s) linear forwards;}
@keyframes fxconfetti{
  0%{transform:translateY(0) translateX(0) rotate(0deg) scale(var(--ss,1));opacity:0}
  6%{opacity:1}
  100%{transform:translateY(108vh) translateX(var(--fx,0px)) rotate(var(--fr,540deg)) scale(var(--ss,1));opacity:.85}}
/* カットインの質感向上：ポップイン＋光沢スイープ＋タイトル下線 */
.announce.show .abox2{animation:annpop .5s cubic-bezier(.16,1,.3,1) both;}
@keyframes annpop{0%{transform:scale(1.06);filter:brightness(1.7) saturate(1.25) blur(5px);}
  60%{filter:brightness(1.06) blur(0);}100%{transform:scale(1);filter:none;}}
.announce.show .abox2 .ascrim::after{content:"";position:absolute;inset:0;
  background:linear-gradient(115deg,transparent 32%,rgba(255,255,255,.16) 47%,rgba(255,255,255,.04) 53%,transparent 66%);
  transform:translateX(-130%) skewX(-8deg);animation:annshine 1s .18s cubic-bezier(.3,.6,.35,1) forwards;}
@keyframes annshine{to{transform:translateX(130%) skewX(-8deg);}}
.abox2 .aline{display:block;height:2px;width:0;margin:2px auto 5px;
  background:linear-gradient(90deg,transparent,var(--ac,#c9a2ff) 30%,#fff 50%,var(--ac,#c9a2ff) 70%,transparent);
  box-shadow:0 0 12px var(--ac,#c9a2ff);animation:annline .5s .15s cubic-bezier(.2,.85,.3,1) forwards;}
@keyframes annline{to{width:82%;}}
.announce.gold .aline{background:linear-gradient(90deg,transparent,var(--gold) 30%,#fff8e2 50%,var(--gold) 70%,transparent);
  box-shadow:0 0 16px var(--gold);}
@media (prefers-reduced-motion:reduce){
  .fxring,.fxshard,.fxconfetti{display:none!important;}
  .announce.show .abox2{animation:none!important;}
  .announce.show .abox2 .ascrim::after{animation:none!important;display:none;}
  .abox2 .aline{animation:none!important;width:82%;}
}

/* ================= v9: プレミアム演出 (skin-v9-fx.js) ================= */
/* 飛翔カードの経路トレイル */
.fxdot{position:absolute;width:10px;height:10px;margin:-5px 0 0 -5px;border-radius:50%;pointer-events:none;opacity:0;
  background:radial-gradient(circle,#fff 0%,var(--dc,#9fb4ff) 45%,transparent 72%);
  box-shadow:0 0 12px var(--dc,#9fb4ff);animation:fxdot .5s ease-out forwards;}
@keyframes fxdot{0%{opacity:0;transform:scale(.4)}25%{opacity:.95;transform:scale(1.15)}100%{opacity:0;transform:scale(.3)}}
/* 着地グリント（4方向の光） */
.fxglint{position:absolute;width:34px;height:34px;margin:-17px 0 0 -17px;pointer-events:none;opacity:0;
  background:
    linear-gradient(0deg,transparent 46%,var(--gc,#fff) 50%,transparent 54%),
    linear-gradient(90deg,transparent 46%,var(--gc,#fff) 50%,transparent 54%);
  filter:drop-shadow(0 0 8px var(--gc,#fff));animation:fxglint .6s ease-out forwards;}
@keyframes fxglint{0%{opacity:0;transform:scale(.2) rotate(0deg)}30%{opacity:1}100%{opacity:0;transform:scale(1.25) rotate(45deg)}}
/* 削除時の画面縁フラッシュ */
.fxvignette{position:fixed;inset:0;pointer-events:none;z-index:97;opacity:0;
  background:radial-gradient(120% 90% at 50% 50%,transparent 55%,color-mix(in srgb,var(--vc,#ff3d55) 42%,transparent) 100%);
  animation:fxvig var(--vd,480ms) ease-out forwards;}
@keyframes fxvig{0%{opacity:0}22%{opacity:1}100%{opacity:0}}
/* 裏向きプレイのクローク表示 */
.fxcloak{position:absolute;width:64px;height:88px;margin:-44px 0 0 -32px;pointer-events:none;
  border:2px solid rgba(158,138,255,.9);border-radius:7px;
  background:rgba(13,10,32,.55);box-shadow:0 0 24px rgba(140,120,255,.55),inset 0 0 18px rgba(140,120,255,.3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  animation:fxcloak 1.4s cubic-bezier(.2,.8,.3,1) forwards;}
.fxcloak b{font:900 30px var(--fd);color:#d8ccff;text-shadow:0 0 14px rgba(160,140,255,.9);}
.fxcloak span{font:700 10px var(--fm);letter-spacing:.14em;color:#b9a8ff;}
@keyframes fxcloak{0%{opacity:0;transform:scale(1.5)}16%{opacity:1;transform:scale(1)}72%{opacity:1}100%{opacity:0;transform:scale(.94)}}
@media (prefers-reduced-motion:reduce){
  .fxdot,.fxglint,.fxvignette,.fxcloak{display:none!important;}
}

/* ================= v10: ドラフト・セレクションセレモニー ================= */
.draftshell{position:relative;isolation:isolate;margin:-4px;padding:4px;}
.draftshell::before{content:"";position:absolute;inset:-18px;z-index:-1;pointer-events:none;
  background:
    radial-gradient(55% 28% at 8% 4%,rgba(86,208,255,.12),transparent 72%),
    radial-gradient(48% 24% at 94% 2%,rgba(232,127,216,.1),transparent 76%),

.drafttitle{margin-bottom:12px;text-shadow:0 0 28px rgba(150,180,255,.55),0 2px 0 #05070c;}
.draftceremony{position:sticky;top:-12px;z-index:24;margin:0 0 18px;padding:12px;

.draftceremony::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent 0 7px,rgba(150,180,255,.025) 8px),
    linear-gradient(110deg,transparent 22%,rgba(130,195,255,.07) 48%,transparent 66%);}
.draftceremony>*{position:relative;z-index:1;}
.draftceremony::after{content:"";position:absolute;left:0;right:0;top:0;height:1px;pointer-events:none;

.draftsig{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;
  font:800 7.5px var(--fm);letter-spacing:.22em;color:#73809c;}
.draftsig b{font:800 7px var(--fm);color:#aeb9d2;letter-spacing:.12em;}
.draftfocus{display:flex;align-items:stretch;gap:12px;min-height:62px;border:1px solid color-mix(in srgb,var(--player-ac) 48%,#263044);

.draftfocusnum{display:grid;grid-template-columns:auto auto;align-content:center;min-width:92px;padding:7px 12px;

.draftfocusnum b{font:900 28px/1 var(--fm);color:#fff;text-shadow:0 0 16px var(--player-ac);}
.draftfocusnum i{align-self:end;padding:0 0 2px 5px;font:800 9px var(--fm);font-style:normal;color:#74809a;}
.draftfocuscopy{min-width:0;display:flex;flex-direction:column;justify-content:center;padding:6px 8px 6px 0;}
.draftfocuscopy>small{font:800 7px var(--fm);letter-spacing:.24em;color:var(--player-ac);}
.draftfocuscopy>strong{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font:900 clamp(16px,3vw,23px)/1.2 var(--fm);
  letter-spacing:.04em;color:#fff;text-shadow:0 0 16px color-mix(in srgb,var(--player-ac) 70%,transparent);}
.draftfocuscopy>span{font-size:9px;color:#919bb2;line-height:1.45;}
.drafttrack{position:relative;display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:6px;margin:10px 0 0;padding:0;list-style:none;}
.drafttrack::before{content:"";position:absolute;left:6%;right:6%;top:12px;height:1px;z-index:-1;
  background:linear-gradient(90deg,#40506c,#67738c,#40506c);}
.drafttrack li{min-width:0;display:grid;grid-template-columns:25px 1fr;grid-template-rows:auto auto;align-items:center;
  padding:3px 4px;border:1px solid #293144;background:rgba(4,7,12,.88);color:#687289;}
.drafttrack li.current{border-color:var(--slot-ac);background:color-mix(in srgb,var(--slot-ac) 10%,rgba(4,7,12,.9));
  box-shadow:0 0 14px color-mix(in srgb,var(--slot-ac) 30%,transparent);color:#fff;}
.drafttrack li.done{border-color:color-mix(in srgb,var(--slot-ac) 55%,#263043);color:#bfc8da;}
.drafttrack li.new{animation:draftlock .72s cubic-bezier(.18,.82,.25,1) both;}
.draftnode{position:relative;isolation:isolate;grid-row:1/3;width:22px;height:22px;display:grid;place-items:center;
  font:900 8px var(--fm);color:inherit;}
.draftnode::before{content:"";position:absolute;inset:2px;z-index:-1;border:1px solid currentColor;background:#080b12;transform:rotate(45deg);}
.drafttrack li small{font:800 6.5px var(--fm);letter-spacing:.18em;color:var(--slot-ac);}
.drafttrack li>b{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font:800 7.5px var(--fm);letter-spacing:.03em;}
.draftrosters{grid-template-columns:1fr 1fr;gap:8px;margin:9px 0 0;}
.draftroster{min-height:0;padding:6px 7px;border-color:#283145;background:rgba(4,7,12,.72);transition:border-color .2s,box-shadow .2s;}

.draftroster h4{display:flex;align-items:center;gap:7px;margin:0 0 5px;color:#c9d0df;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.draftroster h4>span{flex:0 0 auto;padding:2px 5px;background:#e8edf7;color:#0a0d14;font:900 7px var(--fm);}
.draftroster h4>b{margin-left:auto;color:var(--gold);font:900 8px var(--fm);}
.draftslots{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:5px;}
.draftslot{position:relative;min-width:0;display:grid;grid-template-columns:auto 1fr;grid-template-rows:auto auto;column-gap:4px;
  padding:4px 5px;border:1px dashed #333c50;background:rgba(255,255,255,.02);color:#596378;}
.draftslot.filled{border-style:solid;border-color:color-mix(in srgb,var(--slot-ac) 58%,#30394b);
  background:linear-gradient(100deg,color-mix(in srgb,var(--slot-ac) 12%,transparent),rgba(255,255,255,.02));color:#dce4f2;}
.draftslot i{grid-row:1/3;align-self:center;font:800 6.5px var(--fm);font-style:normal;color:var(--slot-ac,#596378);}
.draftslot b,.draftslot small{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.draftslot b{font:900 7.5px var(--fm);letter-spacing:.03em;}.draftslot small{font-size:6.5px;color:#788399;}
.draftceremony .draftinfo{min-height:15px;margin:7px 0 -2px;text-align:center;line-height:1.45;color:#9da8bd;}
.draftceremony .draftinfo b{color:var(--gold);font-size:9px;}.draftceremony .draftinfo small{font-size:8px;}
.draftcatalog{display:grid;grid-template-columns:1fr auto;grid-template-rows:auto auto;align-items:end;margin:0 2px 9px;padding:0 2px 7px;
  border-bottom:1px solid rgba(145,170,215,.25);}
.draftcatalog>span{grid-column:1;font:900 10px var(--fm);letter-spacing:.18em;color:#dfe5f1;}
.draftcatalog>b{grid-column:2;grid-row:1/3;align-self:center;font:900 26px/1 var(--fm);color:#fff;text-shadow:0 0 18px rgba(135,190,255,.55);}
.draftcatalog>small{grid-column:1;font-size:8px;color:#7f899e;letter-spacing:.04em;}
.draftgrid2{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;}
.dcard{isolation:isolate;overflow:hidden;padding:7px;border:1px solid color-mix(in srgb,var(--dac) 40%,#293244);
  background:linear-gradient(155deg,color-mix(in srgb,var(--dac) 7%,#0b0e16),color-mix(in srgb,var(--ddeep) 75%,#080a10));
  box-shadow:0 16px 32px -20px #000,inset 0 1px rgba(255,255,255,.06);
  clip-path:polygon(9px 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%,0 9px);}
.dcard::before{content:"";position:absolute;inset:-80% -40%;z-index:3;pointer-events:none;opacity:.28;
  background:linear-gradient(112deg,transparent 42%,color-mix(in srgb,var(--dac) 38%,transparent) 48%,rgba(255,255,255,.18) 50%,transparent 56%);
  transform:translateX(-45%);animation:draftholo 6s cubic-bezier(.4,0,.2,1) infinite;}
.dcard::after{content:"";position:absolute;inset:0;z-index:3;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent 0 8px,rgba(255,255,255,.018) 9px);}
.dcard:hover,.dcard:focus-within{transform:translateY(-5px);border-color:var(--dac);
  box-shadow:0 0 24px color-mix(in srgb,var(--dac) 28%,transparent),0 24px 42px -22px #000,inset 0 1px rgba(255,255,255,.1);}
.dcardtop{display:flex;align-items:center;justify-content:space-between;padding:1px 2px 0;
  font:800 7px var(--fm);letter-spacing:.18em;color:#6f7b92;}
.dcardtop b{font:900 7.5px var(--fm);color:var(--dac);letter-spacing:.1em;}
.dcardcircuit{display:flex;align-items:center;gap:3px;height:3px;margin:-1px 2px 1px;}
.dcardcircuit i{display:block;height:1px;background:color-mix(in srgb,var(--dac) 60%,transparent);box-shadow:0 0 6px var(--dac);}
.dcardcircuit i:nth-child(1){width:22%}.dcardcircuit i:nth-child(2){width:5px;height:3px}.dcardcircuit i:nth-child(3){flex:1;opacity:.28}
.dcard .pcard{transition:border-color .18s,box-shadow .18s,filter .18s;box-shadow:0 10px 26px -16px #000;}
.dcard:hover .pcard,.dcard:focus-within .pcard{border-color:var(--dac);filter:saturate(1.08) brightness(1.04);
  box-shadow:0 0 20px color-mix(in srgb,var(--dac) 34%,transparent),0 16px 30px -18px #000;}
.dcard .dfx{gap:4px;padding:2px 3px 1px;}
.dcard .dfx span{min-width:0;font-size:10px;line-height:1.45;color:#adb6ca;}
.dcard .dfx b{font-size:9px;color:#fff;border-color:color-mix(in srgb,var(--dac) 50%,#354056);background:rgba(3,6,10,.65);}
.dbtns{gap:7px;margin-top:auto;}.dbtns button{min-height:44px;padding:8px 5px;font-size:10px;}
.dbtns .dview{border-color:color-mix(in srgb,var(--dac) 48%,#506079);background:rgba(255,255,255,.045);}
.dbtns .dpickbtn{background:linear-gradient(135deg,#fff0b4,var(--gold));box-shadow:0 0 14px rgba(232,201,106,.16);}
.dbtns .dpickbtn[disabled]{color:#7f8799;background:#252a36;border-color:#3b4354;box-shadow:none;cursor:not-allowed;}
#draftDetail .ddfoot{position:sticky;bottom:calc(-12px - env(safe-area-inset-bottom));z-index:5;margin:8px -10px -12px;
  padding:12px 10px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(5,6,10,.2),rgba(5,6,10,.98) 28%);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
#draftDetail .ddfoot button{min-height:44px;min-width:112px;}
.roomcode{font-size:38px;max-width:270px;letter-spacing:.38em;text-indent:.38em;padding:12px 8px;user-select:all;-webkit-user-select:all;}
.roomcodeactions{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:-2px auto 12px;}
.roomcodeactions button{min-height:42px;padding:8px 14px;font-size:9px;}
@keyframes draftlock{0%{transform:scale(1.16);filter:brightness(2);box-shadow:0 0 28px var(--slot-ac)}100%{transform:none;filter:none;}}

@media (max-width:600px){
  .draftshell{margin:-2px;padding:2px}.drafttitle{font-size:25px;margin-bottom:9px;}
  .draftceremony{top:-12px;margin-bottom:12px;padding:9px 8px;}

  .draftfocus{min-height:54px;gap:8px}.draftfocusnum{min-width:74px;padding:6px 8px}.draftfocusnum b{font-size:23px;}

  .draftgrid2{grid-template-columns:repeat(2,minmax(0,1fr));gap:9px;}.dcard{padding:5px}.dcard .dfx span{font-size:9.5px;}

@media (max-height:650px){.draftceremony{position:relative;top:auto;}}
@media (prefers-reduced-motion:reduce){
  .drafttrack li.new,.dcard::before{animation:none!important}.dcard,.dcard .pcard{transition:none!important;}
}

/* ================= v10: ドラフト画面の高級化 & フィールド並び替え ================= */
/* --- 背景の奥行きと温かみ（金＋蒼の光溜まり＋周辺減光） --- */
.draftshell::before{inset:-30px;
  background:
    radial-gradient(58% 40% at 50% -8%,rgba(122,172,255,.17),transparent 70%),
    radial-gradient(72% 46% at 50% 118%,rgba(232,201,106,.11),transparent 72%),
    radial-gradient(42% 32% at 5% 28%,rgba(120,200,255,.07),transparent 74%),
    radial-gradient(42% 32% at 96% 24%,rgba(232,127,216,.07),transparent 74%);}
.draftshell::after{content:"";position:absolute;inset:-30px;z-index:-1;pointer-events:none;
  background:radial-gradient(122% 92% at 50% 42%,transparent 56%,rgba(2,3,6,.7));}
/* --- タイトル：グリッチは上品に、金の下線を敷く --- */
.drafttitle{letter-spacing:.06em;padding-bottom:13px;
  text-shadow:0 0 34px rgba(150,185,255,.5),0 0 10px rgba(232,201,106,.28),0 2px 0 #05070c;
  background:linear-gradient(90deg,transparent,rgba(232,201,106,.95) 20%,#fff7de 50%,rgba(232,201,106,.95) 80%,transparent) bottom center/74% 2px no-repeat;}
.drafttitle::before,.drafttitle::after{opacity:.32;}
/* --- 儀式パネル：ガラス質＋金の縁 --- */
.draftceremony{border-color:rgba(232,201,106,.3);
  background:linear-gradient(150deg,rgba(17,21,34,.96),rgba(8,10,17,.95));
  box-shadow:0 24px 54px rgba(0,0,0,.62),inset 0 1px rgba(255,255,255,.09),inset 0 0 0 1px rgba(232,201,106,.07);}
.draftceremony::before{background:
  repeating-linear-gradient(0deg,transparent 0 8px,rgba(150,180,255,.02) 9px),
  linear-gradient(112deg,transparent 20%,rgba(232,201,106,.05) 46%,rgba(130,195,255,.05) 54%,transparent 70%);}
.draftceremony::after{background:linear-gradient(90deg,transparent,rgba(232,201,106,.18) 12%,#f0d789 40%,#fff6da 50%,#f0d789 60%,rgba(232,201,106,.18) 88%,transparent);
  box-shadow:0 0 16px rgba(232,201,106,.5);}
.draftsig{color:#8e97b0;}.draftsig b{color:#d8bb6e;}
/* --- NOW CHOOSING：スポットライト感 --- */
.draftfocus{min-height:66px;
  box-shadow:inset 0 0 28px color-mix(in srgb,var(--player-ac) 15%,transparent),0 0 20px color-mix(in srgb,var(--player-ac) 13%,transparent);
  background:linear-gradient(90deg,color-mix(in srgb,var(--player-ac) 17%,transparent),rgba(6,9,15,.55) 62%);}
.draftfocusnum{background:rgba(3,6,11,.62);}
.draftfocusnum b{text-shadow:0 0 22px var(--player-ac),0 0 5px #fff;}
.draftfocuscopy>strong{font-size:clamp(18px,3.2vw,26px);text-shadow:0 0 20px color-mix(in srgb,var(--player-ac) 80%,transparent);}
/* --- ロースター（選択済みの棚）を上質に --- */
.draftroster{border-color:#2b3446;background:rgba(6,9,16,.72);}
.draftroster.active{border-color:rgba(232,201,106,.8);box-shadow:inset 0 0 20px rgba(232,201,106,.08),0 0 14px rgba(232,201,106,.12);}
.draftslot.filled{box-shadow:inset 0 0 14px color-mix(in srgb,var(--slot-ac) 12%,transparent);}
/* --- カタログ見出し --- */
.draftcatalog{border-bottom-color:rgba(232,201,106,.28);}
.draftcatalog>span{color:#ece2c6;}
.draftcatalog>b{color:#fff;text-shadow:0 0 18px rgba(232,201,106,.5),0 0 30px rgba(135,190,255,.35);}
/* --- 候補カード＝主役：大きく、深く、金のホバー --- */
.draftgrid2{grid-template-columns:repeat(auto-fill,minmax(234px,1fr));gap:16px;}
.draftshell .dcard{padding:8px;
  border:1px solid color-mix(in srgb,var(--dac) 48%,#232b3b);
  background:linear-gradient(160deg,color-mix(in srgb,var(--dac) 11%,#0b0e16),color-mix(in srgb,var(--ddeep) 84%,#070910));
  box-shadow:0 22px 44px -24px #000,inset 0 1px rgba(255,255,255,.08),inset 0 0 0 1px rgba(255,255,255,.03);}
.draftshell .dcard::before{opacity:.34;}
.draftshell .dcard:hover,.draftshell .dcard:focus-within{transform:translateY(-6px);
  border-color:var(--dac);
  box-shadow:0 0 30px color-mix(in srgb,var(--dac) 34%,transparent),0 30px 50px -24px #000,
    inset 0 1px rgba(255,255,255,.12),inset 0 0 0 1px color-mix(in srgb,var(--dac) 40%,transparent);}
.dcardtop b{color:var(--dac);text-shadow:0 0 8px color-mix(in srgb,var(--dac) 60%,transparent);}
.dcardcircuit i{box-shadow:0 0 7px var(--dac);}
.draftshell .dcard .dfx b{border-color:color-mix(in srgb,var(--dac) 55%,#354056);
  background:rgba(3,6,10,.7);color:#fff;box-shadow:0 0 8px color-mix(in srgb,var(--dac) 22%,transparent);}
/* --- 「これを選ぶ」を金の高級ボタンに --- */
.draftshell .dbtns .dpickbtn{color:#1b1206;font-weight:900;letter-spacing:.07em;
  background:linear-gradient(135deg,#fff4c4,#e8c96a 55%,#cba842);border-color:#f0d789;
  text-shadow:0 1px 0 rgba(255,255,255,.4);
  box-shadow:0 0 16px rgba(232,201,106,.34),inset 0 1px rgba(255,255,255,.6),inset 0 -2px rgba(120,90,20,.35);}
.draftshell .dbtns .dpickbtn:hover{filter:brightness(1.07);
  box-shadow:0 0 26px rgba(232,201,106,.6),inset 0 1px rgba(255,255,255,.7),inset 0 -2px rgba(120,90,20,.4);}
.draftshell .dbtns .dview{border-color:color-mix(in srgb,var(--dac) 52%,#506079);
  background:rgba(255,255,255,.05);color:#dfe4f0;}
.draftshell .dbtns .dview:hover{background:rgba(255,255,255,.09);border-color:var(--dac);}

  margin:0 0 13px;padding:11px 15px;border:1px solid rgba(232,201,106,.36);
  background:linear-gradient(100deg,rgba(232,201,106,.09),rgba(6,9,15,.62));
  clip-path:polygon(9px 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%,0 9px);}
.protoreorderbar .prbtxt b{display:block;font:900 12.5px var(--fd);letter-spacing:.05em;color:#f2e6c2;}
.protoreorderbar .prbtxt small{font-size:10px;color:#9aa1b8;line-height:1.45;}
.protoreorderbar .prbbtn{flex:0 0 auto;min-height:42px;padding:9px 20px;font:900 12.5px var(--fd);letter-spacing:.06em;cursor:pointer;

.protoreorderbar .prbbtn[disabled]{color:#868ea2;background:#222834;border-color:#39414f;box-shadow:none;cursor:not-allowed;filter:none;}

}
@media (max-width:360px){.draftgrid2{grid-template-columns:1fr;}}

/* 設定画面のセレクト（BGM曲選択など） */
.setrow .setsel{min-width:0;flex:1;max-width:62%;margin-left:auto;padding:8px 10px;border-radius:7px;
  background:#111827;color:#f4f6ff;border:1px solid #59637a;font-family:inherit;font-size:12px;cursor:pointer;}
.setrow .setsel:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(232,201,106,.2);}

/* ================= v11: 選択済みプロトコルを「獲得カード」として表示 ================= */
.draftrosters{gap:12px;margin-top:12px;}
.draftroster{padding:9px 10px;background:linear-gradient(155deg,rgba(9,13,22,.9),rgba(4,7,12,.82));}
.draftroster h4{margin-bottom:8px;font-size:9px;letter-spacing:.04em;}
.draftslots{gap:8px;}
.draftslot{position:relative;isolation:isolate;overflow:hidden;min-height:64px;display:grid;

function makeRng(seed){let s=(seed>>>0)||1;return()=>((s=Math.imul(48271,s)%2147483647)&0x7fffffff)/2147483647;}
function hexRGBA(hex,a){const n=parseInt(hex.slice(1),16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;}

/* ---- shared painter helpers ---- */
function dabs(ctx,W,H,rng,colors,n,rMin,rMax,a){
  for(let i=0;i<n;i++){const c=colors[(rng()*colors.length)|0];
    const x=rng()*W,y=rng()*H,r=rMin+rng()*(rMax-rMin);
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,hexRGBA(c,a*(0.5+rng()*0.5)));g.addColorStop(1,hexRGBA(c,0));
    ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(x,y,r*(0.7+rng()*0.8),r*(0.5+rng()*0.6),rng()*Math.PI,0,7);ctx.fill();}
}
function glowAt(ctx,x,y,r,color,a){const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,hexRGBA(color,a));g.addColorStop(1,hexRGBA(color,0));ctx.fillStyle=g;ctx.fillRect(x-r,y-r,r*2,r*2);}
function silTower(ctx,x,base,w,h,color,a,rng,jag){
  ctx.fillStyle=hexRGBA(color,a);ctx.beginPath();ctx.moveTo(x,base);
  let y=base-h;ctx.lineTo(x,y);
  for(let i=0;i<jag;i++){const nx=x+w*(i+1)/jag;const ny=y+(rng()-0.5)*h*0.22;ctx.lineTo(nx-w/jag*0.3,ny);ctx.lineTo(nx,ny+(rng()-0.5)*h*0.1);}
  ctx.lineTo(x+w,base);ctx.closePath();ctx.fill();
}
function silArch(ctx,cx,base,w,h,color,a){
  ctx.fillStyle=hexRGBA(color,a);ctx.beginPath();
  ctx.moveTo(cx-w/2,base);ctx.lineTo(cx-w/2,base-h*0.55);
  ctx.quadraticCurveTo(cx,base-h*1.25,cx+w/2,base-h*0.55);ctx.lineTo(cx+w/2,base);
  ctx.lineTo(cx+w*0.32,base);ctx.lineTo(cx+w*0.32,base-h*0.5);
  ctx.quadraticCurveTo(cx,base-h*0.98,cx-w*0.32,base-h*0.5);ctx.lineTo(cx-w*0.32,base);ctx.closePath();ctx.fill();
}
function streaks(ctx,W,H,rng,color,n,ang,len,wid,a){
  ctx.save();ctx.strokeStyle=hexRGBA(color,a);ctx.lineCap='round';
  for(let i=0;i<n;i++){const x=rng()*W,y=rng()*H,l=len*(0.4+rng());
    ctx.lineWidth=wid*(0.4+rng());ctx.beginPath();ctx.moveTo(x,y);
    ctx.lineTo(x+Math.cos(ang)*l,y+Math.sin(ang)*l);ctx.stroke();}
  ctx.restore();
}

  dabs(ctx,W,H,rng,[p2,p3,m.pop],90,W*0.015,W*0.06,0.28);
},
};
/* ---- glitch post-processing ---- */
function glitchPass(ctx,cv,W,H,rng,strength){
  // horizontal slice shifts (pixel-sort feel)
  const slices=Math.round(14*strength+rng()*10);
  for(let i=0;i<slices;i++){
    const y=(rng()*H)|0,h=Math.max(2,(rng()*H*0.045)|0),dx=((rng()-0.5)*W*0.14*strength)|0;
    if(!h)continue;ctx.drawImage(cv,0,y,W,h,dx,y,W,h);
    if(rng()<0.4){ctx.globalAlpha=0.16;ctx.globalCompositeOperation='screen';
      ctx.fillStyle=rng()<0.5?'#0ff':'#f2a';ctx.fillRect(0,y,W,h);
      ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';}
  }
  // mosaic block displacement
  const blocks=Math.round(22*strength);
  for(let i=0;i<blocks;i++){
    const bw=(W*(0.04+rng()*0.14))|0,bh=(H*(0.015+rng()*0.05))|0;
    const sx=(rng()*(W-bw))|0,sy=(rng()*(H-bh))|0;
    const dx=(sx+(rng()-0.5)*W*0.1)|0,dy=(sy+(rng()-0.5)*H*0.03)|0;
    ctx.drawImage(cv,sx,sy,bw,bh,dx,dy,bw,bh);
    if(rng()<0.3){ctx.globalAlpha=0.25;ctx.drawImage(cv,sx,sy,bw,bh,dx+2,dy,bw,bh);ctx.globalAlpha=1;}
  }
  // chromatic aberration echo
  ctx.globalCompositeOperation='screen';ctx.globalAlpha=0.10;
  ctx.drawImage(cv,2.5,0);ctx.drawImage(cv,-2.5,0.5);
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
}
function finishPass(ctx,W,H,rng){
  // scanlines
  ctx.globalAlpha=0.05;ctx.fillStyle='#000';
  for(let y=0;y<H;y+=3)ctx.fillRect(0,y,W,1);
  ctx.globalAlpha=1;
  // digital dust
  ctx.fillStyle='rgba(255,255,255,.5)';
  for(let i=0;i<Math.round(W*H/9000);i++){if(rng()<0.5)continue;ctx.globalAlpha=0.12+rng()*0.3;
    ctx.fillRect(rng()*W,rng()*H,1+rng()*2,1);}
  ctx.globalAlpha=1;
  // vignette
  const g=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.35,W/2,H/2,Math.max(W,H)*0.72);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.3)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}
function makeArt(proto,land){
  const key=proto+(land?':l':':p');
  if(ARTCACHE[key])return ARTCACHE[key];
  const m=pmeta(proto);const W=land?720:500,H=land?500:700;
  const cv=document.createElement('canvas');cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');const rng=makeRng(m.seed+(land?7:0));
  // base sky gradient
  const g=ctx.createLinearGradient(0,0,W*0.25,H);
  g.addColorStop(0,m.pal[2]);g.addColorStop(0.45,m.pal[1]);g.addColorStop(1,m.pal[0]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  dabs(ctx,W,H,rng,[m.pal[1],m.pal[2],m.pal[3]],80,W*0.05,W*0.16,0.18); // atmospheric underpaint
  (SCENES[m.paint]||SCENES.cave)(ctx,W,H,m,rng);
  dabs(ctx,W,H,rng,[m.pal[2],m.pal[3]],50,W*0.01,W*0.05,0.14); // unifying dabs
  // vividness boost: self-overlay raises contrast & chroma
  ctx.globalCompositeOperation='overlay';ctx.globalAlpha=0.4;ctx.drawImage(cv,0,0);
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
  glitchPass(ctx,cv,W,H,rng,1);
  finishPass(ctx,W,H,rng);
  const url=cv.toDataURL('image/jpeg',0.85);
  ARTCACHE[key]=url;return url;
}
function artBG(proto,land){return`background-image:url("${makeArt(proto,land)}")`;}
