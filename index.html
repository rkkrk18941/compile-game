.actions button.view{border-color:rgba(110,200,255,.5);}
.actions button.danger{border-color:rgba(255,110,125,.6);color:#ffb6bd;}
.note{color:#767d93;}
/* ---- modal / dialogs ---- */
.dialog{background:linear-gradient(165deg,#14161e,#0d0f15);border:1px solid #3c4152;}
.dialog::before{background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.dialog h2{font-size:13px;letter-spacing:.2em;color:#eef0f8;}
.choice{border:1px solid #383e50;background:rgba(255,255,255,.028);}
.choice:hover,.choice:focus-visible{border-color:var(--gold);background:rgba(232,201,106,.07);}
.choice strong{color:#fff;}
.choice.on{border-color:#7fd8f8;box-shadow:inset 0 0 16px rgba(110,210,255,.1);}
.dialogfoot button.primary,.setup button.primary,.handoff button.primary{background:var(--gold);color:#12131a;border-color:var(--gold);}
/* ---- setup / title ---- */
.setup{background-size:cover;background-position:center;position:fixed;}
.setup::before{content:"";position:absolute;inset:0;background:radial-gradient(90% 80% at 50% 30%,rgba(7,8,12,.68),rgba(7,8,12,.95));}
.setupbox{position:relative;border:1px solid rgba(150,160,200,.28);background:rgba(10,11,16,.72);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 40px 100px rgba(0,0,0,.7);}
.ttlwrap{text-align:center;margin-bottom:14px;}
.ttlkanji{font-size:10px;letter-spacing:.9em;text-indent:.9em;color:#aab2cc;margin-bottom:10px;}
.ttl{font-size:clamp(44px,13vw,96px);letter-spacing:.14em;text-indent:.14em;
  filter:drop-shadow(0 0 30px rgba(150,170,255,.5));}
.ttl2{font-size:clamp(22px,6vw,40px);letter-spacing:.12em;display:block;text-align:center;margin-bottom:10px;}
.ttlsub{font:700 9px var(--fm);letter-spacing:.6em;text-indent:.6em;color:#8890ac;margin-top:10px;}
.ttlload{width:min(300px,60%);height:8px;margin:14px auto 0;border:1px solid rgba(255,255,255,.5);
  display:flex;gap:2px;padding:2px;}
.ttlload i{flex:1;background:rgba(255,255,255,.85);animation:load 1.4s infinite alternate;}
.ttlload i:nth-child(2){animation-delay:.18s}.ttlload i:nth-child(3){animation-delay:.36s}
.ttlload i:nth-child(4){animation-delay:.54s;background:rgba(255,255,255,.4)}
.ttlload i:nth-child(5){animation-delay:.72s;background:rgba(255,255,255,.25)}
.ttldesc{font-size:11px;color:#a8aec4;line-height:1.8;text-align:center;}
.setup input{background:rgba(8,9,14,.85);border:1px solid #3a4054;color:#eef0f8;}
.setup label{color:#8890a8;}
/* ---- draft ---- */
.draftinfo{font-size:11px;color:#9aa1b8;}
.draftinfo b{color:#eef0f8;}
.draftinfo .dpick{color:var(--gold);}
.draftgrid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin:6px 0 4px;}
.dcard{position:relative;border:none;background:none;padding:0;cursor:pointer;font-family:inherit;
  display:flex;flex-direction:column;gap:6px;transition:transform .16s;}
.dcard:hover,.dcard:focus-visible{transform:translateY(-4px);outline:none;}
.dcard:hover .pcard{border-color:var(--gold);box-shadow:0 0 22px rgba(232,201,106,.35),0 16px 34px -12px rgba(0,0,0,.9);}
.dcard .dfx{display:flex;flex-direction:column;gap:2px;padding:0 2px;}
.dcard .dfx span{display:flex;gap:5px;align-items:baseline;font-size:8.5px;color:#9ba2b8;line-height:1.4;text-align:left;}
.dcard .dfx b{flex:0 0 auto;font:900 8.5px var(--fm);color:#dfe3f0;border:1px solid #3c425a;padding:0 3px;}
.pill{font:700 9px var(--fm);border:1px solid var(--ac,#464654);color:#e6e9f5;padding:3px 7px;
  display:inline-flex;gap:5px;align-items:baseline;background:rgba(10,12,18,.6);}
.pill i{font-style:normal;font-size:7.5px;color:var(--ac,#9aa);letter-spacing:.2em;}
.pill.empty{opacity:.3;border-style:dashed;}
.picked{border:1px solid #2c3040;background:rgba(8,10,15,.5);}
.picked h4{color:#8890a8;}
/* ---- arrange ---- */
.arrange2{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:16px 0;}
.arr2{display:flex;flex-direction:column;gap:6px;align-items:center;}
.arr2 .arrl{font:700 8.5px var(--fm);letter-spacing:.3em;color:var(--gold);}
.arr2 .arrows{display:flex;gap:8px;}
.arr2 .arrows button{font-family:inherit;font-size:12px;padding:5px 14px;color:#e8ebf5;
  background:rgba(255,255,255,.06);border:1px solid rgba(150,180,255,.45);cursor:pointer;}
.arr2 .arrows button[disabled]{opacity:.25;}
/* ---- handoff ---- */
.handoff{background:radial-gradient(circle at 50% 32%,#141b33,#08090d 72%);}
.handoffbox{border:1px solid rgba(150,170,255,.4);background:rgba(9,11,17,.9);}
.handoff .glyph{color:#9fb2ff;}
.handoff h2{color:#eef0f8;}
.hlog{margin:4px 0 16px;border:1px solid #262b3a;background:rgba(10,12,18,.65);
  padding:9px 12px;max-height:150px;overflow:auto;text-align:left;}
.hlog h4{font:700 8.5px var(--fm);letter-spacing:.24em;color:#8890a8;margin-bottom:6px;}
.hlog div{font-size:10px;line-height:1.7;color:#b9bfd2;border-bottom:1px solid #1d212e;padding:2px 0;}
.hlog div:last-child{border-bottom:none;}
/* ---- overlay ---- */
.overlay{background:rgba(6,7,10,.95);}
.overlay h3{color:#a8aec4;}
.ovmini .st,.ovitem .st{font-family:var(--fm);color:#c8cde0;border:1px dashed rgba(150,170,255,.4);background:rgba(12,14,22,.6);}
.ovmini .st.warn,.ovitem .st.warn{color:#ffd394;border-color:rgba(255,190,120,.42);}
.overlay .close{border:1px solid rgba(150,180,255,.5);color:#e8ebf5;}
.sechead{color:#8890a8;border-bottom:1px solid #23273a;}
.sechead b{color:#eef0f8;}
.sechead .tt{color:var(--gold);}
.cardmeta{color:#8890a2;}
.loglist{font-family:var(--fm);}
.logline{border-bottom:1px solid #1e2230;color:#a4aabe;}
.logline b{color:#dfe3f2;}
/* small screens */
@media (max-width:420px){
  .draftgrid2{grid-template-columns:1fr 1fr;}
  .hcard.hc{width:70px;height:97px;}
}
/* ================= v2 fixes ================= */
/* カード選択グリッド（対象選択・手札選択・キャッシュ確認） */
.fieldpick{display:grid;grid-template-columns:repeat(auto-fill,minmax(124px,1fr));gap:10px;justify-items:center;}
.fpitem{background:none;border:1px solid #2c3040;border-radius:9px;padding:7px 5px;cursor:pointer;
  display:flex;flex-direction:column;gap:5px;align-items:center;font-family:inherit;}
.fpitem:hover,.fpitem:focus-visible{border-color:var(--gold);background:rgba(232,201,106,.05);outline:none;}
.fpitem.on{border-color:#7fd8f8;box-shadow:0 0 14px rgba(110,210,255,.4);background:rgba(110,210,255,.07);}
.fpcap{font:700 8.5px var(--fm);color:#aeb6cc;letter-spacing:.04em;text-align:center;}
/* 覆われたカードの効果も一覧では読めるように（無効表示は残す） */
.fbox.dead{opacity:.55;}
.fbox.dead::before,.fbox.dead::after{opacity:.5;}
/* ゴースト配置プレビュー */
.ghostcard{margin-top:4px;pointer-events:none;display:flex;flex-direction:column;gap:3px;align-items:center;
  animation:ghostpulse 1.1s ease-in-out infinite;}
.ghostcard .gc{width:66px;height:46px;border:2px dashed rgba(120,220,255,.85);border-radius:6px;
  background-size:cover;background-position:50% 15%;opacity:.8;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;gap:5px;color:#fff;
  font:900 13px var(--fm);text-shadow:0 1px 3px #000;}
.ghostcard .gc::before{content:"";position:absolute;inset:0;background:rgba(6,9,14,.35);}
.ghostcard .gc>*{position:relative;}
.ghostcard .gc.back{background:repeating-linear-gradient(135deg,#141230 0 6px,#0c0a1e 6px 12px);}
.ghostcard .gc span{font:700 8px var(--fm);letter-spacing:.06em;}
.ghostcard .gtot{font:700 9.5px var(--fm);color:#bfeeff;background:rgba(6,10,16,.9);
  border:1px solid rgba(110,210,255,.55);padding:1px 8px;border-radius:2px;}
.ghostcard .gtot b{color:#fff;}
@keyframes ghostpulse{50%{opacity:.55}}
#ghostbar{position:fixed;left:50%;bottom:calc(128px + env(safe-area-inset-bottom));transform:translateX(-50%);
  z-index:60;display:flex;gap:12px;align-items:center;max-width:94vw;
  background:rgba(8,10,16,.96);border:1px solid rgba(110,210,255,.55);padding:9px 13px;
  font-size:11px;color:#dfe8f5;box-shadow:0 10px 30px rgba(0,0,0,.65);
  clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);}
#ghostbar button{font-family:inherit;font-size:10px;letter-spacing:.1em;padding:6px 13px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,140,150,.6);color:#ffc2c8;cursor:pointer;}
/* ドラフト詳細（全カード閲覧） */
#draftDetail{position:fixed;inset:0;z-index:220;background:rgba(5,6,10,.97);
  display:flex;flex-direction:column;padding:16px 10px calc(12px + env(safe-area-inset-bottom));overflow:auto;}
#draftDetail .ddhead{text-align:center;margin-bottom:12px;flex:0 0 auto;}
#draftDetail .ddgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;justify-items:center;align-content:start;}
#draftDetail .ddfoot{display:flex;gap:12px;justify-content:center;padding-top:14px;flex:0 0 auto;}
#draftDetail .ddfoot button{font-family:inherit;font-size:11px;letter-spacing:.12em;font-weight:700;
  padding:9px 20px;color:#e8ebf5;background:rgba(255,255,255,.06);border:1px solid rgba(150,180,255,.5);cursor:pointer;}
#draftDetail .ddfoot .ddpick{background:var(--gold);color:#12131a;border-color:var(--gold);}
/* ドラフトカードのボタン */
.dbtns{display:flex;gap:6px;}
.dbtns button{flex:1;font-family:inherit;font-size:9.5px;letter-spacing:.06em;font-weight:700;padding:6px 4px;
  color:#dfe4f2;background:rgba(255,255,255,.05);border:1px solid rgba(150,180,255,.4);cursor:pointer;}
.dbtns .dpickbtn{background:var(--gold);color:#12131a;border-color:var(--gold);}
/* 配置：選択中カード */
.arr2.sel .pcard{border-color:var(--gold);box-shadow:0 0 20px rgba(232,201,106,.45);}
.arr2 .arrows button{font-size:15px;padding:8px 18px;}
/* カットインのスキップ表示 */
.askip{margin-top:6px;font:600 8px var(--fm);letter-spacing:.28em;color:rgba(255,255,255,.4);}
/* 手札一覧のプレイボタン */
.ovplay{font-family:inherit;font-size:10px;font-weight:700;letter-spacing:.08em;padding:6px 12px;
  color:#12131a;background:var(--gold);border:1px solid var(--gold);cursor:pointer;
  clip-path:polygon(5px 0,100% 0,100% calc(100% - 5px),calc(100% - 5px) 100%,0 100%,0 5px);}
/* ================= v3: beginner clarity ================= */
.playpick{display:flex;gap:14px;align-items:center;justify-content:center;flex-wrap:wrap;padding:4px 0;}
.ppbtns{display:flex;flex-direction:column;gap:10px;min-width:min(58vw,260px);flex:1;}
.ppbtn{font-family:inherit;text-align:left;padding:12px 14px;cursor:pointer;
  color:#e8ebf5;background:rgba(255,255,255,.045);border:1px solid rgba(150,180,255,.45);}
.ppbtn strong{display:block;font-size:13px;margin-bottom:4px;color:#fff;}
.ppbtn small{display:block;font-size:10px;line-height:1.5;color:#9aa1b8;}
.ppbtn.gold{border-color:var(--gold);background:rgba(232,201,106,.08);}
.ppbtn.gold strong{color:var(--gold);}
.ppbtn:hover,.ppbtn:focus-visible{filter:brightness(1.25);outline:none;}
.ppnote{font-size:10px;line-height:1.5;color:#8890a8;border:1px dashed #3a4054;padding:9px 12px;}
.movingcard{outline:2px solid var(--gold)!important;box-shadow:0 0 20px rgba(232,201,106,.65)!important;
  animation:ghostpulse 1.1s ease-in-out infinite;}
.handempty{align-self:center;margin:0 auto;text-align:center;font-size:11px;line-height:1.8;color:#8890a8;
  border:1px dashed #3a4054;padding:14px 26px;border-radius:8px;background:rgba(10,12,18,.5);}
.handempty b{color:var(--gold);}
.pulsebtn{animation:btnpulse 1.2s ease-in-out infinite;border-color:var(--gold)!important;color:var(--gold)!important;}
@keyframes btnpulse{50%{box-shadow:0 0 18px rgba(232,201,106,.75);}}
/* ================= v4 ================= */
/* セットアップ画面のスクロール修正（12種全部見えるように） */
.setup{align-items:flex-start;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.setupbox{margin:auto;}
/* 手札を手札一覧と同じフルカード表示に */
.hand{height:176px;padding-left:max(14px,calc(50vw - 60px));padding-right:max(14px,calc(50vw - 60px));}
.hfan{flex:0 0 auto;margin:0 -7px;border-radius:9px;cursor:pointer;scroll-snap-align:center;
  transform:rotate(var(--r)) translateY(var(--y));transition:transform .18s;}
.hfan:active{transform:rotate(0) translateY(-18px) scale(1.07);z-index:9;}
.hfan.selected .fc{outline:2px solid #7fd8f8;box-shadow:0 0 18px rgba(110,210,255,.5);}
@media (orientation:landscape){.hand{height:150px;}.hfan .scale{--w:92px!important;}.hfan .fc{--sc:.368!important;}}
/* ================= v5: 演出 & 同一画面UI ================= */
#fxlayer{position:fixed;inset:0;pointer-events:none;z-index:96;}
.flycard{position:absolute;width:48px;height:66px;border-radius:5px;border:1px solid rgba(255,255,255,.7);
  background-size:cover;background-position:50% 15%;box-shadow:0 10px 22px rgba(0,0,0,.65);
  transition:transform .58s cubic-bezier(.32,.72,.3,1),opacity .58s;will-change:transform;}
.flycard.back{background:#0d1020 radial-gradient(70% 55% at 50% 42%,#1c2140 0%,#0d1020 75%);border-color:rgba(150,170,255,.6);}
.floatlabel{position:absolute;transform:translate(-50%,-50%);font:900 16px var(--fd);letter-spacing:.08em;
  white-space:nowrap;text-shadow:0 2px 8px #000,0 0 16px currentColor;animation:floatup 1.3s ease forwards;}
@keyframes floatup{0%{opacity:0;transform:translate(-50%,-30%) scale(.7)}14%{opacity:1;transform:translate(-50%,-52%) scale(1.18)}
  30%{transform:translate(-50%,-56%) scale(1)}78%{opacity:1}100%{opacity:0;transform:translate(-50%,-150%) scale(.95)}}
.slashfx{position:absolute;width:0;height:0;}
.slashfx i{position:absolute;left:-70px;top:-2px;width:140px;height:4px;--r:45deg;
  background:linear-gradient(90deg,transparent,#fff 40%,#ff5a6e 60%,transparent);
  box-shadow:0 0 14px #ff5a6e;transform:rotate(var(--r)) scaleX(0);animation:slashx .5s ease forwards;}
.slashfx i:nth-child(2){--r:-45deg;animation-delay:.12s;}
@keyframes slashx{0%{transform:rotate(var(--r)) scaleX(0);opacity:0}30%{opacity:1}
  60%{transform:rotate(var(--r)) scaleX(1.25);opacity:1}100%{transform:rotate(var(--r)) scaleX(1.3);opacity:0}}
/* 画面下シート */
#uisheet{position:fixed;left:50%;transform:translateX(-50%);z-index:62;
  bottom:calc(190px + env(safe-area-inset-bottom));width:min(96vw,600px);
  background:rgba(8,10,16,.97);border:1px solid rgba(150,180,255,.55);
  box-shadow:0 14px 40px rgba(0,0,0,.7);
  clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
  padding:10px 12px 11px;display:flex;flex-direction:column;gap:8px;animation:sheetin .2s ease;}
@keyframes sheetin{from{opacity:0;transform:translateX(-50%) translateY(12px)}}
#uisheet .ushead{display:flex;flex-direction:column;gap:3px;}
#uisheet .ushead b{font-size:12.5px;letter-spacing:.06em;color:#fff;}
#uisheet .ushead span{font-size:10px;line-height:1.55;color:#9aa1b8;}
#uisheet .usbtns{display:flex;gap:7px;flex-wrap:wrap;}
.usbtn{flex:1 1 auto;min-width:110px;font-family:inherit;text-align:left;padding:8px 11px;cursor:pointer;
  color:#e8ebf5;background:rgba(255,255,255,.05);border:1px solid rgba(150,180,255,.45);}
.usbtn strong{display:block;font-size:11.5px;color:#fff;}
.usbtn small{display:block;font-size:9px;line-height:1.45;color:#9aa1b8;margin-top:2px;}
.usbtn.gold{border-color:var(--gold);background:rgba(232,201,106,.1);}
.usbtn.gold strong{color:var(--gold);}
.usbtn.gold{color:var(--gold);}
.usbtn.danger{border-color:rgba(255,110,125,.6);color:#ffb6bd;flex:0 1 auto;}
.usbtn[disabled]{opacity:.35;cursor:not-allowed;}
.usbtn:not([disabled]):hover{filter:brightness(1.3);}
/* 盤面ターゲティング */
.targetable{outline:2px solid #7fd8f8!important;cursor:pointer;position:relative;z-index:4;
  animation:tgpulse 1s ease-in-out infinite;}
@keyframes tgpulse{50%{outline-color:#fff;box-shadow:0 0 22px rgba(110,210,255,.75);}}
.targeting .mcard:not(.targetable),.targeting .sstrip:not(.targetable){filter:brightness(.42) saturate(.6);}
.targeting .proto.pchip{filter:brightness(.5);}
/* ghostbar もシートと同じ高さに */
#ghostbar{bottom:calc(190px + env(safe-area-inset-bottom));z-index:62;}
/* ================= v6: オンライン対戦 ================= */
#netwait{position:fixed;left:50%;top:40px;transform:translateX(-50%);z-index:105;display:none;
  background:rgba(8,10,16,.96);border:1px solid rgba(150,180,255,.6);color:#dfe6f5;
  font-size:11px;letter-spacing:.08em;padding:8px 16px;box-shadow:0 10px 28px rgba(0,0,0,.6);
  clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);}
#netwait.show{display:block;animation:netpulse 2s ease-in-out infinite;}
@keyframes netpulse{50%{box-shadow:0 0 20px rgba(120,160,255,.35)}}
.roomcode{font:900 34px var(--fm);letter-spacing:.34em;text-indent:.34em;color:var(--gold);
  border:1px dashed rgba(232,201,106,.55);padding:10px 6px;margin:12px auto;max-width:280px;
  text-shadow:0 0 18px rgba(232,201,106,.5);}
/* ================= v7 ================= */
.hand{height:auto;}
#uisheet,#ghostbar{bottom:calc(var(--handH,182px) + 12px + env(safe-area-inset-bottom));}
#uisheet.withcard{flex-direction:row;align-items:center;gap:12px;}
#uisheet .uscard{flex:0 0 auto;}
#uisheet .usmain{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0;}
.pctotal{margin-left:auto;flex:0 0 auto;font:900 19px var(--fm);color:#fff;line-height:1.3;
  background:rgba(4,7,12,.82);border:1px solid rgba(255,255,255,.6);padding:1px 10px;border-radius:3px;
  text-shadow:1px 0 0 rgba(90,220,255,.4),-1px 0 0 rgba(255,80,140,.3);}
.pctotal.win{border-color:#7fd8f8;color:#bfeeff;box-shadow:0 0 10px rgba(110,210,255,.4);}
.pctotal.rdy{border-color:var(--gold);color:var(--gold);animation:rdypulse 1.6s ease-in-out infinite;}
.proto.pchip .pcstamp{margin-left:auto;margin-right:6px;}
.proto.pchip.done .pctotal{margin-left:0;}
.stack .total{opacity:.5;font-size:9px;padding:0 5px;}
@media (max-height:720px){.note{display:none;}.topline{padding-top:2px;padding-bottom:0;}.bar{min-height:44px;}}
.proto.pchip .pcname{min-width:0;overflow:hidden;}
.pcglx{font-size:10.5px;white-space:nowrap;}
.pctotal{font-size:16px;padding:1px 8px;}

function pmeta(p){return PMETA[p]||PMETA.SPIRIT;}
const ARTCACHE={};
function makeRng(seed){let s=(seed>>>0)||1;return()=>((s=Math.imul(48271,s)%2147483647)&0x7fffffff)/2147483647;}
function hexRGBA(hex,a){const n=parseInt(hex.slice(1),16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;}

/* ---- shared painter helpers ---- */
function dabs(ctx,W,H,rng,colors,n,rMin,rMax,a){
  for(let i=0;i<n;i++){const c=colors[(rng()*colors.length)|0];
    const x=rng()*W,y=rng()*H,r=rMin+rng()*(rMax-rMin);
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,hexRGBA(c,a*(0.5+rng()*0.5)));g.addColorStop(1,hexRGBA(c,0));
    ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(x,y,r*(0.7+rng()*0.8),r*(0.5+rng()*0.6),rng()*Math.PI,0,7);ctx.fill();}
}
function glowAt(ctx,x,y,r,color,a){const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,hexRGBA(color,a));g.addColorStop(1,hexRGBA(color,0));ctx.fillStyle=g;ctx.fillRect(x-r,y-r,r*2,r*2);}
function silTower(ctx,x,base,w,h,color,a,rng,jag){
  ctx.fillStyle=hexRGBA(color,a);ctx.beginPath();ctx.moveTo(x,base);
  let y=base-h;ctx.lineTo(x,y);
  for(let i=0;i<jag;i++){const nx=x+w*(i+1)/jag;const ny=y+(rng()-0.5)*h*0.22;ctx.lineTo(nx-w/jag*0.3,ny);ctx.lineTo(nx,ny+(rng()-0.5)*h*0.1);}
  ctx.lineTo(x+w,base);ctx.closePath();ctx.fill();
}
function silArch(ctx,cx,base,w,h,color,a){
  ctx.fillStyle=hexRGBA(color,a);ctx.beginPath();
  ctx.moveTo(cx-w/2,base);ctx.lineTo(cx-w/2,base-h*0.55);
  ctx.quadraticCurveTo(cx,base-h*1.25,cx+w/2,base-h*0.55);ctx.lineTo(cx+w/2,base);
  ctx.lineTo(cx+w*0.32,base);ctx.lineTo(cx+w*0.32,base-h*0.5);
  ctx.quadraticCurveTo(cx,base-h*0.98,cx-w*0.32,base-h*0.5);ctx.lineTo(cx-w*0.32,base);ctx.closePath();ctx.fill();
}
function streaks(ctx,W,H,rng,color,n,ang,len,wid,a){
  ctx.save();ctx.strokeStyle=hexRGBA(color,a);ctx.lineCap='round';
  for(let i=0;i<n;i++){const x=rng()*W,y=rng()*H,l=len*(0.4+rng());
    ctx.lineWidth=wid*(0.4+rng());ctx.beginPath();ctx.moveTo(x,y);
    ctx.lineTo(x+Math.cos(ang)*l,y+Math.sin(ang)*l);ctx.stroke();}
  ctx.restore();
}
/* ---- per-protocol scenes (all-original abstract landscapes) ---- */
const SCENES={
ruins(ctx,W,H,m,rng){const[p0,p1,p2,p3,p4]=m.pal;
  glowAt(ctx,W*0.5,H*0.34,W*0.5,p3,0.55);glowAt(ctx,W*0.5,H*0.3,W*0.22,p4,0.6);
  // light shafts through canopy
  for(let i=0;i<4;i++){const x=W*(0.12+rng()*0.7);
    const g=ctx.createLinearGradient(x,0,x+W*0.16,H*0.8);
    g.addColorStop(0,hexRGBA(p4,0.22));g.addColorStop(1,hexRGBA(p4,0));
    ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+W*0.07,0);
    ctx.lineTo(x+W*0.26,H*0.85);ctx.lineTo(x+W*0.12,H*0.85);ctx.closePath();ctx.fill();}

  ctx.strokeStyle=hexRGBA(p4,0.75);ctx.lineWidth=W*0.014;

  for(let i=0;i<4;i++)silArch(ctx,W*(0.14+0.24*i),H*0.98,W*0.2,H*0.42,p0,0.85);
  silTower(ctx,-W*0.05,H,W*0.3,H*0.8,p1,0.55,rng,5);silTower(ctx,W*0.75,H,W*0.32,H*0.9,p1,0.55,rng,5);

  dabs(ctx,W,H,rng,[m.pop],70,W*0.008,W*0.035,0.5); // blossoms

cave(ctx,W,H,m,rng){const[p0,p1,p2,p3,p4]=m.pal;
  glowAt(ctx,W*0.5,H*0.52,W*0.62,p3,0.6);glowAt(ctx,W*0.3,H*0.3,W*0.3,m.pop,0.35);
  // drifting spirit wisps
  ctx.lineCap='round';
  for(let i=0;i<26;i++){const c=[p3,p4,m.pop][(rng()*3)|0];ctx.strokeStyle=hexRGBA(c,0.25+rng()*0.4);
    ctx.lineWidth=W*(0.004+rng()*0.012);const x=rng()*W,y=rng()*H;
    ctx.beginPath();ctx.moveTo(x,y);ctx.bezierCurveTo(x+W*0.12,y-H*0.08,x-W*0.1,y-H*0.16,x+W*0.06,y-H*0.24);ctx.stroke();}
  for(let i=0;i<40;i++){glowAt(ctx,rng()*W,rng()*H,W*(0.01+rng()*0.02),[p4,m.pop][(rng()*2)|0],0.6);}
  silTower(ctx,-W*0.08,H,W*0.34,H*0.5,p0,0.8,rng,6);silTower(ctx,W*0.72,H,W*0.36,H*0.62,p0,0.8,rng,6);
},
necropolis(ctx,W,H,m,rng){const[p0,p1,p2,p3,p4]=m.pal;
  // pale dead moon backlighting the ruins
  glowAt(ctx,W*0.68,H*0.2,W*0.4,p4,0.5);
  ctx.fillStyle=hexRGBA(p4,0.92);ctx.beginPath();ctx.arc(W*0.68,H*0.2,W*0.1,0,7);ctx.fill();
  ctx.fillStyle=hexRGBA(p3,0.35);ctx.beginPath();ctx.arc(W*0.66,H*0.185,W*0.032,0,7);ctx.fill();
  glowAt(ctx,W*0.5,H*0.95,W*0.6,m.pop,0.3); // smoldering horizon
  glowAt(ctx,W*0.2,H*0.6,W*0.3,p2,0.4);

  ctx.save();for(let i=0;i<44;i++){const x=rng()*W,y=rng()*H*0.6,s=W*(0.008+rng()*0.032);
    ctx.fillStyle=hexRGBA([p2,p3,m.pop,p4][(rng()*4)|0],0.55);ctx.translate(x,y);ctx.rotate(rng()*Math.PI);
    ctx.fillRect(-s/2,-s/2,s,s*0.7);ctx.setTransform(1,0,0,1,0,0);}ctx.restore();
  // drifting embers
  for(let i=0;i<36;i++)glowAt(ctx,rng()*W,H*(0.5+rng()*0.5),W*(0.004+rng()*0.01),m.pop,0.8);

torrent(ctx,W,H,m,rng){const[p0,p1,p2,p3,p4]=m.pal;
  glowAt(ctx,W*0.5,H*0.4,W*0.55,p3,0.45);
  // cascading water curtains
  for(let i=0;i<30;i++){const x=rng()*W;const w=W*(0.01+rng()*0.05);
    const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,hexRGBA(p4,0));g.addColorStop(0.35+rng()*0.3,hexRGBA([p3,p4][(rng()*2)|0],0.28+rng()*0.3));g.addColorStop(1,hexRGBA(p2,0));
    ctx.fillStyle=g;ctx.fillRect(x,0,w,H);}
  streaks(ctx,W,H,rng,p4,50,Math.PI/2.15,H*0.3,W*0.006,0.35);
  silTower(ctx,-W*0.06,H,W*0.3,H*0.34,p0,0.85,rng,4);silTower(ctx,W*0.7,H,W*0.4,H*0.3,p0,0.85,rng,4);
  dabs(ctx,W,H*0.7,rng,[p4,m.pop],70,W*0.008,W*0.03,0.4); // spray

infest(ctx,W,H,m,rng){const[p0,p1,p2,p3,p4]=m.pal;
  glowAt(ctx,W*0.5,H*0.5,W*0.5,p2,0.5);glowAt(ctx,W*0.3,H*0.65,W*0.3,m.pop,0.3);
  silTower(ctx,-W*0.04,H,W*0.3,H*0.95,p0,0.9,rng,8);silTower(ctx,W*0.74,H,W*0.3,H*0.9,p0,0.9,rng,8);
  // dripping strands
  ctx.lineCap='round';for(let i=0;i<34;i++){const x=rng()*W,l=H*(0.1+rng()*0.4);
    ctx.strokeStyle=hexRGBA([p2,p3][(rng()*2)|0],0.3+rng()*0.35);ctx.lineWidth=W*(0.003+rng()*0.006);
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+(rng()-0.5)*W*0.03,l);ctx.stroke();

  // spore clusters
  for(let i=0;i<22;i++){const x=rng()*W,y=H*(0.4+rng()*0.6);
    for(let j=0;j<5;j++)glowAt(ctx,x+(rng()-0.5)*W*0.06,y+(rng()-0.5)*W*0.06,W*(0.008+rng()*0.02),[p3,m.pop][(rng()*2)|0],0.55);}
},
vortex(ctx,W,H,m,rng){const[p0,p1,p2,p3,p4]=m.pal;
  const cx=W*0.5,cy=H*0.42;glowAt(ctx,cx,cy,W*0.6,p2,0.55);glowAt(ctx,cx,cy,W*0.2,p4,0.7);
  for(let i=0;i<26;i++){const r=W*0.06+i*W*0.035,a0=rng()*Math.PI*2,sw=1.2+rng()*2.2;
    ctx.strokeStyle=hexRGBA([p1,p2,p3,m.pop][(rng()*4)|0],0.5-i*0.012);
    ctx.lineWidth=W*(0.004+rng()*0.01);ctx.beginPath();ctx.arc(cx,cy,r,a0,a0+sw);ctx.stroke();}
  // inward shards
  ctx.save();for(let i=0;i<36;i++){const a=rng()*Math.PI*2,d=W*(0.2+rng()*0.5);
    const x=cx+Math.cos(a)*d,y=cy+Math.sin(a)*d,s=W*(0.006+rng()*0.02);
    ctx.fillStyle=hexRGBA([p3,p4][(rng()*2)|0],0.5);ctx.translate(x,y);ctx.rotate(a);
    ctx.fillRect(0,0,s*3,s*0.6);ctx.setTransform(1,0,0,1,0,0);}ctx.restore();
  silTower(ctx,-W*0.05,H,W*0.4,H*0.24,p0,0.8,rng,5);silTower(ctx,W*0.66,H,W*0.42,H*0.28,p0,0.8,rng,5);
},
industry(ctx,W,H,m,rng){const[p0,p1,p2,p3,p4]=m.pal;const mag='#d048a0';
  // acid sky + toxic sunset bands
  const sky=ctx.createLinearGradient(0,0,0,H*0.5);
  sky.addColorStop(0,hexRGBA(m.pop,0.4));sky.addColorStop(0.6,hexRGBA(mag,0.22));sky.addColorStop(1,hexRGBA(m.pop,0));
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H*0.5);
  glowAt(ctx,W*0.7,H*0.22,W*0.34,m.pop,0.5);glowAt(ctx,W*0.22,H*0.34,W*0.3,mag,0.4);
  glowAt(ctx,W*0.25,H*0.6,W*0.4,p2,0.4);
  for(let i=0;i<10;i++){const x=i/10*W+(rng()-0.5)*W*0.05;silTower(ctx,x,H*1.02,W*(0.06+rng()*0.1),H*(0.25+rng()*0.62),i%2?p0:p1,0.94,rng,3);}

  dabs(ctx,W,H*0.55,rng,[p4],26,W*0.02,W*0.06,0.16);
  // scaffolding grid lines
  ctx.strokeStyle=hexRGBA(p3,0.35);ctx.lineWidth=1;
  for(let i=0;i<18;i++){const y=rng()*H;ctx.beginPath();ctx.moveTo(rng()*W*0.4,y);ctx.lineTo(W*(0.6+rng()*0.4),y+(rng()-0.5)*H*0.08);ctx.stroke();}
  // lit windows
  for(let i=0;i<64;i++){const x=rng()*W,y=H*(0.3+rng()*0.65),s=W*(0.006+rng()*0.014);
    ctx.fillStyle=hexRGBA([p4,m.pop,mag][(rng()*3)|0],0.75);ctx.fillRect(x,y,s,s*0.6);}
},
beacon(ctx,W,H,m,rng){const[p0,p1,p2,p3,p4]=m.pal;
  const bx=W*0.5,by=H*0.3;glowAt(ctx,bx,by,W*0.55,p3,0.65);glowAt(ctx,bx,by,W*0.18,p4,0.9);
  // sweeping rays
  ctx.save();for(let i=0;i<10;i++){const a=rng()*Math.PI*2,sp=0.06+rng()*0.12;
    const g=ctx.createLinearGradient(bx,by,bx+Math.cos(a)*W,by+Math.sin(a)*W);
    g.addColorStop(0,hexRGBA(p4,0.5));g.addColorStop(1,hexRGBA(p4,0));
    ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(bx,by);
    ctx.arc(bx,by,W*1.1,a-sp,a+sp);ctx.closePath();ctx.fill();}ctx.restore();
  silTower(ctx,W*0.44,H,W*0.12,H*0.62,p0,0.85,rng,2);
  for(let i=0;i<5;i++)silTower(ctx,rng()*W,H*1.02,W*(0.08+rng()*0.12),H*(0.2+rng()*0.3),p1,0.7,rng,4);
  dabs(ctx,W,H,rng,[p3,m.pop],70,W*0.015,W*0.05,0.3);
},
inferno(ctx,W,H,m,rng){const[p0,p1,p2,p3,p4]=m.pal;
  glowAt(ctx,W*0.5,H*0.72,W*0.7,p2,0.6);glowAt(ctx,W*0.5,H*0.55,W*0.3,p3,0.6);
  // flame pillars
  for(let i=0;i<16;i++){const x=rng()*W,base=H*(0.75+rng()*0.25),h=H*(0.2+rng()*0.5),w=W*(0.02+rng()*0.06);
    const g=ctx.createLinearGradient(0,base,0,base-h);
    g.addColorStop(0,hexRGBA(p2,0.7));g.addColorStop(0.6,hexRGBA(p3,0.55));g.addColorStop(1,hexRGBA(p4,0));
    ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(x-w/2,base);
    ctx.bezierCurveTo(x-w,base-h*0.4,x+w*0.6,base-h*0.55,x,base-h);
    ctx.bezierCurveTo(x+w*1.1,base-h*0.5,x+w*0.8,base-h*0.25,x+w/2,base);ctx.closePath();ctx.fill();}
  for(let i=0;i<60;i++)glowAt(ctx,rng()*W,rng()*H*0.8,W*(0.004+rng()*0.012),[p3,p4,m.pop][(rng()*3)|0],0.8); // embers
  silTower(ctx,-W*0.06,H,W*0.36,H*0.3,p0,0.92,rng,6);silTower(ctx,W*0.7,H,W*0.36,H*0.34,p0,0.92,rng,6);
},
rush(ctx,W,H,m,rng){const[p0,p1,p2,p3,p4]=m.pal;
  const cx=W*0.62,cy=H*0.4;glowAt(ctx,cx,cy,W*0.5,p4,0.5);
  // radial speed lines
  ctx.save();ctx.lineCap='round';
  for(let i=0;i<60;i++){const a=rng()*Math.PI*2,r0=W*(0.08+rng()*0.1),r1=r0+W*(0.2+rng()*0.5);
    ctx.strokeStyle=hexRGBA([p3,p4,p2][(rng()*3)|0],0.25+rng()*0.4);ctx.lineWidth=W*(0.002+rng()*0.007);
    ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*r0,cy+Math.sin(a)*r0);ctx.lineTo(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1);ctx.stroke();}
  ctx.restore();
  // streaking clouds
  streaks(ctx,W,H*0.6,rng,p4,24,0,W*0.3,W*0.02,0.25);
  // green field below
  const g=ctx.createLinearGradient(0,H*0.72,0,H);g.addColorStop(0,hexRGBA(m.pop,0));g.addColorStop(1,hexRGBA(m.pop,0.5));
  ctx.fillStyle=g;ctx.fillRect(0,H*0.72,W,H*0.28);
  dabs(ctx,W,H*0.35,rng,[m.pop,p3],40,W*0.01,W*0.04,0.35);
},
darkwood(ctx,W,H,m,rng){const[p0,p1,p2,p3,p4]=m.pal;
  // rift of pale light above
  glowAt(ctx,W*0.5,H*0.12,W*0.3,p4,0.55);glowAt(ctx,W*0.5,H*0.45,W*0.45,p2,0.5);
  ctx.strokeStyle=hexRGBA(p4,0.8);ctx.lineWidth=W*0.006;ctx.beginPath();
  ctx.moveTo(W*0.38,H*0.06);ctx.lineTo(W*0.48,H*0.1);ctx.lineTo(W*0.44,H*0.15);ctx.lineTo(W*0.58,H*0.2);ctx.stroke();
  // moonbeams
  for(let i=0;i<3;i++){const x=W*(0.25+i*0.22+rng()*0.06);
    const g=ctx.createLinearGradient(x,H*0.08,x+W*0.1,H*0.9);
    g.addColorStop(0,hexRGBA([p4,m.pop][(i%2)],0.2));g.addColorStop(1,hexRGBA(p4,0));
    ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(x,H*0.05);ctx.lineTo(x+W*0.05,H*0.05);
    ctx.lineTo(x+W*0.2,H*0.92);ctx.lineTo(x+W*0.08,H*0.92);ctx.closePath();ctx.fill();}
  // towering dark trees / crystals with lit edges
  for(let i=0;i<12;i++){const x=rng()*W;const w=W*(0.03+rng()*0.08),h=H*(0.35+rng()*0.6);
    ctx.fillStyle=hexRGBA(i%3?p0:p1,0.92);ctx.beginPath();
    ctx.moveTo(x,H);ctx.lineTo(x+w*0.3,H-h);ctx.lineTo(x+w*0.55,H-h*1.06);ctx.lineTo(x+w*0.8,H-h*0.92);ctx.lineTo(x+w,H);ctx.closePath();ctx.fill();
    if(rng()<0.6){ctx.strokeStyle=hexRGBA([m.pop,p3][(rng()*2)|0],0.5);ctx.lineWidth=W*0.0035;
      ctx.beginPath();ctx.moveTo(x+w*0.3,H-h);ctx.lineTo(x+w*0.55,H-h*1.06);ctx.stroke();}}
  // fireflies / glints
  for(let i=0;i<60;i++)glowAt(ctx,rng()*W,H*(0.2+rng()*0.8),W*(0.004+rng()*0.011),[m.pop,p4,p3][(rng()*3)|0],0.8);
  dabs(ctx,W,H,rng,[p1,p2],80,W*0.03,W*0.1,0.24); // fog
},
mindscape(ctx,W,H,m,rng){const[p0,p1,p2,p3,p4]=m.pal;
  glowAt(ctx,W*0.5,H*0.4,W*0.55,p2,0.5);
  // dome spires
  for(let i=0;i<8;i++){const x=rng()*W,r=W*(0.05+rng()*0.12),base=H*(0.6+rng()*0.4);
    ctx.fillStyle=hexRGBA([p0,p1][(rng()*2)|0],0.85);
    ctx.beginPath();ctx.moveTo(x-r*0.3,base);ctx.lineTo(x-r*0.3,base-r*1.6);ctx.lineTo(x+r*0.3,base-r*1.6);ctx.lineTo(x+r*0.3,base);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.arc(x,base-r*1.6,r,Math.PI,0);ctx.fill();
    glowAt(ctx,x,base-r*1.6,r*0.7,[p3,m.pop][(rng()*2)|0],0.4);}
  // floating rings
  for(let i=0;i<12;i++){const x=rng()*W,y=rng()*H*0.6,r=W*(0.02+rng()*0.05);
    ctx.strokeStyle=hexRGBA([p3,p4,m.pop][(rng()*3)|0],0.5);ctx.lineWidth=W*0.004;
    ctx.beginPath();ctx.ellipse(x,y,r,r*0.4,rng()*Math.PI,0,7);ctx.stroke();}
  dabs(ctx,W,H,rng,[p2,p3,m.pop],90,W*0.015,W*0.06,0.28);
},
};
/* ---- glitch post-processing ---- */
function glitchPass(ctx,cv,W,H,rng,strength){
  // horizontal slice shifts (pixel-sort feel)
  const slices=Math.round(14*strength+rng()*10);
  for(let i=0;i<slices;i++){
    const y=(rng()*H)|0,h=Math.max(2,(rng()*H*0.045)|0),dx=((rng()-0.5)*W*0.14*strength)|0;
    if(!h)continue;ctx.drawImage(cv,0,y,W,h,dx,y,W,h);
    if(rng()<0.4){ctx.globalAlpha=0.16;ctx.globalCompositeOperation='screen';
      ctx.fillStyle=rng()<0.5?'#0ff':'#f2a';ctx.fillRect(0,y,W,h);
      ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';}
  }
  // mosaic block displacement
  const blocks=Math.round(22*strength);
  for(let i=0;i<blocks;i++){
    const bw=(W*(0.04+rng()*0.14))|0,bh=(H*(0.015+rng()*0.05))|0;
    const sx=(rng()*(W-bw))|0,sy=(rng()*(H-bh))|0;
    const dx=(sx+(rng()-0.5)*W*0.1)|0,dy=(sy+(rng()-0.5)*H*0.03)|0;
    ctx.drawImage(cv,sx,sy,bw,bh,dx,dy,bw,bh);
    if(rng()<0.3){ctx.globalAlpha=0.25;ctx.drawImage(cv,sx,sy,bw,bh,dx+2,dy,bw,bh);ctx.globalAlpha=1;}
  }
  // chromatic aberration echo
  ctx.globalCompositeOperation='screen';ctx.globalAlpha=0.10;
  ctx.drawImage(cv,2.5,0);ctx.drawImage(cv,-2.5,0.5);
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
}
function finishPass(ctx,W,H,rng){
  // scanlines
  ctx.globalAlpha=0.05;ctx.fillStyle='#000';
  for(let y=0;y<H;y+=3)ctx.fillRect(0,y,W,1);
  ctx.globalAlpha=1;
  // digital dust
  ctx.fillStyle='rgba(255,255,255,.5)';
  for(let i=0;i<Math.round(W*H/9000);i++){if(rng()<0.5)continue;ctx.globalAlpha=0.12+rng()*0.3;
    ctx.fillRect(rng()*W,rng()*H,1+rng()*2,1);}
  ctx.globalAlpha=1;
  // vignette
  const g=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.35,W/2,H/2,Math.max(W,H)*0.72);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.3)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}
function makeArt(proto,land){
  const key=proto+(land?':l':':p');
  if(ARTCACHE[key])return ARTCACHE[key];
  const m=pmeta(proto);const W=land?720:500,H=land?500:700;
  const cv=document.createElement('canvas');cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');const rng=makeRng(m.seed+(land?7:0));
  // base sky gradient
  const g=ctx.createLinearGradient(0,0,W*0.25,H);
  g.addColorStop(0,m.pal[2]);g.addColorStop(0.45,m.pal[1]);g.addColorStop(1,m.pal[0]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  dabs(ctx,W,H,rng,[m.pal[1],m.pal[2],m.pal[3]],80,W*0.05,W*0.16,0.18); // atmospheric underpaint
  (SCENES[m.paint]||SCENES.cave)(ctx,W,H,m,rng);
  dabs(ctx,W,H,rng,[m.pal[2],m.pal[3]],50,W*0.01,W*0.05,0.14); // unifying dabs
  // vividness boost: self-overlay raises contrast & chroma
  ctx.globalCompositeOperation='overlay';ctx.globalAlpha=0.4;ctx.drawImage(cv,0,0);
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
  glitchPass(ctx,cv,W,H,rng,1);
  finishPass(ctx,W,H,rng);
  const url=cv.toDataURL('image/jpeg',0.85);
  ARTCACHE[key]=url;return url;
}
function artBG(proto,land){return`background-image:url("${makeArt(proto,land)}")`;}

<script id="skin-pro-ui">
/* ==== COMPILE PRO SKIN : UI renderer overrides (game logic untouched) ==== */
'use strict';

/* ---- stack top card ---- */
function topEl(c,viewer,mine){

    d.innerHTML=`<div class="cbgrid"></div><div class="mcbi">${hexIcon('SPIRIT','mchexb')}</div><b class="mcval fd">${effectiveValue(c)}</b><small>${mine?'裏向き・自分の札':'HIDDEN'}</small><div class="holo"></div>`;

/* ---- covered card strip ---- */
function stripEl(c,viewer,mine){
  const d=document.createElement('div');d.dataset.cid=c.id;

    d.innerHTML=`<span class="ssval">${effectiveValue(c)}</span><span class="sstxt mono">${mine?'裏向き（自分）':'HIDDEN DATA'}</span>`;

/* ---- stacks (adds compile-ready state) ---- */
function renderStacks(id,p,viewer){
  const row=$(id);row.innerHTML='';
  for(let l=0;l<3;l++){
    const cards=G.players[p].lines[l],st=document.createElement('div');

    const tb=document.createElement('div');tb.className='total'+(t>opp?' win':'')+(t>=10?' rdy':'');tb.textContent=t;st.appendChild(tb);
    st.onclick=()=>openStack(p,l,viewer);row.appendChild(st);
  }
}
/* ---- hand ---- */
function renderHand(){
  const h=$('#hand');h.innerHTML='';
  const p=G.current,n=G.players[p].hand.length,mid=(n-1)/2;
  G.players[p].hand.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='hfan'+(selectedHandCard===c?' selected':'');
    d.dataset.cid=c.id;

  });
  if(!G.players[p].hand.length){

    h.appendChild(d);
    setTimeout(()=>{document.getElementById('refreshBtn')?.classList.add('pulsebtn');document.getElementById('sideRefresh')?.classList.add('pulsebtn');},0);
  }
}
/* ---- protocol landscape card (full) ---- */
function pcardHTML(name,{compiled=false}={}){

  return`<div class="pcard${compiled?' done':''}" style='${artBG(name,true)};--ac:${m.ac}'>

/* ---- board protocol chips ---- */
function renderProtos(id,p){
  const row=$(id);row.innerHTML='';
  G.players[p].protocols.forEach((pr,i)=>{
    const m=pmeta(pr.name),d=document.createElement('div');

function openProto(pr,p,l){

/* ---- announce cut-in ---- */
function announce(subj,title,desc='',tag='能力発動',cls=''){
  if(!SET.fx)return Promise.resolve();
  const el=$('#ann');const proto=typeof subj==='string'?subj:subj?.protocol;
  const m=pmeta(proto);
  el.className='announce'+(cls?' '+cls:'');
  el.style.setProperty('--b',m.ac);
  const dur=(cls==='gold'?1.8:1.35)*Math.max(SET.fx,.6);
  el.style.setProperty('--adur',dur+'s');
  el.innerHTML=`<div class="abox2" style="--ac:${m.ac}">
    <div class="aart" style='${artBG(proto,true)}'></div><div class="ascrim"></div>
    <div class="acnt"><div class="atag2">${esc(tag)}</div><div class="glx aname2" data-t="${esc(title)}">${esc(title)}</div>${desc?`<div class="atext2">${kw(desc)}</div>`:''}</div>
    <i class="acorn tl"></i><i class="acorn br"></i></div>`;
  void el.offsetWidth;el.classList.add('show');
  if(subj&&typeof subj!=='string'){const dom=elOf(subj);if(dom){dom.classList.add('fxhl');setTimeout(()=>dom.classList.remove('fxhl'),1200);}fxAtCard(subj,30);}
  else if(proto)fxBurst(proto,40);
  return sleep(dur*1000*.82);
}
/* ---- particle burst : holo shards ---- */
function fxBurst(protocol,n=55,at=null){
  if(!SET.fx)return;
  const cv=$('#fx'),ctx=cv.getContext('2d'),dpr=devicePixelRatio||1;
  cv.width=innerWidth*dpr;cv.height=innerHeight*dpr;
  const cx=(at?at.x:innerWidth/2)*dpr,cy=(at?at.y:innerHeight/2)*dpr;
  const m=pmeta(protocol),colors=[m.pal[2],m.pal[3],m.pal[4],m.pop,'#ffffff'],parts=[];
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=1.4+Math.random()*5.2,sq=Math.random()<.5;
    parts.push({x:cx,y:cy,vx:Math.cos(a)*s*dpr,vy:Math.sin(a)*s*dpr,rot:a,vr:(Math.random()-.5)*.3,
      life:30+Math.random()*38,t:0,r:(1+Math.random()*2.8)*dpr,c:colors[i%colors.length],sq});}
  const ring={t:0,life:26};
  function tick(){
    ctx.clearRect(0,0,cv.width,cv.height);ctx.globalCompositeOperation='lighter';let alive=false;
    if(ring.t++<ring.life){alive=true;const k=ring.t/ring.life;
      ctx.globalAlpha=(1-k)*.9;ctx.strokeStyle=m.ac;ctx.lineWidth=Math.max(.5,(2.6-2*k))*dpr;
      ctx.beginPath();ctx.arc(cx,cy,(6+k*120)*dpr,0,7);ctx.stroke();
      ctx.globalAlpha=(1-k)*.3;ctx.setLineDash([6*dpr,10*dpr]);
      ctx.beginPath();ctx.arc(cx,cy,(3+k*76)*dpr,0,7);ctx.stroke();ctx.setLineDash([]);}
    for(const p of parts){
      if(p.t++>=p.life)continue;alive=true;
      p.x+=p.vx;p.y+=p.vy;p.vx*=.965;p.vy=p.vy*.965+.04*dpr;p.rot+=p.vr;
      ctx.globalAlpha=1-p.t/p.life;
      if(p.sq){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.c;
        ctx.fillRect(-p.r*1.6,-p.r*.5,p.r*3.2,p.r);ctx.restore();}
      else{ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();}}
    ctx.globalAlpha=1;
    if(alive)requestAnimationFrame(tick);else ctx.clearRect(0,0,cv.width,cv.height);
  }
  if(!matchMedia('(prefers-reduced-motion: reduce)').matches)tick();
}

function pickLineWithGhost(p,card,lines,mode){
  return new Promise(res=>{
    const row=$('#myStacks');if(!row){res(null);return;}
    const stacks=[...row.children];
    const cleanup=()=>{

      stacks.forEach((st,i)=>{st.classList.remove('legal','blocked');st.onclick=()=>openStack(p,i,G.current);});

function chooseLine(title,lines=[0,1,2],allowCancel=false){
  const my=$('#myStacks'),op=$('#oppStacks');
  if(!G||!my||!op||my.children.length<3||op.children.length<3)return chooseLineModal(title,lines,allowCancel);
  return new Promise(res=>{
    const myS=[...my.children],opS=[...op.children];
    const cleanup=()=>{
      document.getElementById('ghostbar')?.remove();
      myS.forEach((st,i)=>{st.classList.remove('legal','blocked');st.onclick=()=>openStack(G.current,i,G.current);});
      opS.forEach((st,i)=>{st.classList.remove('legal','blocked');st.onclick=()=>openStack(other(G.current),i,G.current);});
    };
    const bind=(st,i)=>{
      if(lines.includes(i)){st.classList.add('legal');st.onclick=e=>{e.stopPropagation();cleanup();res(i);};}
      else{st.classList.add('blocked');st.onclick=e=>{e.stopPropagation();toast('このラインは選べません');};}
    };
    myS.forEach(bind);opS.forEach(bind);
    const bar=document.createElement('div');bar.id='ghostbar';
    bar.innerHTML=`<span>${esc(title)} — 光っているラインをタップ</span>${allowCancel?'<button id="ghostCancel">キャンセル</button>':''}`;
    document.body.appendChild(bar);
    if(allowCancel)document.getElementById('ghostCancel').onclick=()=>{cleanup();res(null);};
  });
}
/* ---- 移動：動かすカードを金枠で示し、行き先を盤面タップで選ぶ ---- */
async function moveCard(card,targetLine=null){
  const loc=cardLocation(card);if(!loc||loc.line==null)return false;
  const p=loc.player,source=loc.line;
  const label=card.faceDown?'裏向きカード':cardName(card);
  if(targetLine==null){
    const options=[0,1,2].filter(l=>l!==source);
    const el=elOf(card);el?.classList.add('movingcard');
    targetLine=await chooseLine(`${label} の移動先`,options,true);
    document.querySelectorAll('.movingcard').forEach(x=>x.classList.remove('movingcard'));
  }
  if(targetLine==null||targetLine===source)return false;
  const sourceStack=G.players[p].lines[source],wasTop=loc.index===sourceStack.length-1;
  sourceStack.splice(loc.index,1);
  if(wasTop)await revealTopIfNeeded(p,source,card);
  await beforeCover(p,targetLine,card);
  G.players[p].lines[targetLine].push(card);
  log(`${label} をLINE ${source+1}からLINE ${targetLine+1}へ移動`);
  render();fxAtCard(card,22);await pace(.8);
  return true;
}

/* ---- FXレイヤー（飛翔カード・浮きラベル・斬撃） ---- */
function fxLayer(){let l=document.getElementById('fxlayer');if(!l){l=document.createElement('div');l.id='fxlayer';document.body.appendChild(l);}return l;}
function visRect(sels){for(const s of sels){const e=document.querySelector(s);if(e&&e.offsetParent!==null)return e.getBoundingClientRect();}return null;}
function pileRect(p,kind){
  const own=p===G.current;
  return visRect(own?[`#meBar .p.${kind}`,`#sideMe .p.${kind}`]:[`#oppBar .p.${kind}`,`#sideOpp .p.${kind}`])
    ||{left:innerWidth/2-20,top:own?innerHeight-90:30,width:40,height:50};
}
function handRect(p){
  if(p===G.current){const r=visRect(['#hand']);if(r)return{left:r.left+r.width/2-40,top:r.top,width:80,height:r.height};}
  const r=visRect(['#oppBar .opphand','#sideOpp .opphand']);
  return r||pileRect(p,'deck');
}
function stackRectOf(p,l){
  const row=p===G.current?'#myStacks':'#oppStacks';
  const e=document.querySelectorAll(row+' .stack')[l];
  return e?e.getBoundingClientRect():null;
}
function flyCard({from,to,proto=null,back=false,delay=0}={}){
  if(!SET.fx||!from||!to)return;
  const l=fxLayer(),d=document.createElement('div');
  d.className='flycard'+(back||!proto?' back':'');
  if(proto&&!back)d.style.cssText=artBG(proto,false);
  d.style.left=(from.left+from.width/2-24)+'px';
  d.style.top=(from.top+from.height/2-33)+'px';
  l.appendChild(d);
  setTimeout(()=>{d.style.transform=`translate(${(to.left+to.width/2)-(from.left+from.width/2)}px,${(to.top+to.height/2)-(from.top+from.height/2)}px) scale(.5) rotate(${(Math.random()*36-18).toFixed(0)}deg)`;d.style.opacity='.12';},30+delay);
  setTimeout(()=>d.remove(),680+delay);
}
function floatLabel(rect,text,color='#fff'){
  if(!SET.fx||!rect)return;
  const l=fxLayer(),d=document.createElement('div');
  d.className='floatlabel';d.textContent=text;d.style.color=color;
  d.style.left=(rect.left+rect.width/2)+'px';d.style.top=(rect.top+rect.height/2)+'px';
  l.appendChild(d);setTimeout(()=>d.remove(),1350);
}
function slashFX(rect){
  if(!SET.fx||!rect)return;
  const l=fxLayer(),d=document.createElement('div');
  d.className='slashfx';
  d.style.left=(rect.left+rect.width/2)+'px';d.style.top=(rect.top+rect.height/2)+'px';
  d.innerHTML='<i></i><i></i>';

/* ---- 基本アクションに演出を接続（ロジックは原本どおり） ---- */
async function draw(p,n,{trigger=true}={}){
  let drawn=0;
  for(let i=0;i<n;i++){reshuffleIfNeeded(p);const c=G.players[p].deck.pop();if(!c)break;G.players[p].hand.push(c);drawn++;}
  if(drawn){
    const from=pileRect(p,'deck'),to=handRect(p);
    for(let i=0;i<Math.min(drawn,5);i++)flyCard({from,to,back:true,delay:i*95});
    floatLabel(to,`+${drawn} ドロー`,'#7fd8f8');
    log(`${playerName(p)} が${drawn}枚引いた`);render();await pace(.7);
    if(trigger)await triggerAfterDraw(p);
  }else toast('引けるカードがありません');
  return drawn;
}
async function discardCardsFromHand(target,cards,{event=true}={}){
  const from=handRect(target),to=pileRect(target,'trash');
  let n=0;
  for(const c of cards){
    const i=G.players[target].hand.indexOf(c);
    if(i>=0){G.players[target].hand.splice(i,1);sendToDiscard(c);n++;flyCard({from,to,proto:c.protocol,delay:n*110});}
  }
  if(n){
    slashFX(from);shakeScreen();
    floatLabel(from,`-${n}枚 捨て札`,'#ff8f9c');
    log(`${playerName(target)} が手札を${n}枚捨て札にした`);render();await pace(.7);
    if(event)await triggerAfterDiscard(target,n);
  }
  return n;
}
async function deleteCard(card,{suppressUncover=false}={}){
  const loc=cardLocation(card);if(!loc||loc.line==null)return false;
  const el=elOf(card),r=el?el.getBoundingClientRect():stackRectOf(loc.player,loc.line);
  if(r){fxBurst(card.protocol,55,{x:r.left+r.width/2,y:r.top+r.height/2});slashFX(r);floatLabel(r,'削除','#ff8f9c');}
  shakeScreen();
  flyCard({from:r,to:pileRect(loc.player,'trash'),proto:card.faceDown?null:card.protocol,back:card.faceDown});
  const stack=G.players[loc.player].lines[loc.line],wasTop=loc.index===stack.length-1;
  stack.splice(loc.index,1);sendToDiscard(card);
  log(`${card.faceDown?'裏向きカード':cardName(card)} を削除`);render();await pace();
  if(wasTop&&!suppressUncover)await revealTopIfNeeded(loc.player,loc.line,card);
  return true;
}
async function returnCard(card){
  const loc=cardLocation(card);if(!loc||loc.line==null)return false;
  const el=elOf(card),r=el?el.getBoundingClientRect():stackRectOf(loc.player,loc.line);
  if(r){fxBurst(card.protocol,30,{x:r.left+r.width/2,y:r.top+r.height/2});floatLabel(r,'手札に戻す','#7fd8f8');}
  flyCard({from:r,to:handRect(card.owner),proto:card.faceDown?null:card.protocol,back:card.faceDown});
  const stack=G.players[loc.player].lines[loc.line],wasTop=loc.index===stack.length-1;
  stack.splice(loc.index,1);card.faceDown=false;G.players[card.owner].hand.push(card);
  log(`カードを所有者の手札に戻した`);render();await pace(.8);
  if(wasTop)await revealTopIfNeeded(loc.player,loc.line,card);
  return true;
}
async function flipCard(card){
  const loc=cardLocation(card);if(!loc||loc.line==null)return false;
  if(!card.faceDown&&card.protocol==='METAL'&&card.value===6){log('METAL 6：反転する代わりに削除');return deleteCard(card);}
  card.faceDown=!card.faceDown;
  log(`カードを${card.faceDown?'裏向き':'表向き'}に反転`);render();
  const fel=elOf(card);
  if(fel&&SET.fx)fel.classList.add('flipin');
  fxAtCard(card,28);
  floatLabel(fel?fel.getBoundingClientRect():stackRectOf(loc.player,loc.line),card.faceDown?'反転 → 裏':'反転 → 表','#e8c96a');
  await pace(.9);
  if(!card.faceDown&&isTop(card))await activateVisibleCard(card,{reason:'flip',holder:loc.player,line:loc.line});
  return true;
}
async function playTopDeck(p,l,{faceDown=true,underCard=null}={}){
  const c=G.players[p].deck.pop();if(!c){toast('デッキが空です');return null;}
  c.faceDown=faceDown;
  flyCard({from:pileRect(p,'deck'),to:stackRectOf(p,l),back:true});
  if(underCard){const st=G.players[p].lines[l],idx=st.indexOf(underCard);st.splice(Math.max(0,idx),0,c);}
  else{await beforeCover(p,l,c);G.players[p].lines[l].push(c);}
  log(`${playerName(p)} がデッキ上からLINE ${l+1}へ裏向きでプレイ`);render();fxAtCard(c,20);await pace(.7);
  return c;
}
async function moveCard(card,targetLine=null){
  const loc=cardLocation(card);if(!loc||loc.line==null)return false;
  const p=loc.player,source=loc.line;
  const label=card.faceDown?'裏向きカード':cardName(card);
  if(targetLine==null){
    const options=[0,1,2].filter(l=>l!==source);
    const el=elOf(card);el?.classList.add('movingcard');
    targetLine=await chooseLine(`${label} の移動先`,options,true);
    document.querySelectorAll('.movingcard').forEach(x=>x.classList.remove('movingcard'));
  }
  if(targetLine==null||targetLine===source)return false;
  const fromR=elOf(card)?.getBoundingClientRect();
  const sourceStack=G.players[p].lines[source],wasTop=loc.index===sourceStack.length-1;
  sourceStack.splice(loc.index,1);
  if(wasTop)await revealTopIfNeeded(p,source,card);
  await beforeCover(p,targetLine,card);
  G.players[p].lines[targetLine].push(card);
  flyCard({from:fromR,to:stackRectOf(p,targetLine),proto:card.faceDown?null:card.protocol,back:card.faceDown});
  floatLabel(stackRectOf(p,targetLine),'移動','#7fd8f8');
  log(`${label} をLINE ${source+1}からLINE ${targetLine+1}へ移動`);

}

function renderHandOf(pp){

  G.players[pp].hand.forEach((c,i)=>{

function pickFromHand(target,{min=1,max=1,title='手札を選択',allowFewer=false}={}){
  return new Promise(res=>{
    const own=target===G.current;
    if(!own)renderHandOf(target);
    const h=$('#hand'),sel=[];
    let d,okBtn,cntEl;
    const cleanup=()=>{d.remove();renderHand();};
    const update=()=>{cntEl.textContent=`選択中 ${sel.length}枚（${min}〜${max}枚）— 下の手札をタップ`;okBtn.disabled=sel.length<min||sel.length>max;};
    [...h.querySelectorAll('.hfan')].forEach(el=>{
      el.onclick=()=>{
        const card=G.players[target].hand.find(c=>c.id===el.dataset.cid);if(!card)return;
        const i=sel.indexOf(card);
        if(i>=0){sel.splice(i,1);el.classList.remove('selected');}
        else if(sel.length<max){sel.push(card);el.classList.add('selected');}
        update();};
      el.oncontextmenu=e=>{e.preventDefault();};
    });
    const btns=[{label:'決定',cls:'gold usok',onClick:()=>{if(sel.length>=min&&sel.length<=max){const r=[...sel];cleanup();res(r);}}}];
    if(allowFewer)btns.push({label:'選ばない',onClick:()=>{cleanup();res([]);}});
    d=uiSheet({title:esc(title),sub:'<span class="uscount"></span>',buttons:btns});
    okBtn=d.querySelector('.usok');cntEl=d.querySelector('.uscount');update();
  });
}
async function chooseHandCards(target,{min=1,max=1,title='手札を選択',reason='',allowFewer=false}={}){
  const hand=G.players[target].hand;if(!hand.length)return[];
  await privacyGate(target,reason);
  const r=await pickFromHand(target,{min:Math.min(min,hand.length),max:Math.min(max,hand.length),title,allowFewer});
  await privacyReturn(target);
  return r||[];
}
/* ---- 汎用選択：選択肢が手札なら手札タップ、少なければシート ---- */
async function choose(title,sub,options,{allowCancel=false,columns=true}={}){
  if(!options.length){toast('選択できる対象がありません');return null;}
  const vals=options.map(o=>o.value===undefined?o:o.value);
  const hand=G?.players?.[G.current]?.hand;
  if(hand&&vals.every(v=>hand.includes(v))){
    const picked=await pickFromHand(G.current,{min:1,max:1,title,allowFewer:allowCancel});
    return picked&&picked.length?picked[0]:null;
  }
  if(options.length<=4){
    return new Promise(res=>{
      let d;
      d=uiSheet({title:esc(title),sub:kw(sub),buttons:[
        ...options.map(o=>({html:`<strong>${o.title||esc(String(o.label??o))}</strong>${o.desc?`<small>${o.desc}</small>`:''}`,onClick:()=>{d.remove();res(o.value===undefined?o:o.value);}})),
        ...(allowCancel?[{label:'キャンセル',cls:'danger',onClick:()=>{d.remove();res(null);}}]:[])]});
    });
  }
  const body=`<div class="choicegrid" id="choiceGrid"></div>`;
  const p=showModal({title,sub,body,buttons:allowCancel?[{label:'キャンセル',value:null}]:[]});
  const grid=$('#choiceGrid');
  options.forEach(o=>{const b=document.createElement('button');b.className='choice';b.innerHTML=`<strong>${o.title||esc(String(o.label??o))}</strong>${o.desc?`<small>${o.desc}</small>`:''}`;b.onclick=()=>closeModal(o.value===undefined?o:o.value);grid.appendChild(b);});
  return p;
}
/* ---- 対象カード選択：盤面のカードが直接光る ---- */
function chooseFieldCard(title,filter=()=>true,{allowCancel=false,viewer=G.current}={}){
  const coveredOK=/覆われ/.test(title);
  const cands=[];
  for(let q=0;q<2;q++)for(let l=0;l<3;l++){
    const line=G.players[q].lines[l];
    line.forEach((c,i)=>{
      const covered=i<line.length-1;
      if(!coveredOK&&covered)return;
      if(!filter(c,{player:q,line:l,index:i,covered}))return;
      cands.push(c);
    });
  }
  if(!cands.length){toast('選択できる対象がありません');return Promise.resolve(null);}
  const els=cands.map(c=>elOf(c));
  if(els.some(e=>!e)){ // DOMに無い場合はシート選択にフォールバック
    return choose(title,'対象を選択してください。',cands.map(c=>({title:(c.faceDown&&cardLocation(c).player!==viewer)?'裏向きカード':cardName(c),desc:`LINE ${cardLocation(c).line+1} / 値${effectiveValue(c)}`,value:c})),{allowCancel});
  }
  return new Promise(res=>{
    let d;
    const cleanup=()=>{
      d.remove();
      document.getElementById('gameMain').classList.remove('targeting');
      document.querySelectorAll('.targetable').forEach(x=>{x.classList.remove('targetable');x.onclick=null;});
      render();
    };
    els.forEach((el,i)=>{
      el.classList.add('targetable');
      el.onclick=e=>{e.stopPropagation();const c=cands[i];cleanup();res(c);};
    });
    document.getElementById('gameMain').classList.add('targeting');
    d=uiSheet({title:esc(title),sub:'光っているカードをタップ'+(coveredOK?'（覆われたカードが対象）':''),
      buttons:allowCancel?[{label:'キャンセル',cls:'danger',onClick:()=>{cleanup();res(null);}}]:[]});
  });
}
/* ---- プレイ時の表裏選択もシートに（カードは手札で持ち上がる） ---- */
async function promptPlayCard(p,card,{free=false}={}){
  if(!G.players[p].hand.includes(card))return false;
  const up=legalFaceUpLines(p,card),down=legalFaceDownLines(p);
  if(!up.length&&!down.length){toast('プレイできるラインがありません');return false;}
  const hel=elOf(card);hel?.classList.add('selected');
  const mode=await new Promise(res=>{
    let d;
    const btns=[];
    if(up.length)btns.push({html:`<strong>表向きでプレイ</strong><small>効果発動／ライン ${up.map(x=>x+1).join('・')}</small>`,cls:'gold',onClick:()=>{d.remove();res('up');}});
    if(down.length)btns.push({html:`<strong>裏向きでプレイ</strong><small>値2・効果なし／ライン ${down.map(x=>x+1).join('・')}</small>`,onClick:()=>{d.remove();res('down');}});
    if(!up.length)btns.push({html:`<strong style="opacity:.45">表向き不可</strong><small>同名プロトコルのラインがありません</small>`,onClick:()=>{}});
    btns.push({label:'キャンセル',cls:'danger',onClick:()=>{d.remove();res(null);}});
    d=uiSheet({title:esc(cardName(card)),sub:kw(cardText(card)),buttons:btns,cardEl:scaled(fullCard(card),Math.min(120,Math.round(innerWidth*0.3)))});
  });
  hel?.classList.remove('selected');
  if(!mode)return false;
  const lines=mode==='up'?up:down;
  const l=await pickLineWithGhost(p,card,lines,mode);
  if(l==null)return false;
  const fromR=elOf(card)?.getBoundingClientRect();
  removeFromHand(p,card);card.faceDown=mode==='down';
  await beforeCover(p,l,card);
  const covering=G.players[p].lines[l].length>0;
  G.players[p].lines[l].push(card);
  flyCard({from:fromR,to:stackRectOf(p,l),proto:card.faceDown?null:card.protocol,back:card.faceDown});
  log(`${playerName(p)} が${card.faceDown?'裏向きカード':cardName(card)}をLINE ${l+1}へ${card.faceDown?'裏向き':'表向き'}でプレイ`);
  render();fxAtCard(card,40);await pace(.6);
  if(!card.faceDown)await activateVisibleCard(card,{reason:'play',holder:p,line:l,covering});
  return true;
}

</script>
<script id="skin-pro-net">
/* ==== COMPILE PRO : オンライン対戦（ルームコード式P2P / PeerJS） ==== */
'use strict';
const NET={on:false,role:0,peer:null,conn:null,seq:0,pending:{},names:['PLAYER 1','PLAYER 2']};
function isMyTurn(){return !NET.on||(G&&G.current===NET.role);}
function loadPeerJS(){
  return new Promise((res,rej)=>{
    if(window.Peer)return res();
    const s=document.createElement('script');
    s.src='https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
    s.onload=()=>res();s.onerror=()=>rej(new Error('PeerJSを読み込めません（要インターネット）'));
    document.head.appendChild(s);
  });
}
function netSend(m){try{if(NET.conn&&NET.conn.open)NET.conn.send(JSON.stringify(m));}catch(e){console.error('netSend',e);}}
let _nsT=0;
function netQueueState(){if(!NET.on)return;clearTimeout(_nsT);_nsT=setTimeout(()=>netSend({t:'state',G}),200);}
function showNetWait(on,msg){
  let b=document.getElementById('netwait');
  if(!b){b=document.createElement('div');b.id='netwait';document.body.appendChild(b);}
  b.textContent=msg||'相手の手番です — 操作を待っています…';
  b.classList.toggle('show',!!on);
}
function netRoomCode(){const A='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<5;i++)s+=A[Math.floor(Math.random()*A.length)];return s;}
/* ---- 接続確立 ---- */
function netBindConn(conn){
  NET.conn=conn;
  conn.on('data',raw=>{try{netOnMsg(JSON.parse(raw));}catch(e){console.error('net msg',e);}});
  conn.on('close',()=>{showNetWait(true,'⚠ 接続が切れました。ページを再読み込みして部屋を作り直してください。');toast('通信が切断されました',4000);});
  conn.on('error',e=>console.error('conn',e));
}
async function netHost(){
  const myName=($('#name0')?.value||'').trim()||'PLAYER 1';
  await loadPeerJS();
  const code=netRoomCode();
  const peer=new Peer('cmpl-'+code+'-h');NET.peer=peer;
  const body=`<div class="privacy"><div class="lock">◇</div><h3>ルームコード</h3>
    <div class="roomcode">${code}</div>
    <p>このコードを対戦相手に伝えてください。<br>相手が「コードで参加」に入力すると接続されます。<br><span id="netStat">接続を待っています…</span></p></div>`;
  const pr=showModal({title:'オンライン対戦 — 部屋を作成',sub:'',body,buttons:[{label:'やめる',value:null}]});
  peer.on('error',e=>{$('#netStat')&&($('#netStat').textContent='エラー: '+e.type+'（もう一度お試しください）');});
  peer.on('connection',conn=>{
    conn.on('open',()=>{
      NET.on=true;NET.role=0;netBindConn(conn);
      NET.names[0]=myName;
      netSend({t:'hello',name:myName});
      closeModal('connected');
    });
  });
  const r=await pr;
  if(r!=='connected'){try{peer.destroy();}catch(e){}return;}
  netLobby();
}
async function netJoin(){
  const myName=($('#name0')?.value||'').trim()||'PLAYER 2';
  const body=`<div class="setupform"><label>ルームコード<input id="joinCode" maxlength="5" style="text-transform:uppercase" placeholder="例: AB3CD"></label></div>`;
  const code=await showModal({title:'オンライン対戦 — コードで参加',sub:'ホストから聞いた5文字のコードを入力してください。',body,buttons:[{label:'やめる',value:null},{label:'接続する',value:'go',className:'primary'}]}).then(v=>v==='go'?($('#joinCode')?.value||'').trim().toUpperCase():null);
  if(!code)return;
  try{await loadPeerJS();}catch(e){toast(e.message,3500);return;}
  toast('接続中…');
  const peer=new Peer();NET.peer=peer;
  peer.on('error',e=>toast('接続エラー: '+e.type+'（コードを確認してください）',3500));
  peer.on('open',()=>{
    const conn=peer.connect('cmpl-'+code+'-h',{reliable:true});
    conn.on('open',()=>{
      NET.on=true;NET.role=1;netBindConn(conn);
      NET.names[1]=myName;
      netSend({t:'hello',name:myName});
      netLobby();
    });
  });
}
function netLobby(){
  $('#setup').classList.remove('hidden');
  const isHost=NET.role===0;
  $('#setupBox').innerHTML=`<div class="ttlwrap"><h1 class="glx ttl2" data-t="ONLINE MATCH">ONLINE MATCH</h1></div>
    <p class="ttldesc">接続しました。<b id="lobbyNames">${esc(NET.names[0])} vs ${esc(NET.names[1])}</b><br>
    ${isHost?'準備ができたら開始してください（プロトコルは自動ドラフトされます）。':'ホストの開始を待っています…'}</p>
    ${isHost?'<div class="setupactions"><button class="primary" id="netStart">対戦開始（自動ドラフト）</button></div>':''}`;
  if(isHost)$('#netStart').onclick=()=>netQuickStart();
}
function netQuickStart(){
  draft.names=[NET.names[0],NET.names[1]];
  draft.first=Math.random()<.5?0:1;
  draft.pool=shuffle([...PROTOCOLS]);
  draft.picks=[[],[]];
  draft.schedule=[draft.first,other(draft.first),other(draft.first),draft.first,draft.first,other(draft.first)];
  for(let i=0;i<6;i++)draft.picks[draft.schedule[i]].push(draft.pool[i]);
  finishSetup();
}
/* ---- メッセージ処理 ---- */
async function netOnMsg(m){
  if(m.t==='hello'){NET.names[NET.role===0?1:0]=m.name||'相手';const ln=document.getElementById('lobbyNames');if(ln)ln.textContent=`${NET.names[0]} vs ${NET.names[1]}`;return;}
  if(m.t==='state'){
    G=m.G;stableState=true;autosave(true);
    $('#setup').classList.add('hidden');$('#handoff').classList.remove('show');
    render();
    if(G.winner!=null){showNetWait(false);showModal({title:`${playerName(G.winner)} WIN`,sub:'3つのプロトコルをすべてコンパイルしました。',body:'<div class="privacy"><div class="lock">◇</div><h3 class="winner">COMPILE COMPLETE</h3></div>',buttons:[{label:'閉じる',value:1,className:'primary'}]});return;}
    if(G.phase==='handoff'&&G.current===NET.role){showNetWait(false);toast('あなたの手番です');runTurn();}
    else if(G.current!==NET.role)showNetWait(true);
    return;}
  if(m.t==='ann'){const[proto,title,desc,tag,cls]=m.a;announce(proto,title,desc,tag,cls);return;}
  if(m.t==='req'){
    G=m.G;stableState=true;render();showNetWait(false);
    let result=null;
    try{
      if(m.kind==='hand'){
        const r=await pickFromHand(NET.role,{min:m.payload.min,max:m.payload.max,title:m.payload.title,allowFewer:!!m.payload.allowFewer});
        result=(r||[]).map(c=>c.id);
      }else if(m.kind==='field'){
        const cands=m.payload.ids.map(id=>allFieldCards().find(c=>c.id===id)).filter(Boolean);
        const els=cands.map(c=>elOf(c));
        result=await new Promise(res=>{
          let d;
          const cleanup=()=>{d.remove();document.getElementById('gameMain').classList.remove('targeting');document.querySelectorAll('.targetable').forEach(x=>{x.classList.remove('targetable');x.onclick=null;});render();};
          els.forEach((el,i)=>{if(!el)return;el.classList.add('targetable');el.onclick=e=>{e.stopPropagation();const c=cands[i];cleanup();res(c.id);};});
          document.getElementById('gameMain').classList.add('targeting');
          d=uiSheet({title:esc(m.payload.title),sub:'光っているカードをタップ',buttons:m.payload.allowCancel?[{label:'選ばない',cls:'danger',onClick:()=>{cleanup();res(null);}}]:[]});
        });
      }
    }catch(e){console.error('req',e);}
    netSend({t:'res',id:m.id,result});
    showNetWait(true);
    return;}
  if(m.t==='res'){
    const res=NET.pending[m.id];delete NET.pending[m.id];
    document.getElementById('uisheet')?.remove();
    if(res)res(m.result);
    return;}
}
function netRequest(kind,payload){
  return new Promise(res=>{
    const id=++NET.seq;NET.pending[id]=res;
    netSend({t:'req',id,kind,payload,G});
    uiSheet({title:'相手の選択を待っています…',sub:esc(payload.title||''),buttons:[]});
  });
}
/* ---- 既存関数へのネット対応ラップ ---- */
const _log2=log;
log=function(msg){_log2(msg);if(NET.on&&isMyTurn())netQueueState();};
const _ann2=announce;
announce=function(subj,title,desc='',tag='能力発動',cls=''){
  if(NET.on&&isMyTurn()&&NET.conn)netSend({t:'ann',a:[typeof subj==='string'?subj:subj?.protocol,title,desc,tag,cls]});
  return _ann2(subj,title,desc,tag,cls);
};
const _pg2=privacyGate,_pr2=privacyReturn;
privacyGate=function(target,reason){if(NET.on)return Promise.resolve();return _pg2(target,reason);};
privacyReturn=function(target){if(NET.on)return Promise.resolve();return _pr2(target);};
const _chc2=chooseHandCards;
chooseHandCards=async function(target,opts={}){
  if(NET.on&&target!==NET.role){
    const hand=G.players[target].hand;if(!hand.length)return[];
    const ids=await netRequest('hand',{min:Math.min(opts.min??1,hand.length),max:Math.min(opts.max??1,hand.length),title:opts.title||'手札を選択',allowFewer:!!opts.allowFewer});
    return (ids||[]).map(id=>G.players[target].hand.find(c=>c.id===id)).filter(Boolean);
  }
  return _chc2(target,opts);
};
const _cfc2=chooseFieldCard;
chooseFieldCard=function(title,filter=()=>true,opts={}){
  const viewer=opts.viewer??G.current;
  if(NET.on&&viewer!==NET.role){
    const coveredOK=/覆われ/.test(title);const cands=[];
    for(let q=0;q<2;q++)for(let l=0;l<3;l++){const line=G.players[q].lines[l];
      line.forEach((c,i)=>{const covered=i<line.length-1;
        if(!coveredOK&&covered)return;
        if(!filter(c,{player:q,line:l,index:i,covered}))return;
        cands.push(c);});}
    if(!cands.length){toast('選択できる対象がありません');return Promise.resolve(null);}
    return netRequest('field',{title,ids:cands.map(c=>c.id),allowCancel:!!opts.allowCancel}).then(id=>cands.find(c=>c.id===id)||null);
  }
  return _cfc2(title,filter,opts);
};
const _mp2=mainPlay,_mr2=mainRefresh;
mainPlay=function(c){if(NET.on&&!isMyTurn()){toast('相手の手番です');return;}return _mp2(c);};
mainRefresh=function(){if(NET.on&&!isMyTurn()){toast('相手の手番です');return;}return _mr2();};
const _sh2=showHandoff;
showHandoff=function(){
  if(!NET.on)return _sh2();
  netSend({t:'state',G});
  if(G.current===NET.role){showNetWait(false);toast('あなたの手番です');runTurn();}
  else showNetWait(true);
};
/* ---- ネット対戦時は常に自分視点で描画 ---- */
function render(){

  const v=NET.on?NET.role:G.current,o=other(v);
  renderProtos('#myProtos',v);renderProtos('#oppProtos',o);
  renderStacks('#myStacks',v,v);renderStacks('#oppStacks',o,v);

function renderHand(){renderHandView(NET.on?NET.role:G.current);}
function renderBarsView(v){

  $('#meBar').innerHTML=`${pileHTML('deck',me.deck.length,'DECK')}${phaseHTML()}${pileHTML('trash',me.discard.length,'TRASH')}`;
  const myAct=!NET.on||G.current===NET.role;
  $('#actionBar').innerHTML=`<div class="actions"><button class="primary" id="playHint" ${G.phase!=='action'||G.busy||!myAct?'disabled':''}>手札からプレイ</button><button id="refreshBtn" ${G.phase!=='action'||G.busy||!myAct?'disabled':''}>リフレッシュ</button><button class="view" id="handListBtn">手札一覧</button><button class="view" id="fieldBtn">フィールド</button><button class="view" id="logBtn">ログ</button><button class="view" id="rulesBtn">ルール</button><button class="small" id="setBtn">設定</button><button class="small" id="saveBtn">保存</button><button class="small danger" id="newBtn">新規</button></div>`;
  $('#handListBtn').onclick=openHandAll;$('#setBtn').onclick=openSettings;$('#refreshBtn').onclick=mainRefresh;$('#playHint').onclick=()=>toast('下の手札からカードを選択してください');$('#fieldBtn').onclick=openFieldAll;$('#logBtn').onclick=openLog;$('#rulesBtn').onclick=openRules;$('#saveBtn').onclick=()=>{autosave(true);toast('保存しました');};$('#newBtn').onclick=async()=>{if(await confirmAsk('新しいゲーム','現在の対局を終了します。','新規ゲーム','戻る'))location.reload();};
  $('#turnBadge').textContent=`TURN ${G.turn} / ${esc(G.players[G.current].name)}`;
  $('#note').textContent=NET.on?(G.current===NET.role?'あなたの手番：手札をタップしてプレイ、またはリフレッシュ':'相手の手番です — 盤面を見て待ちましょう'):(G.phase==='action'?`${me.name}：手札のカードをタップしてプレイ、またはリフレッシュ`:'フェイズを処理中');
}

/* ---- タイトル画面にオンラインボタンを追加 ---- */
const _rw2=renderWelcome;
renderWelcome=function(){

  const acts=document.querySelector('.setupactions');
  if(acts&&!document.getElementById('netHostBtn')){

<script id="skin-pro-v7">
/* ==== v7: 攻撃演出・レイアウト適応・合計値表示・リフレッシュ変更 ==== */
'use strict';
/* ---- 効果元カードの追跡 ---- */
let FXSRC=null;
const _avc7=activateVisibleCard;
activateVisibleCard=function(card,ctx){FXSRC=card;const p=_avc7(card,ctx);return Promise.resolve(p).finally(()=>{FXSRC=null;});};
/* ---- プロトコル個性つき攻撃ビーム ---- */
const BEAMSTYLE={WATER:'stream',SPIRIT:'stream',PLAGUE:'stream',FIRE:'stream',LIFE:'pulse',LIGHT:'bolt',METAL:'bolt',SPEED:'bolt',DEATH:'bolt',GRAVITY:'spiral',PSYCHIC:'spiral',DARKNESS:'spiral'};
function beamFX(fromR,toR,proto){
  if(!SET.fx||!fromR||!toR)return Promise.resolve();
  const cv=$('#fx'),ctx=cv.getContext('2d'),dpr=devicePixelRatio||1;
  cv.width=innerWidth*dpr;cv.height=innerHeight*dpr;
  const m=pmeta(proto),style=BEAMSTYLE[proto]||'bolt';
  const x0=(fromR.left+fromR.width/2)*dpr,y0=(fromR.top+fromR.height/2)*dpr;
  const x1=(toR.left+toR.width/2)*dpr,y1=(toR.top+toR.height/2)*dpr;
  const cols=[m.pal[3],m.pal[4],m.pop,'#ffffff'];
  const T=Math.round(40*Math.max(SET.fx,.55));let f=0;
  return new Promise(res=>{
    let done=false;const fin=()=>{if(done)return;done=true;try{ctx.clearRect(0,0,cv.width,cv.height);}catch(e){}res();};
    const guard=setTimeout(fin,1800);
    function tick(){
      ctx.clearRect(0,0,cv.width,cv.height);ctx.globalCompositeOperation='lighter';
      const k=f/T,adv=Math.min(1,k*1.55);
      if(style==='stream'){
        for(let s=0;s<5;s++){
          ctx.strokeStyle=cols[s%4];ctx.globalAlpha=.5*(1-k*.35);ctx.lineWidth=(3.2-s*.5)*dpr;ctx.lineCap='round';
          ctx.beginPath();ctx.moveTo(x0,y0);
          const mx=(x0+x1)/2+Math.sin(f*.5+s*2.1)*44*dpr,my=(y0+y1)/2+Math.cos(f*.42+s)*32*dpr;
          ctx.quadraticCurveTo(mx,my,x0+(x1-x0)*adv,y0+(y1-y0)*adv);ctx.stroke();}
      }else if(style==='bolt'){
        for(let s=0;s<3;s++){
          ctx.strokeStyle=cols[s%4];ctx.globalAlpha=.75*(1-k*.45);ctx.lineWidth=(2.6-s*.6)*dpr;
          ctx.beginPath();ctx.moveTo(x0,y0);
          for(let i=1;i<=6;i++){const t=i/6*adv;
            ctx.lineTo(x0+(x1-x0)*t+(i<6?(Math.random()-.5)*28*dpr:0),y0+(y1-y0)*t+(i<6?(Math.random()-.5)*28*dpr:0));}
          ctx.stroke();}
      }else if(style==='spiral'){
        const cx=x0+(x1-x0)*adv,cy=y0+(y1-y0)*adv;
        ctx.strokeStyle=cols[0];ctx.globalAlpha=.55;ctx.lineWidth=2*dpr;
        ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(cx,cy);ctx.stroke();
        for(let s=0;s<4;s++){
          ctx.strokeStyle=cols[s%4];ctx.globalAlpha=.6*(1-k*.3);ctx.lineWidth=2.2*dpr;
          const r=Math.max(3*dpr,(34-s*7)*dpr*(1-adv)+7*dpr);
          ctx.beginPath();ctx.arc(x1,y1,r,f*.32+s*1.6,f*.32+s*1.6+4.4);ctx.stroke();}
      }else{
        for(let s=0;s<5;s++){const t=((k*1.4)+s*.14)%1;if(t>adv)continue;
          const px=x0+(x1-x0)*t,py=y0+(y1-y0)*t;
          ctx.fillStyle=cols[s%4];ctx.globalAlpha=.65;
          ctx.beginPath();ctx.arc(px,py,(6-s)*dpr,0,7);ctx.fill();
          ctx.strokeStyle=cols[(s+1)%4];ctx.globalAlpha=.4;
          ctx.beginPath();ctx.arc(px,py,(9-s)*dpr,0,7);ctx.stroke();}
      }
      for(let i=0;i<7;i++){const t=(((f*.06)+i/7)%1)*adv;
        ctx.fillStyle=cols[i%4];ctx.globalAlpha=.85*(1-k*.3);
        ctx.beginPath();ctx.arc(x0+(x1-x0)*t,y0+(y1-y0)*t,2.3*dpr,0,7);ctx.fill();}
      ctx.globalAlpha=1;
      if(++f<T&&!done)requestAnimationFrame(tick);
      else{clearTimeout(guard);fin();}
    }
    if(matchMedia('(prefers-reduced-motion: reduce)').matches){clearTimeout(guard);fin();}else tick();
  });
}
async function attackFrom(tRect){
  if(!SET.fx||!FXSRC||!tRect)return;
  const loc=cardLocation(FXSRC);if(!loc)return;
  const src=elOf(FXSRC);if(!src)return;
  src.classList.add('fxhl');setTimeout(()=>src.classList.remove('fxhl'),1000);
  await beamFX(src.getBoundingClientRect(),tRect,FXSRC.protocol);
}
/* ---- 破壊系アクションを攻撃演出つきで再定義 ---- */
async function deleteCard(card,{suppressUncover=false}={}){
  const loc=cardLocation(card);if(!loc||loc.line==null)return false;
  const el=elOf(card),r=el?el.getBoundingClientRect():stackRectOf(loc.player,loc.line);
  await attackFrom(r);
  if(r){fxBurst(card.protocol,55,{x:r.left+r.width/2,y:r.top+r.height/2});slashFX(r);floatLabel(r,'削除','#ff8f9c');}
  shakeScreen();
  flyCard({from:r,to:pileRect(loc.player,'trash'),proto:card.faceDown?null:card.protocol,back:card.faceDown});
  const stack=G.players[loc.player].lines[loc.line],wasTop=loc.index===stack.length-1;
  stack.splice(loc.index,1);sendToDiscard(card);
  log(`${card.faceDown?'裏向きカード':cardName(card)} を削除`);render();await pace();
  if(wasTop&&!suppressUncover)await revealTopIfNeeded(loc.player,loc.line,card);
  return true;
}
async function returnCard(card){
  const loc=cardLocation(card);if(!loc||loc.line==null)return false;
  const el=elOf(card),r=el?el.getBoundingClientRect():stackRectOf(loc.player,loc.line);
  await attackFrom(r);
  if(r){fxBurst(card.protocol,30,{x:r.left+r.width/2,y:r.top+r.height/2});floatLabel(r,'手札に戻す','#7fd8f8');}
  flyCard({from:r,to:handRect(card.owner),proto:card.faceDown?null:card.protocol,back:card.faceDown});
  const stack=G.players[loc.player].lines[loc.line],wasTop=loc.index===stack.length-1;
  stack.splice(loc.index,1);card.faceDown=false;G.players[card.owner].hand.push(card);
  log(`カードを所有者の手札に戻した`);render();await pace(.8);
  if(wasTop)await revealTopIfNeeded(loc.player,loc.line,card);
  return true;
}
async function flipCard(card){
  const loc=cardLocation(card);if(!loc||loc.line==null)return false;
  if(!card.faceDown&&card.protocol==='METAL'&&card.value===6){log('METAL 6：反転する代わりに削除');return deleteCard(card);}
  const fel0=elOf(card);
  if(FXSRC&&FXSRC!==card)await attackFrom(fel0?fel0.getBoundingClientRect():stackRectOf(loc.player,loc.line));
  card.faceDown=!card.faceDown;
  log(`カードを${card.faceDown?'裏向き':'表向き'}に反転`);render();
  const fel=elOf(card);
  if(fel&&SET.fx)fel.classList.add('flipin');
  fxAtCard(card,28);
  floatLabel(fel?fel.getBoundingClientRect():stackRectOf(loc.player,loc.line),card.faceDown?'反転 → 裏':'反転 → 表','#e8c96a');
  await pace(.9);
  if(!card.faceDown&&isTop(card))await activateVisibleCard(card,{reason:'flip',holder:loc.player,line:loc.line});
  return true;
}
async function discardCardsFromHand(target,cards,{event=true}={}){
  const from=handRect(target),to=pileRect(target,'trash');
  if(cards.length&&FXSRC&&FXSRC.owner!==target)await attackFrom(from);
  let n=0;
  for(const c of cards){
    const i=G.players[target].hand.indexOf(c);
    if(i>=0){G.players[target].hand.splice(i,1);sendToDiscard(c);n++;flyCard({from,to,proto:c.protocol,delay:n*110});}
  }
  if(n){
    slashFX(from);shakeScreen();
    floatLabel(from,`-${n}枚 捨て札`,'#ff8f9c');
    log(`${playerName(target)} が手札を${n}枚捨て札にした`);render();await pace(.7);
    if(event)await triggerAfterDiscard(target,n);
  }
  return n;
}
/* ---- 手札サイズを画面に合わせる（見切れ防止） ---- */
function handCardW(){return Math.max(70,Math.min(106,Math.round(innerWidth*0.27),Math.round(innerHeight*0.185/1.4)));}
function renderHandView(v){
  const h=$('#hand');h.innerHTML='';
  const HW=handCardW();
  h.style.height=(HW*1.4+22)+'px';
  document.documentElement.style.setProperty('--handH',(HW*1.4+30)+'px');
  const n=G.players[v].hand.length,mid=(n-1)/2;
  G.players[v].hand.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='hfan'+(selectedHandCard===c?' selected':'');
    d.dataset.cid=c.id;
    d.style.setProperty('--r',((i-mid)*3).toFixed(1)+'deg');
    d.style.setProperty('--y',(Math.abs(i-mid)*3).toFixed(1)+'px');
    d.appendChild(scaled(fullCard(c),HW));
    d.onclick=()=>mainPlay(c);
    d.oncontextmenu=e=>{e.preventDefault();openHandCard(c);};
    h.appendChild(d);
  });
  if(!G.players[v].hand.length){
    const d=document.createElement('div');d.className='handempty';
    d.innerHTML=(!NET.on||G.current===NET.role)?'手札がありません<br><b>「リフレッシュ」で手札を補充できます</b>':'手札がありません';
    h.appendChild(d);
    setTimeout(()=>{document.getElementById('refreshBtn')?.classList.add('pulsebtn');},0);
  }
}
function renderHandOf(pp){
  const h=$('#hand');h.innerHTML='';
  const HW=handCardW();
  const n=G.players[pp].hand.length,mid=(n-1)/2;
  G.players[pp].hand.forEach((c,i)=>{
    const d=document.createElement('div');d.className='hfan';d.dataset.cid=c.id;
    d.style.setProperty('--r',((i-mid)*3).toFixed(1)+'deg');
    d.style.setProperty('--y',(Math.abs(i-mid)*3).toFixed(1)+'px');
    d.appendChild(scaled(fullCard(c),HW));
    h.appendChild(d);
  });
}
/* ---- ライン合計値をプロトコルカードに大きく表示 ---- */
function renderProtos(id,p){
  const row=$(id);row.innerHTML='';
  G.players[p].protocols.forEach((pr,i)=>{
    const m=pmeta(pr.name),d=document.createElement('div');
    const t=stackTotal(p,i),o=stackTotal(other(p),i);
    d.className='proto pchip'+(pr.compiled?' done':'');
    d.style.cssText=artBG(pr.name,true)+`;--ac:${m.ac}`;
    d.innerHTML=`<span class="pcl">L${i+1}</span>${hexIcon(pr.name,'pchipx')}
      <div class="pcname">${glxHTML(pr.name,'pcglx')}<i>${m.k}</i></div>
      ${pr.compiled?'<div class="pcstamp">COMPILED</div>':''}
      <b class="pctotal${t>o?' win':''}${t>=10?' rdy':''}">${t}</b>`;
    d.onclick=()=>openProto(pr,p,i);
    row.appendChild(d);
  });
}
/* ---- シートにカード実物を表示できるように ---- */
function uiSheet({title,sub='',buttons=[],cardEl=null}){
  document.getElementById('uisheet')?.remove();
  const d=document.createElement('div');d.id='uisheet';
  if(cardEl)d.classList.add('withcard');
  d.innerHTML=`${cardEl?'<div class="uscard"></div>':''}<div class="usmain"><div class="ushead"><b>${title}</b>${sub?`<span>${sub}</span>`:''}</div><div class="usbtns"></div></div>`;
  if(cardEl)d.querySelector('.uscard').appendChild(cardEl);
  const bb=d.querySelector('.usbtns');
  for(const b of buttons){
    const btn=document.createElement('button');
    btn.className='usbtn '+(b.cls||'');
    btn.innerHTML=b.html||esc(b.label||'');
    btn.onclick=b.onClick;
    bb.appendChild(btn);
  }
  document.body.appendChild(d);
  return d;
}
/* ---- リフレッシュ＝手札そのまま5枚まで補充（ハウスルール） ---- */
async function refreshPlayer(p){
  await controlReleaseAndOptionalReorder(p);
  const need=Math.max(0,5-G.players[p].hand.length);
  log(`${playerName(p)} がリフレッシュ（手札を${need}枚補充）`);
  if(need)await draw(p,need);
  else toast('手札はすでに5枚以上あります');
  const speed=fieldCardsOf(p).some(c=>!c.faceDown&&c.protocol==='SPEED'&&c.value===1);
  if(speed){log('SPEED 1：キャッシュクリア後に1枚引く');await draw(p,1);}
}
async function mainRefresh(){
  if(typeof NET!=='undefined'&&NET.on&&!isMyTurn()){toast('相手の手番です');return;}
  if(!G||G.phase!=='action'||G.busy)return;
  G.busy=true;render();
  const yes=await confirmAsk('リフレッシュ','手札はそのままに、5枚になるまで補充します。','リフレッシュ','キャンセル');
  if(yes){await refreshPlayer(G.current);await finishAction();}
  else{G.busy=false;render();}
}
/* ---- 通信対戦では移行画面を出さない（保険） ---- */
const _sh7=showHandoff;
showHandoff=function(){
  if(typeof NET!=='undefined'&&NET.on)$('#handoff').classList.remove('show');
  return _sh7();
};
if(G)render();
