<script id="skin-pro-v10">
/* ==== v10: プロトコルは選択順で確定・並び替えはフィールド画面から ====
 * cpu / net の後、最後に読み込む（openFieldAll・startArrange の最終ラッパーになる）。
 * オンラインの初期順とゲーム開始後の並び替えは skin-net.js が同期する。
 */
'use strict';
(()=>{
  const isRole=p=>p===0||p===1;
  const netOn=()=>typeof NET!=='undefined'&&NET.on;
  const viewerSide=()=>{try{return typeof uiViewer==='function'?uiViewer():(G?.current??0);}catch(e){return 0;}};

  /* 1) LINE ORDER 画面を廃止。ドラフトで選んだ順のまま対局を開始する。
     オンラインの選択順同期だけは通信層に任せる。 */
  if(typeof startArrange==='function'){
    const prevArrange=startArrange;
    startArrange=function(player){
      if(netOn())return prevArrange.apply(this,arguments);
      if(player===0)return startArrange(1);   // 両者の選択順を保ったまま連鎖だけ踏襲
      return finishSetup();
    };
  }

  /* 2) フィールド画面（場一覧）から自分のプロトコルを並び替える。
     カードを置く前（＝配置の決定）に限る。置いた後はルール上ラベルだけ動くと
     ややこしいので不可（CONTROL の入れ替えは従来どおり使える）。 */
  function linesEmpty(p){try{return[0,1,2].every(l=>G.players[p].lines[l].length===0);}catch(e){return false;}}
  function ensureProtocolOrderLocks(){
    if(!G||!Array.isArray(G.players)||G.players.length!==2)return[true,true];
    const inferred=G.players.map(pl=>!!(pl?.lines?.some(line=>Array.isArray(line)&&line.length)||pl?.protocols?.some(pr=>pr?.compiled)));
    if(!Array.isArray(G.protocolOrderLocked)||G.protocolOrderLocked.length!==2)G.protocolOrderLocked=inferred;
    else G.protocolOrderLocked=[0,1].map(p=>!!G.protocolOrderLocked[p]||inferred[p]);
    return G.protocolOrderLocked;
  }
  function ensureProtocolOrderRevisions(){
    if(!G)return[0,0];
    if(!Array.isArray(G.protocolOrderRevision)||G.protocolOrderRevision.length!==2)G.protocolOrderRevision=[0,0];
    else G.protocolOrderRevision=G.protocolOrderRevision.map(v=>Number.isSafeInteger(v)&&v>=0?v:0);
    return G.protocolOrderRevision;
  }
  function protocolOrderEditable(p){
    if(!G||!isRole(p)||G.winner!=null||G.busy||!Array.isArray(G.players?.[p]?.protocols))return false;
    if(netOn()&&G.current!==p)return false;
    return!ensureProtocolOrderLocks()[p]&&linesEmpty(p)&&G.players[p].protocols.length===3&&G.players[p].protocols.every(pr=>!pr.compiled);
  }
  function lockProtocolOrder(p){
    if(!G||!isRole(p))return;
    const locks=ensureProtocolOrderLocks();
    if(!locks[p]){locks[p]=true;if(typeof autosave==='function')autosave(true);}
  }

  function openProtoReorder(viewer){
    if(!G||!isRole(viewer)||typeof showModal!=='function')return;
    if(!protocolOrderEditable(viewer)){if(typeof toast==='function')toast('カードを置いた後は並び替えできません');return;}
    let objs=[...G.players[viewer].protocols],sel=-1;
    const body='<div class="arrange2 protoreorder" id="pReorder"></div><div class="sub" id="pReorderHelp"></div>';
    const done=showModal({title:'プロトコルの並び替え',sub:`${esc(playerName(viewer))} の配置`,body,
      buttons:[{label:'キャンセル',value:null},{label:'この並びで決定',value:'ok',className:'primary'}]});
    const holder=document.getElementById('pReorder');
    const draw=()=>{
      if(!holder)return;
      holder.innerHTML='';
      objs.forEach((pr,i)=>{
        const d=document.createElement('div');d.className='arr2'+(sel===i?' sel':'');
        const visual=typeof pcardHTML==='function'?pcardHTML(pr.name):`<strong>${esc(pr.name)}</strong>`;
        d.innerHTML=`<span class="arrl">LINE ${i+1}${sel===i?' — 入れ替え先をタップ':''}</span>${visual}<div class="arrows"></div>`;
        const card=d.querySelector('.pcard');
        if(card)card.onclick=()=>{if(sel<0)sel=i;else{if(sel!==i)[objs[sel],objs[i]]=[objs[i],objs[sel]];sel=-1;}draw();};
        const a=d.querySelector('.arrows');
        for(const[t,di]of[['←',-1],['→',1]]){
          const b=document.createElement('button');b.type='button';b.textContent=t;
          b.disabled=i+di<0||i+di>=objs.length;
          b.onclick=()=>{[objs[i],objs[i+di]]=[objs[i+di],objs[i]];sel=-1;draw();};
          a.appendChild(b);
        }
        holder.appendChild(d);
      });
      const h=document.getElementById('pReorderHelp');
      if(h)h.textContent='カードを2枚タップ、または矢印で並び替えます。カードを置く前だけ変更できます。';
    };
    draw();
    done.then(async v=>{
      if(v==='ok'&&protocolOrderEditable(viewer)){
        let updated=false;
        if(netOn()&&typeof netSubmitSetupProtocolOrder==='function')updated=await netSubmitSetupProtocolOrder(objs.map(pr=>pr.name));
        else{
          G.players[viewer].protocols=objs;ensureProtocolOrderRevisions()[viewer]++;updated=true;
          if(typeof autosave==='function')autosave(true);
          if(typeof render==='function')render();
        }
        if(typeof toast==='function')toast(updated?'プロトコルの並びを更新しました':'並び替えを同期できませんでした');
      }else if(v==='ok'&&typeof toast==='function'){
        toast('カードが置かれたため、並び替えできませんでした');
      }
      if(typeof openFieldAll==='function')openFieldAll();
    });
  }

  if(typeof openFieldAll==='function'){
    const prevField=openFieldAll;
    openFieldAll=function(){
      const r=prevField.apply(this,arguments);
      try{
        const list=document.getElementById('ovList');
        if(!list||!G||G.winner!=null)return r;
        if(document.getElementById('protoReorderBar'))return r;
        const viewer=viewerSide(),editable=protocolOrderEditable(viewer),online=netOn(),locked=ensureProtocolOrderLocks()[viewer],waitingTurn=online&&G.current!==viewer;
        const bar=document.createElement('div');bar.id='protoReorderBar';bar.className='protoreorderbar';
        bar.innerHTML=`<div class="prbtxt"><b>自分のプロトコルの並び</b><small>${
          editable?(online?'カードを置く前なら並び替えて相手にも同期できます':'カードを置く前なら自由に並び替えできます')
          :locked?'カードを置いた後は並び替えできません（CONTROLで入れ替え可能）'
          :waitingTurn?'自分の手番になれば、カードを置く前に並び替えできます'
          :'効果の処理中は並び替えできません'}</small></div>`;
        const btn=document.createElement('button');btn.type='button';btn.className='prbbtn';btn.textContent='並び替える';
        btn.disabled=!editable;
        btn.onclick=()=>{document.getElementById('ov')?.classList.remove('show');openProtoReorder(viewer);};
        bar.appendChild(btn);
        list.prepend(bar);
      }catch(e){}
      return r;
    };
  }

  /* 最初のカードが置かれる時点で初期配置を固定する。以後の移動で全ラインが
     一時的に空になっても、フィールド画面からの再配置は復活しない。 */
  if(typeof beforeCover==='function'){
    const prevBeforeCover=beforeCover;
    beforeCover=function(player){lockProtocolOrder(player);return prevBeforeCover.apply(this,arguments);};
  }

  /* runTurn の最後で action / busy=false になった完成状態を即時送信する。
     フェイズ中の log 由来の遅延同期だけに任せると、相手側に
     busy=true が残り、手番開始直後の初期並び替えを誤って拒否することがある。 */
  if(typeof runTurn==='function'){
    const prevRunTurn=runTurn;
    runTurn=async function(){
      const result=await prevRunTurn.apply(this,arguments);
      if(netOn()&&G&&G.winner==null&&G.current===NET.role&&G.phase==='action'&&!G.busy&&typeof netSend==='function'){
        netSend({t:'state',G});
      }
      return result;
    };
  }

  /* 3) 新レイアウトでは旧 actionBar が非表示になるため、設定画面への
     導線をタイトル画面とサイドバーへ戻す。BGM 5曲・音量・演出設定を
     ローカル／CPU／オンラインのどの表示モードからでも開けるようにする。 */
  function settingsButton(id,label){
    const b=document.createElement('button');
    b.type='button';b.id=id;b.className='view settingsentry';b.textContent=label;
    b.setAttribute('aria-label','音・演出設定');
    b.onclick=()=>{if(typeof openSettings==='function')void openSettings();};
    return b;
  }
  function ensureSettingsEntryPoints(){
    const setup=document.querySelector('#setupBox .setupactions');
    if(setup&&!document.getElementById('setupSettingsBtn'))setup.appendChild(settingsButton('setupSettingsBtn','音・演出設定'));
    const side=document.querySelector('#sideMe .actions');
    if(side&&!document.getElementById('sideSettingsBtn'))side.appendChild(settingsButton('sideSettingsBtn','設定'));
  }
  if(typeof renderWelcome==='function'){
    const prevWelcome=renderWelcome;
    renderWelcome=function(){const r=prevWelcome.apply(this,arguments);ensureSettingsEntryPoints();return r;};
  }
  if(typeof render==='function'){
    const prevRender=render;
    render=function(){ensureProtocolOrderLocks();ensureProtocolOrderRevisions();const r=prevRender.apply(this,arguments);ensureSettingsEntryPoints();return r;};
  }
  ensureSettingsEntryPoints();

  globalThis.COMPILE_V10=Object.freeze({openProtoReorder,ensureSettingsEntryPoints,ensureProtocolOrderLocks,ensureProtocolOrderRevisions,protocolOrderEditable,lockProtocolOrder});
})();

</script>
<script id="skin-pro-v11-presentation">
/* ==== COMPILE PRO SKIN v11 : コンパイル・セレクションセレモニー ==== */
'use strict';
(()=>{
  const oldRenderProtosV11=renderProtos;
  const oldCompileLineV11=compileLine;
  const oldAnnounceV11=announce;
  const oldDraftRostersV11=typeof draftRostersHTML==='function'?draftRostersHTML:null;
  let compileFxCleanupTimer=0;

  function protocolTarget(player,line){
    const tagged=document.querySelector(`.proto.pchip[data-player="${player}"][data-line="${line}"]`);
    if(tagged)return tagged;
    const row=document.querySelector(player===uiViewer()?'#myProtos':'#opProtos');
    return row?.children?.[line]||null;
  }
  function tagProtocolTargets(id,player){
    const row=$(id);if(!row)return;
    [...row.children].forEach((node,line)=>{node.dataset.player=String(player);node.dataset.line=String(line);});
  }
  renderProtos=function(id,player,...rest){
    const result=oldRenderProtosV11.call(this,id,player,...rest);
    tagProtocolTargets(id,player);return result;
  };

  function draftPickStep(player,pickIndex){
    let seen=0;
    for(let step=0;step<Math.min(Number(draft.step)||0,draft.schedule.length);step++){
      if(Number(draft.schedule[step])!==player)continue;
      if(seen===pickIndex)return step;seen++;
    }
    return-1;
  }
  function premiumDraftRosters(picker){
    const latestStep=(Number(draft.step)||0)-1;
    const latestOwner=latestStep>=0?Number(draft.schedule[latestStep]):-1;
    const latestName=latestStep>=0?draftPickAtStep(latestStep):null;
    const latestMeta=latestName?pmeta(latestName):null;
    const latestPickIndex=latestOwner>=0?draft.schedule.slice(0,latestStep+1).filter(owner=>Number(owner)===latestOwner).length:0;
    const latestLabel=latestName?`${draft.names[latestOwner]}が${latestName}を選択しました`:'';
    const acquisition=latestName?`<div class="draftacquired-v11" role="status" aria-label="${esc(latestLabel)}" style="--slot-ac:${latestMeta.ac}">
      <span class="draftacquired-art" style='${artBG(latestName,true)}' aria-hidden="true"></span>
      <span class="draftacquired-code">P${latestOwner+1} // PICK ${String(latestPickIndex).padStart(2,'0')}</span>${hexIcon(latestName,'draftacquired-hex')}
      <span class="draftacquired-copy"><small>PROTOCOL ACQUIRED</small><b>${esc(latestName)}</b><em>${esc(latestMeta.k)} // ${esc(latestMeta.f)}</em></span>
      <strong>LOCKED IN <i>${draft.picks[latestOwner]?.length||0}/3</i></strong></div>`:'';
    const rosters=[0,1].map(player=>{
      const picks=draft.picks[player]||[];
      const slots=[0,1,2].map(index=>{
        const name=picks[index],pickedAt=draftPickStep(player,index),latest=!!name&&pickedAt===latestStep;
        if(!name)return`<span class="draftslot empty" role="listitem" aria-label="選択枠${index+1}、未選択">
          <span class="draftslotindex">0${index+1}</span><span class="draftslotemptymark" aria-hidden="true"></span>
          <span class="draftslotcopy"><small>PROTOCOL SLOT</small><b>EMPTY</b><em>未選択</em></span></span>`;
        const m=pmeta(name);
        return`<span class="draftslot filled${latest?' latest':''}" role="listitem" aria-label="${esc(name)}、${esc(m.k)}、選択済み" style="--slot-ac:${m.ac}">
          <span class="draftslotart" style='${artBG(name,true)}' aria-hidden="true"></span>
          <span class="draftslotindex">0${index+1}</span>${hexIcon(name,'draftslothex')}
          <span class="draftslotcopy"><small>${latest?'NEW ACQUISITION':'PROTOCOL LOCKED'}</small><b>${esc(name)}</b><em>${esc(m.k)}</em></span>
          <strong class="draftslotstate">LOCKED</strong></span>`;
      }).join('');
      return`<div class="picked draftroster ${picker===player?'active':''}" data-player="${player}">
        <h4><span>P${player+1}</span>${esc(draft.names[player]||`PLAYER ${player+1}`)}<b>${picks.length}/3</b></h4>
        <div class="draftslots" role="list" aria-label="${esc(draft.names[player]||`PLAYER ${player+1}`)}の選択済みプロトコル">${slots}</div></div>`;
    }).join('');
    return`${acquisition}<div class="pickedrow draftrosters">${rosters}</div><div class="draftselectionlive" aria-live="polite">${esc(latestLabel)}</div>`;
  }
  if(oldDraftRostersV11)draftRostersHTML=function(picker){
    try{return premiumDraftRosters(picker);}catch(error){console.warn('premium draft roster fallback',error);return oldDraftRostersV11(picker);}
  };

  function removeCompileFx(root,target){
    clearTimeout(compileFxCleanupTimer);
    target?.classList.remove('compile-target-v11');
    if(!root?.isConnected)return;
    root.classList.add('leaving');setTimeout(()=>root.remove(),260);
  }
  function compileFieldFx(context){
    if(!(Number(SET.fx)>0)||matchMedia('(prefers-reduced-motion: reduce)').matches)return null;
    clearTimeout(compileFxCleanupTimer);
    document.querySelectorAll('.compile-target-v11').forEach(node=>node.classList.remove('compile-target-v11'));
    document.querySelectorAll('.compilefx11').forEach(node=>node.remove());
    const m=pmeta(context.protocol),r=context.target?.getBoundingClientRect();
    const x=r?r.left+r.width/2:innerWidth/2,y=r?r.top+r.height/2:innerHeight*.42;
    const root=document.createElement('div');
    root.className=`compilefx11 tier-${context.tier}${context.recompile?' recompile':''}${context.tier===3?' final-lock':''}`;
    root.style.cssText=`--compile-ac:${m.ac};--compile-pop:${m.pop};--compile-x:${x}px;--compile-y:${y}px;`;
    const shards=Array.from({length:16},(_,i)=>`<i class="compilefx11-shard" style="--si:${i};--sa:${i*22.5}deg;--sd:${(i%5)*34}ms"></i>`).join('');
    root.innerHTML=`<div class="compilefx11-vignette"></div><div class="compilefx11-grid"></div>
      <div class="compilefx11-rail left"></div><div class="compilefx11-rail right"></div>
      <div class="compilefx11-lock" aria-hidden="true">${hexIcon(context.protocol,'compilefx11-hex')}<i></i><i></i>${shards}</div>
      <div class="compilefx11-status"><span>${context.recompile?'DATA EXTRACTION':'COMPILATION SEQUENCE'}</span><b>LINE ${String(context.line+1).padStart(2,'0')} // VALUE ${context.total}</b></div>`;
    document.body.appendChild(root);context.target?.classList.add('compile-target-v11');
    compileFxCleanupTimer=setTimeout(()=>removeCompileFx(root,context.target),Math.max(2100,2350*Math.max(.7,Number(SET.fx)||1)));
    return root;
  }
  function decorateCompileAnnounce(context){
    const el=$('#ann'),box=el?.querySelector('.abox2'),cnt=box?.querySelector('.acnt');if(!el||!box||!cnt)return;
    const m=pmeta(context.protocol);el.classList.add('compile-premium-v11');
    el.classList.toggle('recompile-v11',context.recompile);el.classList.toggle('final-v11',context.tier===3);
    el.style.setProperty('--compile-ac',m.ac);el.style.setProperty('--compile-pop',m.pop);
    const tag=cnt.querySelector('.atag2');if(tag)tag.textContent=context.recompile?'RECOMPILE // DATA EXTRACTION':`PROTOCOL COMPILE // LOCK ${context.tier} OF 3`;
    cnt.querySelector('.compiletelemetry-v11')?.remove();
    const meta=document.createElement('div');meta.className='compiletelemetry-v11';
    meta.innerHTML=`<div><span>PLAYER</span><b>${esc(context.playerName)}</b></div><div><span>TARGET</span><b>LINE ${String(context.line+1).padStart(2,'0')}</b></div><div><span>VALUE</span><b>${context.total}</b></div>
      <div class="compilemeter-v11" aria-label="コンパイル進捗 ${context.tier}/3">${[1,2,3].map(n=>`<i class="${n<=context.tier?'on':''}"><span>${n}</span></i>`).join('')}</div>`;
    cnt.appendChild(meta);
  }

  compileLine=async function(player,line){
    const protocol=G?.players?.[player]?.protocols?.[line];
    if(!protocol)return oldCompileLineV11.apply(this,arguments);
    const compiledBefore=G.players[player].protocols.filter(item=>item.compiled).length;
    const recompile=!!protocol.compiled;
    const context={player,line,protocol:protocol.name,recompile,total:stackTotal(player,line),
      tier:recompile?Math.max(1,compiledBefore):Math.min(3,compiledBefore+1),playerName:playerName(player),target:protocolTarget(player,line)};
    globalThis.__compilePresentationContext=context;
    try{return await oldCompileLineV11.apply(this,arguments);}
    finally{
      if(globalThis.__compilePresentationContext===context)globalThis.__compilePresentationContext=null;
      const sealed=protocolTarget(player,line);if(sealed&&!recompile){sealed.classList.add('compile-sealed-v11');setTimeout(()=>sealed.classList.remove('compile-sealed-v11'),1500);}
    }
  };

  announce=function(subject,title,desc='',tag='能力発動',cls=''){
    if(cls!=='gold')return oldAnnounceV11.apply(this,arguments);
    const context=globalThis.__compilePresentationContext;
    if(context)compileFieldFx(context);
    /* base compile already launched the large burst; suppress the second generic center burst from the cut-in. */
    const originalBurst=fxBurst;let result;
    try{
      if(context)fxBurst=function(protocol,count,at){if(!at&&count<=45)return;return originalBurst(protocol,count,at);};
      result=oldAnnounceV11.apply(this,arguments);
    }finally{fxBurst=originalBurst;}
    if(context){
      decorateCompileAnnounce(context);
      return Promise.resolve(result).finally(()=>{if(globalThis.__compilePresentationContext===context)globalThis.__compilePresentationContext=null;});
    }
    return result;
  };

  globalThis.COMPILE_PRESENTATION=Object.freeze({
    version:11,
    state:()=>({active:!!document.querySelector('.compilefx11'),context:globalThis.__compilePresentationContext?{...globalThis.__compilePresentationContext,target:undefined}:null,
      latestDraft:document.querySelector('.draftslot.latest .draftslotcopy b')?.textContent||null})
  });
})();

</script>
