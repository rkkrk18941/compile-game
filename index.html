/* ---- particle burst : holo shards ---- */
function fxBurst(protocol,n=55,at=null){
  if(!SET.fx)return;
  const cv=$('#fx'),ctx=cv.getContext('2d'),dpr=devicePixelRatio||1;
  cv.width=innerWidth*dpr;cv.height=innerHeight*dpr;
  const cx=(at?at.x:innerWidth/2)*dpr,cy=(at?at.y:innerHeight/2)*dpr;
  const m=pmeta(protocol),colors=[m.pal[2],m.pal[3],m.pal[4],m.pop,'#ffffff'],parts=[];
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=1.4+Math.random()*5.2,sq=Math.random()<.5;
    parts.push({x:cx,y:cy,vx:Math.cos(a)*s*dpr,vy:Math.sin(a)*s*dpr,rot:a,vr:(Math.random()-.5)*.3,
      life:30+Math.random()*38,t:0,r:(1+Math.random()*2.8)*dpr,c:colors[i%colors.length],sq});}
  const ring={t:0,life:26};
  function tick(){
    ctx.clearRect(0,0,cv.width,cv.height);ctx.globalCompositeOperation='lighter';let alive=false;
    if(ring.t++<ring.life){alive=true;const k=ring.t/ring.life;
      ctx.globalAlpha=(1-k)*.9;ctx.strokeStyle=m.ac;ctx.lineWidth=Math.max(.5,(2.6-2*k))*dpr;
      ctx.beginPath();ctx.arc(cx,cy,(6+k*120)*dpr,0,7);ctx.stroke();
      ctx.globalAlpha=(1-k)*.3;ctx.setLineDash([6*dpr,10*dpr]);
      ctx.beginPath();ctx.arc(cx,cy,(3+k*76)*dpr,0,7);ctx.stroke();ctx.setLineDash([]);}
    for(const p of parts){
      if(p.t++>=p.life)continue;alive=true;
      p.x+=p.vx;p.y+=p.vy;p.vx*=.965;p.vy=p.vy*.965+.04*dpr;p.rot+=p.vr;
      ctx.globalAlpha=1-p.t/p.life;
      if(p.sq){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.c;
        ctx.fillRect(-p.r*1.6,-p.r*.5,p.r*3.2,p.r);ctx.restore();}
      else{ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();}}
    ctx.globalAlpha=1;
    if(alive)requestAnimationFrame(tick);else ctx.clearRect(0,0,cv.width,cv.height);
  }
  if(!matchMedia('(prefers-reduced-motion: reduce)').matches)tick();
}

  if(t.m)parts.push('【中】'+t.m);
  if(t.b)parts.push('【下】'+t.b);
  return parts.join('　')||'効果なし';
}

/* ---- ルール修正：覆われたカードは「覆われ」と明記された効果以外の対象にならない ----
   カード選択をサムネイル表示に変更（どの段の能力かも見える） */
function chooseFieldCard(title,filter=()=>true,{allowCancel=false,viewer=uiViewer()}={}){
  const coveredOK=/覆われ/.test(title);
  const opts=[];
  for(let q=0;q<2;q++)for(let l=0;l<3;l++){
    const line=G.players[q].lines[l];
    line.forEach((c,i)=>{
      const covered=i<line.length-1;
      if(!coveredOK&&covered)return;               // 覆われたカードは対象外（既定ルール）
      if(!filter(c,{player:q,line:l,index:i,covered}))return;
      opts.push({c,q,l,covered});
    });
  }
  if(!opts.length){toast('選択できる対象がありません');return Promise.resolve(null);}
  const body='<div class="fieldpick" id="fieldPick"></div>';
  const sub='対象カードをタップ。'+(coveredOK?'（覆われたカードも選択可）':'（覆われたカードは対象になりません）');
  const p=showModal({title,sub,body,buttons:allowCancel?[{label:'キャンセル',value:null}]:[]});
  const grid=$('#fieldPick');
  const w=Math.min(150,Math.round((innerWidth-70)/2));
  for(const o of opts){
    const hidden=o.c.faceDown&&o.q!==viewer;
    const btn=document.createElement('button');btn.className='fpitem';
    btn.appendChild(scaled(fullCard(o.c,{dim:o.c.faceDown?['top','mid','bot']:o.covered?['mid','bot']:[],hide:hidden}),w));
    const cap=document.createElement('span');cap.className='fpcap';
    cap.textContent=`${playerName(o.q)} / LINE ${o.l+1} / 値${effectiveValue(o.c)}${o.covered?' / 覆われ':''}`;
    btn.appendChild(cap);
    btn.onclick=()=>closeModal(o.c);
    grid.appendChild(btn);
  }
  return p;
}

/* ---- 能力カットイン：既定4.5秒、タップで早送り ---- */
function announce(subj,title,desc='',tag='能力発動',cls=''){
  if(!SET.fx)return Promise.resolve();
  const el=$('#ann');const proto=typeof subj==='string'?subj:subj?.protocol;
  const m=pmeta(proto);
  el.className='announce'+(cls?' '+cls:'');
  el.style.setProperty('--b',m.ac);
  const configured=Number(SET.annSec);
  const dur=(Number.isFinite(configured)?configured:4.5)*(cls==='gold'?1.15:1);
  el.style.setProperty('--adur',dur+'s');
  el.innerHTML=`<div class="abox2" style="--ac:${m.ac}">
    <div class="aart" style='${artBG(proto,true)}'></div><div class="ascrim"></div>
    <div class="acnt"><div class="atag2">${esc(tag)}</div><div class="glx aname2" data-t="${esc(title)}">${esc(title)}</div>${desc?`<div class="atext2">${kw(desc)}</div>`:''}<div class="askip">タップで閉じる</div></div>
    <i class="acorn tl"></i><i class="acorn br"></i></div>`;
  void el.offsetWidth;el.classList.add('show');el.style.pointerEvents='auto';
  if(subj&&typeof subj!=='string'){const dom=elOf(subj);if(dom){dom.classList.add('fxhl');setTimeout(()=>dom.classList.remove('fxhl'),1500);}fxAtCard(subj,30);}
  else if(proto)fxBurst(proto,40);
  return new Promise(res=>{
    let fin=false;
    const end=()=>{if(fin)return;fin=true;el.classList.remove('show');el.style.pointerEvents='none';el.onclick=null;res();};
    el.onclick=end;
    setTimeout(end,dur*1000);
  });
}

/* ---- プレイ先の選択：ラインにゴーストを重ねて結果（合計値）を見せる ---- */
function pickLineWithGhost(p,card,lines,mode,{cancelLabel='キャンセル'}={}){
  return new Promise(res=>{
    const row=$('#myStacks');if(!row){res(null);return;}
    const stacks=[...row.children];
    const cleanup=()=>{
      document.getElementById('ghostbar')?.remove();
      document.querySelectorAll('.ghostcard').forEach(g=>g.remove());
      stacks.forEach((st,i)=>{st.classList.remove('legal','blocked');st.onclick=()=>openStack(p,i,uiViewer());});
    };
    stacks.forEach((st,i)=>{
      if(lines.includes(i)){
        st.classList.add('legal');
        const val=mode==='down'?2:card.value;
        const tot=stackTotal(p,i)+val;
        const g=document.createElement('div');g.className='ghostcard';
        g.innerHTML=(mode==='down'
          ?`<div class="gc back"><b>2</b><span>裏向き</span></div>`
          :`<div class="gc" style='${artBG(card.protocol,false)}'><b>${card.value}</b><span>${esc(card.protocol)}</span></div>`)
          +`<div class="gtot">${stackTotal(p,i)} → <b>${tot}</b>${tot>=10&&tot>stackTotal(other(p),i)?' ◆':''}</div>`;
        st.appendChild(g);
        st.onclick=e=>{e.stopPropagation();cleanup();res(i);};
      }else{
        st.classList.add('blocked');
        st.onclick=e=>{e.stopPropagation();toast('このラインには置けません');};
      }
    });
    const bar=document.createElement('div');bar.id='ghostbar';
    bar.innerHTML=`<span>${esc(cardName(card))} を${mode==='down'?'裏向き':'表向き'}で置くラインをタップ</span><button id="ghostCancel">${esc(cancelLabel)}</button>`;
    document.body.appendChild(bar);
    document.getElementById('ghostCancel').onclick=()=>{cleanup();res(null);};
  });
}
async function promptPlayCard(p,card,{free=false}={}){
  if(!G.players[p].hand.includes(card))return false;
  const up=legalFaceUpLines(p,card),down=legalFaceDownLines(p);
  if(!up.length&&!down.length){toast('プレイできるラインがありません');return false;}
  // カードの実物を見ながら表裏を選ぶ
  const mode=await (()=>{
    const body='<div class="playpick"><div class="ppcard" id="ppCard"></div><div class="ppbtns" id="ppBtns"></div></div>';
    const pr=showModal({title:'カードをプレイ',sub:'',body,buttons:[{label:'キャンセル',value:null}]});
    $('#ppCard').appendChild(scaled(fullCard(card),Math.min(185,Math.round(innerWidth*0.42))));
    const bb=$('#ppBtns');
    if(up.length){const b=document.createElement('button');b.className='ppbtn gold';
      b.innerHTML=`<strong>表向きでプレイ</strong><small>効果が発動する。置けるライン: ${up.map(x=>x+1).join('・')}</small>`;
      b.onclick=()=>closeModal('up');bb.appendChild(b);}
    else{const d=document.createElement('div');d.className='ppnote';d.textContent='表向きで置けるラインがありません（同名プロトコルのラインが必要）';bb.appendChild(d);}
    if(down.length){const b=document.createElement('button');b.className='ppbtn';
      b.innerHTML=`<strong>裏向きでプレイ</strong><small>値2として置く。効果なし。置けるライン: ${down.map(x=>x+1).join('・')}</small>`;
      b.onclick=()=>closeModal('down');bb.appendChild(b);}
    return pr;
  })();
  if(!mode)return false;
  const lines=mode==='up'?up:down;
  const l=await pickLineWithGhost(p,card,lines,mode);
  if(l==null)return false;
  removeFromHand(p,card);card.faceDown=mode==='down';
  await beforeCover(p,l,card);
  const covering=G.players[p].lines[l].length>0;
  G.players[p].lines[l].push(card);
  log(`${playerName(p)} が${cardName(card)}をLINE ${l+1}へ${card.faceDown?'裏向き':'表向き'}でプレイ`);
  render();fxAtCard(card,40);await pace(.6);
  if(!card.faceDown)await activateVisibleCard(card,{reason:'play',holder:p,line:l,covering});
  return true;
}

async function moveCard(card,targetLine=null){
  const loc=cardLocation(card);if(!loc||loc.line==null)return false;
  const p=loc.player,source=loc.line;
  const label=card.faceDown?'裏向きカード':cardName(card);
  if(targetLine==null){
    const options=[0,1,2].filter(l=>l!==source);
    const el=elOf(card);el?.classList.add('movingcard');
    targetLine=await chooseLine(`${label} の移動先`,options,false);
    document.querySelectorAll('.movingcard').forEach(x=>x.classList.remove('movingcard'));
  }
  if(targetLine==null||targetLine===source)return false;
  const sourceStack=G.players[p].lines[source],wasTop=loc.index===sourceStack.length-1;
  sourceStack.splice(loc.index,1);
  if(wasTop)await revealTopIfNeeded(p,source,card);
  await beforeCover(p,targetLine,card);
  G.players[p].lines[targetLine].push(card);

/* ---- FXレイヤー（飛翔カード・浮きラベル・斬撃） ---- */
function fxLayer(){let l=document.getElementById('fxlayer');if(!l){l=document.createElement('div');l.id='fxlayer';document.body.appendChild(l);}return l;}
function visRect(sels){for(const s of sels){const e=document.querySelector(s);if(e&&e.offsetParent!==null)return e.getBoundingClientRect();}return null;}
function pileRect(p,kind){
  const own=p===uiViewer();
  return visRect(own?[`#meBar .p.${kind}`,`#sideMe .p.${kind}`]:[`#oppBar .p.${kind}`,`#sideOpp .p.${kind}`])
    ||{left:innerWidth/2-20,top:own?innerHeight-90:30,width:40,height:50};
}
function handRect(p){
  if(p===uiViewer()){const r=visRect(['#hand']);if(r)return{left:r.left+r.width/2-40,top:r.top,width:80,height:r.height};}
  const r=visRect(['#oppBar .opphand','#sideOpp .opphand']);
  return r||pileRect(p,'deck');
}
function stackRectOf(p,l){
  const row=p===uiViewer()?'#myStacks':'#oppStacks';
  const e=document.querySelectorAll(row+' .stack')[l];
  return e?e.getBoundingClientRect():null;
}
function flyCard({from,to,proto=null,back=false,delay=0}={}){
  if(!SET.fx||!from||!to)return;

  d.className='flycard'+(back||!proto?' back':'');

  setTimeout(()=>d.remove(),680+delay);
}
function floatLabel(rect,text,color='#fff'){

/* ---- 基本アクションに演出を接続（ロジックは原本どおり） ---- */
async function draw(p,n,{trigger=true}={}){
  let drawn=0;
  for(let i=0;i<n;i++){reshuffleIfNeeded(p);const c=G.players[p].deck.pop();if(!c)break;G.players[p].hand.push(c);drawn++;}
  if(drawn){
    const from=pileRect(p,'deck'),to=handRect(p);
    for(let i=0;i<Math.min(drawn,5);i++)flyCard({from,to,back:true,delay:i*95});
    floatLabel(to,`+${drawn} ドロー`,'#7fd8f8');
    log(`${playerName(p)} が${drawn}枚引いた`);render();await pace(.7);
    if(trigger)await triggerAfterDraw(p);
  }else toast('引けるカードがありません');
  return drawn;
}
async function discardCardsFromHand(target,cards,{event=true}={}){
  const from=handRect(target),to=pileRect(target,'trash');
  let n=0;
  for(const c of cards){
    const i=G.players[target].hand.indexOf(c);
    if(i>=0){G.players[target].hand.splice(i,1);sendToDiscard(c);n++;flyCard({from,to,proto:c.protocol,delay:n*110});}
  }
  if(n){
    slashFX(from);shakeScreen();
    floatLabel(from,`-${n}枚 捨て札`,'#ff8f9c');
    log(`${playerName(target)} が手札を${n}枚捨て札にした`);render();await pace(.7);
    if(event)await triggerAfterDiscard(target,n);
  }
  return n;
}
async function deleteCard(card,{suppressUncover=false}={}){
  const loc=cardLocation(card);if(!loc||loc.line==null)return false;
  const el=elOf(card),r=el?el.getBoundingClientRect():stackRectOf(loc.player,loc.line);
  if(r){fxBurst(card.faceDown?'SPIRIT':card.protocol,55,{x:r.left+r.width/2,y:r.top+r.height/2});slashFX(r);floatLabel(r,'削除','#ff8f9c');}
  shakeScreen();
  flyCard({from:r,to:pileRect(loc.player,'trash'),proto:card.faceDown?null:card.protocol,back:card.faceDown});
  const stack=G.players[loc.player].lines[loc.line],wasTop=loc.index===stack.length-1;
  stack.splice(loc.index,1);sendToDiscard(card);
  log(`${card.faceDown?'裏向きカード':cardName(card)} を削除`);render();await pace();
  if(wasTop&&!suppressUncover)await revealTopIfNeeded(loc.player,loc.line,card);
  return true;
}
async function returnCard(card){
  const loc=cardLocation(card);if(!loc||loc.line==null)return false;
  const el=elOf(card),r=el?el.getBoundingClientRect():stackRectOf(loc.player,loc.line);
  if(r){fxBurst(card.faceDown?'SPIRIT':card.protocol,30,{x:r.left+r.width/2,y:r.top+r.height/2});floatLabel(r,'手札に戻す','#7fd8f8');}
  flyCard({from:r,to:handRect(card.owner),proto:card.faceDown?null:card.protocol,back:card.faceDown});
  const stack=G.players[loc.player].lines[loc.line],wasTop=loc.index===stack.length-1;
  stack.splice(loc.index,1);card.faceDown=false;G.players[card.owner].hand.push(card);
  log(`カードを所有者の手札に戻した`);render();await pace(.8);
  if(wasTop)await revealTopIfNeeded(loc.player,loc.line,card);
  return true;
}
async function flipCard(card){
  const loc=cardLocation(card);if(!loc||loc.line==null)return false;
  if(!card.faceDown&&card.protocol==='METAL'&&card.value===6){log('METAL 6：反転する代わりに削除');await deleteCard(card);return false;}
  card.faceDown=!card.faceDown;
  log(`カードを${card.faceDown?'裏向き':'表向き'}に反転`);render();
  const fel=elOf(card);
  if(fel&&SET.fx)fel.classList.add('flipin');
  fxAtCard(card,28);
  floatLabel(fel?fel.getBoundingClientRect():stackRectOf(loc.player,loc.line),card.faceDown?'反転 → 裏':'反転 → 表','#e8c96a');
  await pace(.9);
  if(!card.faceDown&&isTop(card))await activateVisibleCard(card,{reason:'flip',holder:loc.player,line:loc.line});
  return true;
}
async function playTopDeck(p,l,{faceDown=true,underCard=null}={}){
  reshuffleIfNeeded(p);
  const c=G.players[p].deck.pop();if(!c){toast('デッキにも捨て札にもカードがありません');return null;}
  c.faceDown=faceDown;
  flyCard({from:pileRect(p,'deck'),to:stackRectOf(p,l),back:true});
  if(underCard){const st=G.players[p].lines[l],idx=st.indexOf(underCard);st.splice(Math.max(0,idx),0,c);}
  else{await beforeCover(p,l,c);G.players[p].lines[l].push(c);}
  log(`${playerName(p)} がデッキ上からLINE ${l+1}へ裏向きでプレイ`);render();fxAtCard(c,20);await pace(.7);
  return c;
}
async function moveCard(card,targetLine=null){
  const loc=cardLocation(card);if(!loc||loc.line==null)return false;
  const p=loc.player,source=loc.line;
  const label=card.faceDown?'裏向きカード':cardName(card);
  if(targetLine==null){
    const options=[0,1,2].filter(l=>l!==source);
    const el=elOf(card);el?.classList.add('movingcard');
    targetLine=await chooseLine(`${label} の移動先`,options,false);
    document.querySelectorAll('.movingcard').forEach(x=>x.classList.remove('movingcard'));
  }
  if(targetLine==null||targetLine===source)return false;
  const fromR=elOf(card)?.getBoundingClientRect();
  const sourceStack=G.players[p].lines[source],wasTop=loc.index===sourceStack.length-1;
  const activatesAfterMove=!card.faceDown&&!wasTop&&!!T(card).m;
  sourceStack.splice(loc.index,1);
  if(wasTop)await revealTopIfNeeded(p,source,card);
  await beforeCover(p,targetLine,card);
  G.players[p].lines[targetLine].push(card);
  flyCard({from:fromR,to:stackRectOf(p,targetLine),proto:card.faceDown?null:card.protocol,back:card.faceDown});
  floatLabel(stackRectOf(p,targetLine),'移動','#7fd8f8');
  log(`${label} をLINE ${source+1}からLINE ${targetLine+1}へ移動`);
  render();fxAtCard(card,22);await pace(.8);
  if(activatesAfterMove&&fieldLocation(card)&&isTop(card)){
    await activateVisibleCard(card,{reason:'uncover',holder:p,line:targetLine,moved:true});
  }
  return true;
}

/* ---- 手札から選ぶ：下の手札をそのままタップ ---- */
function renderHandOf(pp){

  const n=G.players[pp].hand.length,mid=(n-1)/2;
  G.players[pp].hand.forEach((c,i)=>{

function pickFromHand(target,{min=1,max=1,title='手札を選択',allowFewer=false,candidates=null}={}){
  return new Promise(res=>{
    const own=target===uiViewer();
    if(!own)renderHandOf(target);
    const h=$('#hand'),sel=[],allowed=Array.isArray(candidates)?new Set(candidates):null;
    let d,okBtn,cntEl;
    const cleanup=()=>{d.remove();renderHand();};
    const update=()=>{cntEl.textContent=`選択中 ${sel.length}枚（${min}〜${max}枚）— 下の手札をタップ`;okBtn.disabled=sel.length<min||sel.length>max;};
    [...h.querySelectorAll('.hfan')].forEach(el=>{
      const initial=G.players[target].hand.find(c=>c.id===el.dataset.cid);
      if(allowed&&!allowed.has(initial)){
        el.classList.add('unselectable');el.style.opacity='.28';el.setAttribute('aria-disabled','true');
        el.onclick=()=>toast('この効果では選べないカードです');el.oncontextmenu=e=>e.preventDefault();return;
      }
      el.onclick=()=>{
        const card=G.players[target].hand.find(c=>c.id===el.dataset.cid);if(!card)return;
        const i=sel.indexOf(card);
        if(i>=0){sel.splice(i,1);el.classList.remove('selected');}
        else if(sel.length<max){sel.push(card);el.classList.add('selected');}
        update();};
      el.oncontextmenu=e=>{e.preventDefault();};
    });
    const btns=[{label:'決定',cls:'gold usok',onClick:()=>{if(sel.length>=min&&sel.length<=max){const r=[...sel];cleanup();res(r);}}}];
    if(allowFewer)btns.push({label:'選ばない',onClick:()=>{cleanup();res([]);}});
    d=uiSheet({title:esc(title),sub:'<span class="uscount"></span>',buttons:btns});
    okBtn=d.querySelector('.usok');cntEl=d.querySelector('.uscount');update();
  });
}
async function chooseHandCards(target,{min=1,max=1,title='手札を選択',reason='',allowFewer=false}={}){
  const hand=G.players[target].hand;if(!hand.length)return[];
  await privacyGate(target,reason);

}

/* ---- 対象カード：候補列挙をCPUと共用、人間は確認後に決定 ---- */
function fieldChoiceCandidates(title,filter=()=>true,opts={}){
  const includeCovered=opts.includeCovered??/(覆われ|すべて|全て)/.test(title);
  const cands=[];
  for(let q=0;q<2;q++)for(let l=0;l<3;l++){
    const line=G.players[q].lines[l];
    line.forEach((card,i)=>{
      const covered=i<line.length-1;
      if(!includeCovered&&covered)return;
      if(!filter(card,{player:q,line:l,index:i,covered}))return;
      cands.push(card);
    });
  }
  return cands;
}
function normalizeFieldChoiceCards(cands){
  const seen=new Set(),cards=[];
  for(const item of cands||[]){
    const card=item?.card||item?.c||item;
    if(!card||seen.has(card.id)||!fieldLocation(card))continue;
    seen.add(card.id);cards.push(card);
  }
  return cards;
}
function fieldChoiceSafeName(card,viewer){
  const loc=fieldLocation(card);

function fieldChoiceMeta(card,viewer){

}

    const underHidden=underCard.faceDown&&loc.player!==viewer;
    item.appendChild(scaled(fullCard(underCard,{dim:underCard.faceDown?['top','mid','bot']:['mid','bot'],hide:underHidden}),68));
    const cap=document.createElement('span');
    cap.textContent=`下から${i+1}枚目${i===below.length-1?' ・ 直下':''} / ${fieldChoiceSafeName(underCard,viewer)}`;
    item.appendChild(cap);list.appendChild(item);
  });

function pickFieldCardCandidates(title,cands,opts={}){
  const viewer=opts.viewer??uiViewer(),allowCancel=!!opts.allowCancel;
  const includeCovered=opts.includeCovered??/(覆われ|すべて|全て)/.test(title);
  const cards=normalizeFieldChoiceCards(cands);
  if(!cards.length){toast('選択できる対象がありません');return Promise.resolve(null);}
  return new Promise(resolve=>{
    let sheet=null,finished=false;
    const clearTargets=()=>{
      document.getElementById('gameMain')?.classList.remove('targeting');
      document.querySelectorAll('.targetable,.targetselected').forEach(el=>{
        el.classList.remove('targetable','targetselected');el.onclick=null;el.onkeydown=null;
        el.removeAttribute('role');el.removeAttribute('tabindex');el.removeAttribute('aria-label');
      });
    };
    const cleanup=()=>{sheet?.remove();clearTargets();render();};
    const finish=card=>{
      if(finished)return;
      if(card&&!fieldLocation(card)){toast('対象が盤面から移動しました。選び直してください');showChoices();return;}
      finished=true;cleanup();resolve(card||null);
    };
    const showPreview=card=>{
      const loc=fieldLocation(card);if(!loc){showChoices();return;}
      document.querySelectorAll('.targetselected').forEach(el=>el.classList.remove('targetselected'));
      elOf(card)?.classList.add('targetselected');
      const buttons=[
        {label:'別のカードを見る',cls:'usback',onClick:()=>showChoices(card)},
        {label:'このカードを対象にする',cls:'gold usconfirm',onClick:()=>finish(card)}
      ];
      if(allowCancel)buttons.push({label:'選ばない',cls:'danger',onClick:()=>finish(null)});
      sheet=uiSheet({title:esc(title),sub:esc(fieldChoiceMeta(card,viewer))+'<br>内容と下のカードを確認してから決定してください。',
        cardEl:fieldChoicePreview(card,viewer),buttons});
      sheet.classList.add('targetreviewsheet');sheet.setAttribute('role','dialog');sheet.setAttribute('aria-modal','false');sheet.setAttribute('aria-label',title);
      setTimeout(()=>sheet?.querySelector('.usconfirm')?.focus(),0);
    };
    const showChoices=restoreCard=>{
      document.querySelectorAll('.targetselected').forEach(el=>el.classList.remove('targetselected'));
      const els=cards.map(card=>elOf(card)),onBoard=els.every(Boolean);
      const buttons=[];
      if(!onBoard)cards.forEach(card=>buttons.push({html:`<strong>${esc(fieldChoiceSafeName(card,viewer))}</strong><small>${esc(fieldChoiceMeta(card,viewer))}</small>`,onClick:()=>showPreview(card)}));
      if(allowCancel)buttons.push({label:'選ばない',cls:'danger',onClick:()=>finish(null)});
      const guide=onBoard?'「対象」と表示されたカードをタップし、内容を確認してください。':'候補を選び、内容を確認してください。';
      sheet=uiSheet({title:esc(title),sub:guide+(includeCovered?' 覆われたカードも候補です。':''),buttons});
      sheet.classList.add('fieldchoicesheet');sheet.setAttribute('role','region');sheet.setAttribute('aria-label',title);
      if(onBoard){
        document.getElementById('gameMain')?.classList.add('targeting');
        cards.forEach((card,i)=>{
          const el=els[i],label=`${fieldChoiceSafeName(card,viewer)} / ${fieldChoiceMeta(card,viewer)}`;
          el.classList.add('targetable');el.setAttribute('role','button');el.tabIndex=0;el.setAttribute('aria-label','対象候補 '+label);
          el.onclick=e=>{e.stopPropagation();showPreview(card);};
          el.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();showPreview(card);}};
        });
        if(restoreCard)setTimeout(()=>elOf(restoreCard)?.focus(),0);
      }
    };
    showChoices();
  });
}
function chooseFieldCard(title,filter=()=>true,opts={}){
  const viewer=opts.viewer??uiViewer();
  const cands=fieldChoiceCandidates(title,filter,{...opts,viewer});
  return pickFieldCardCandidates(title,cands,{...opts,viewer});
}
/* ---- プレイ時の表裏選択もシートに（カードは手札で持ち上がる） ---- */
async function promptPlayCard(p,card,{free=false,required=free}={}){
  if(!G.players[p].hand.includes(card))return false;
  const up=legalFaceUpLines(p,card),down=legalFaceDownLines(p);
  if(!up.length&&!down.length){toast('プレイできるラインがありません');return false;}
  const hel=elOf(card);hel?.classList.add('selected');
  const mode=await new Promise(res=>{
    let d;
    const btns=[];
    if(up.length)btns.push({html:`<strong>表向きでプレイ</strong><small>効果発動／ライン ${up.map(x=>x+1).join('・')}</small>`,cls:'gold',onClick:()=>{d.remove();res('up');}});
    if(down.length)btns.push({html:`<strong>裏向きでプレイ</strong><small>値2・効果なし／ライン ${down.map(x=>x+1).join('・')}</small>`,onClick:()=>{d.remove();res('down');}});
    if(!up.length)btns.push({html:`<strong style="opacity:.45">表向き不可</strong><small>同名プロトコルのラインがありません</small>`,onClick:()=>{}});
    btns.push({label:required?'カード選択に戻る':'キャンセル',cls:'danger',onClick:()=>{d.remove();res(null);}});
    d=uiSheet({title:esc(cardName(card)),sub:kw(cardText(card)),buttons:btns,cardEl:scaled(fullCard(card),Math.min(120,Math.round(innerWidth*0.3)))});
  });
  hel?.classList.remove('selected');
  if(!mode)return false;
  const lines=mode==='up'?up:down;
  const l=await pickLineWithGhost(p,card,lines,mode,{cancelLabel:required?'カード選択に戻る':'キャンセル'});
  if(l==null)return false;
  const fromR=elOf(card)?.getBoundingClientRect();
  removeFromHand(p,card);card.faceDown=mode==='down';
  await beforeCover(p,l,card);
  const covering=G.players[p].lines[l].length>0;
  G.players[p].lines[l].push(card);
  flyCard({from:fromR,to:stackRectOf(p,l),proto:card.faceDown?null:card.protocol,back:card.faceDown});
  log(`${playerName(p)} が${card.faceDown?'裏向きカード':cardName(card)}をLINE ${l+1}へ${card.faceDown?'裏向き':'表向き'}でプレイ`);
  render();fxAtCard(card,40);await pace(.6);
  if(!card.faceDown)await activateVisibleCard(card,{reason:'play',holder:p,line:l,covering});
  return true;
}
/* ---- 断定系の追加プレイ：解決可能な限り、戻っても選択を継続する ---- */
async function promptExtraPlay(p){
  for(;;){
    const hand=G.players[p].hand,down=legalFaceDownLines(p);
    const playable=hand.filter(card=>down.length||legalFaceUpLines(p,card).length);
    if(!playable.length){toast('プレイ可能なカードがありません');log('追加プレイ：解決可能なカードがないため終了');return false;}
    const card=await choose('プレイするカード','必ず1枚プレイします。途中で戻っても、この選択は終了しません。',playable.map(card=>({title:cardName(card),desc:cardText(card),value:card})),{allowCancel:false});
    if(!card)continue;
    if(await promptPlayCard(p,card,{free:true,required:true}))return true;
  }
}

    signature:(protocol,value=3,seed=1)=>{

})();

async function netHandleRemoteRequest(m,env){

    !m.id.startsWith(env.fromClient+'-req-')||
    !['hand','field','line','confirm','choice','extra_play','protocol_order','inspect_card','reveal_hand_ui'].includes(m.kind))return;

  if(NET.inflightRequests.has(m.id)){

  }

    const accepted=m.accepted===true&&m.baseRevision===pending.baseRevision&&m.nextRevision===pending.baseRevision+1&&
      Array.isArray(m.order)&&m.order.length===pending.order.length&&m.order.every((name,index)=>name===pending.order[index])&&
      netProtocolOrderExact(1,pending.baseOrder)&&G?.protocolOrderRevision?.[1]===pending.baseRevision&&
      netApplyProtocolOrder(1,pending.order,{expectedRevision:pending.baseRevision,nextRevision:m.nextRevision});
    if(accepted)netSend({t:'state',G});

  }

    if(!netIsOpponent(env)||typeof m.id!=='string'||!m.id.startsWith(NET.clientId+'-req-'))return;
    const pending=NET.pending[m.id];delete NET.pending[m.id];

function netRequest(kind,payload){

  return new Promise(resolve=>{
    const id=NET.clientId+'-req-'+(++NET.reqSeq);
    const timer=setTimeout(()=>{
      const pending=NET.pending[id];if(!pending)return;
      delete NET.pending[id];clearInterval(pending.abortTimer);document.getElementById('uisheet')?.remove();
      toast('相手の応答がありません。通信を確認してください',4000);resolve(null);void netFlushDeferredState();
    },120000);
    const abortTimer=setInterval(()=>{
      if(NET.on)return;
      const pending=NET.pending[id];
      if(!pending){clearInterval(abortTimer);return;}
      delete NET.pending[id];clearTimeout(pending.timer);clearInterval(abortTimer);
      document.getElementById('uisheet')?.remove();pending.resolve(null);void netFlushDeferredState();
    },250);
    NET.pending[id]={resolve,timer,abortTimer};
    netSend({t:'req',id,kind,payload,G});

/* ---- 必須の遠隔選択：通信中は「未応答／不正応答」をキャンセルと扱わない ---- */
function netDecisionSnapshot(remoteRole){
  return{remoteRole,hasGame:!!G,turn:G?.turn??null,current:G?.current??null,phase:G?.phase??null,winner:G?.winner??null};
}
function netDecisionSnapshotActive(snapshot){
  if(!snapshot||!NET.on||snapshot.remoteRole===NET.role)return false;
  if(!snapshot.hasGame)return!G;
  return!!G&&G.turn===snapshot.turn&&G.current===snapshot.current&&G.phase===snapshot.phase&&G.winner===snapshot.winner;
}
async function netRequiredRetryPause(snapshot,attempt){
  const waitMs=Math.min(2600,400+Math.max(0,attempt-1)*300),until=Date.now()+waitMs;
  while(netDecisionSnapshotActive(snapshot)&&Date.now()<until){
    await new Promise(resolve=>setTimeout(resolve,Math.min(250,Math.max(1,until-Date.now()))));
  }

}
async function netRequiredRequest(kind,snapshot,prepare,accept){
  let attempt=0;
  while(netDecisionSnapshotActive(snapshot)){
    const prepared=prepare();
    if(!prepared)return{ok:false,reason:'unavailable'};
    const raw=await netRequest(kind,prepared.payload);
    if(!netDecisionSnapshotActive(snapshot))return{ok:false,reason:'ended'};
    const accepted=accept(raw,prepared);
    if(accepted?.ok)return accepted;
    try{await netFlushDeferredState();}catch(e){console.warn('required choice state refresh',e);}
    if(!netDecisionSnapshotActive(snapshot))return{ok:false,reason:'changed'};
    attempt++;
    if(attempt===1||attempt%3===0)toast('必須の選択が完了していないため、通信を確認して再要求します',3500);
    if(!await netRequiredRetryPause(snapshot,attempt))return{ok:false,reason:'ended'};
  }

<script id="skin-pro-v7">
/* ==== v7: 攻撃演出・レイアウト適応・合計値表示・リフレッシュ変更 ==== */
'use strict';
/* ---- 効果元カードの追跡 ---- */
let FXSRC=null;
const _avc7=activateVisibleCard;
activateVisibleCard=function(card,ctx){FXSRC=card;const p=_avc7(card,ctx);return Promise.resolve(p).finally(()=>{FXSRC=null;});};
/* ---- プロトコル個性つき攻撃ビーム ---- */
const BEAMSTYLE={WATER:'stream',SPIRIT:'stream',PLAGUE:'stream',FIRE:'stream',LIFE:'pulse',LIGHT:'bolt',METAL:'bolt',SPEED:'bolt',DEATH:'bolt',GRAVITY:'spiral',PSYCHIC:'spiral',DARKNESS:'spiral'};
function beamFX(fromR,toR,proto){
  if(!SET.fx||!fromR||!toR)return Promise.resolve();
  const cv=$('#fx'),ctx=cv.getContext('2d'),dpr=devicePixelRatio||1;
  cv.width=innerWidth*dpr;cv.height=innerHeight*dpr;
  const m=pmeta(proto),style=BEAMSTYLE[proto]||'bolt';
  const x0=(fromR.left+fromR.width/2)*dpr,y0=(fromR.top+fromR.height/2)*dpr;
  const x1=(toR.left+toR.width/2)*dpr,y1=(toR.top+toR.height/2)*dpr;
  const cols=[m.pal[3],m.pal[4],m.pop,'#ffffff'];
  const T=Math.round(40*Math.max(SET.fx,.55));let f=0;
  return new Promise(res=>{
    let done=false;const fin=()=>{if(done)return;done=true;try{ctx.clearRect(0,0,cv.width,cv.height);}catch(e){}res();};
    const guard=setTimeout(fin,1800);
    function tick(){
      ctx.clearRect(0,0,cv.width,cv.height);ctx.globalCompositeOperation='lighter';
      const k=f/T,adv=Math.min(1,k*1.55);
      if(style==='stream'){
        for(let s=0;s<5;s++){
          ctx.strokeStyle=cols[s%4];ctx.globalAlpha=.5*(1-k*.35);ctx.lineWidth=(3.2-s*.5)*dpr;ctx.lineCap='round';
          ctx.beginPath();ctx.moveTo(x0,y0);
          const mx=(x0+x1)/2+Math.sin(f*.5+s*2.1)*44*dpr,my=(y0+y1)/2+Math.cos(f*.42+s)*32*dpr;
          ctx.quadraticCurveTo(mx,my,x0+(x1-x0)*adv,y0+(y1-y0)*adv);ctx.stroke();}
      }else if(style==='bolt'){
        for(let s=0;s<3;s++){
          ctx.strokeStyle=cols[s%4];ctx.globalAlpha=.75*(1-k*.45);ctx.lineWidth=(2.6-s*.6)*dpr;
          ctx.beginPath();ctx.moveTo(x0,y0);
          for(let i=1;i<=6;i++){const t=i/6*adv;
            ctx.lineTo(x0+(x1-x0)*t+(i<6?(Math.random()-.5)*28*dpr:0),y0+(y1-y0)*t+(i<6?(Math.random()-.5)*28*dpr:0));}
          ctx.stroke();}
      }else if(style==='spiral'){
        const cx=x0+(x1-x0)*adv,cy=y0+(y1-y0)*adv;
        ctx.strokeStyle=cols[0];ctx.globalAlpha=.55;ctx.lineWidth=2*dpr;
        ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(cx,cy);ctx.stroke();
        for(let s=0;s<4;s++){
          ctx.strokeStyle=cols[s%4];ctx.globalAlpha=.6*(1-k*.3);ctx.lineWidth=2.2*dpr;
          const r=Math.max(3*dpr,(34-s*7)*dpr*(1-adv)+7*dpr);
          ctx.beginPath();ctx.arc(x1,y1,r,f*.32+s*1.6,f*.32+s*1.6+4.4);ctx.stroke();}
      }else{
        for(let s=0;s<5;s++){const t=((k*1.4)+s*.14)%1;if(t>adv)continue;
          const px=x0+(x1-x0)*t,py=y0+(y1-y0)*t;
          ctx.fillStyle=cols[s%4];ctx.globalAlpha=.65;
          ctx.beginPath();ctx.arc(px,py,(6-s)*dpr,0,7);ctx.fill();
          ctx.strokeStyle=cols[(s+1)%4];ctx.globalAlpha=.4;
          ctx.beginPath();ctx.arc(px,py,(9-s)*dpr,0,7);ctx.stroke();}

      for(let i=0;i<7;i++){const t=(((f*.06)+i/7)%1)*adv;

      ctx.globalAlpha=1;
      if(++f<T&&!done)requestAnimationFrame(tick);
      else{clearTimeout(guard);fin();}
    }

  });
}

  if(r){fxBurst(card.faceDown?'SPIRIT':card.protocol,55,{x:r.left+r.width/2,y:r.top+r.height/2});slashFX(r);floatLabel(r,'削除','#ff8f9c');}

  const from=handRect(target),to=pileRect(target,'trash');
  if(cards.length&&FXSRC&&FXSRC.owner!==target)await attackFrom(from);

      },0);
      return cpuPickRanked(vals.map(v=>({value:v,key:String(v),score:score(v)})),{salt:`choose-value:${title}`})?.value??vals[0];
    }
    if(/公開したカード/.test(title)){
      if(vals.includes('move'))return'move';if(vals.includes('none'))return'none';
    }
    if(/対象プレイヤー/.test(title)){
      const entries=vals.map(target=>({value:target,key:String(target),score:cpuBestProtocolSwap(target).score}));
      return cpuPickRanked(entries,{salt:`choose-player:${title}`})?.value??vals[0];
    }
    if(vals.every(v=>v&&typeof v==='object'&&G.players[cpuPlayer()].hand.includes(v))){
      if(cpuLevel()==='invincible'){
        const plan=cpuBestPlay(cpuPlayer());
        if(plan?.card&&vals.includes(plan.card)){CPU.pendingPlan=plan;return plan.card;}
      }
      const plans=[];for(const card of vals)plans.push(...cpuPlansForCard(cpuPlayer(),card));
      return cpuPickRanked(plans,{salt:`choose-hand:${title}`})?.card||vals[0];
    }
    return vals[0];
  };

  const humanChooseLine=chooseLine;
  chooseLine=async function(title,lines=[0,1,2],allowCancel=false){
    if(!cpuMode()||cpuActor()!==cpuPlayer())return humanChooseLine.apply(this,arguments);
    if(!Array.isArray(lines)||!lines.length)return null;
    await cpuDelay(.28);
    const score=line=>{
      if(CPU.lastFieldCard&&/移動先|移動/.test(title))return cpuMoveDelta(CPU.lastFieldCard,line);
      if(/コンパイル/.test(title)){
        const margin=stackTotal(cpuPlayer(),line)-stackTotal(humanPlayer(),line);
        if(cpuLevel()==='invincible'){
          const pr=G.players[cpuPlayer()].protocols[line],count=cpuCompiledCount(cpuPlayer());
          if(!pr.compiled&&count===2)return 1e12+margin;
          if(!pr.compiled)return 1e9+margin;
        }
        return margin;
      }
      if(/削除|戻す/.test(title))return cpuLineRemovalScore(line);
      return cpuLineBuildScore(line);
    };
    return cpuPickRanked(lines.map(line=>({line,key:String(line),score:score(line)})),{salt:`line:${title}`})?.line??lines[0];
  };
  function cpuLineRemovalScore(line){
    let s=0;for(let p=0;p<2;p++)for(const c of G.players[p].lines[line])s+=(p===humanPlayer()?1:-1)*cpuPublicValue(c);
    return s;
  }
  function cpuLineBuildScore(line){
    const me=cpuPlayer(),op=humanPlayer(),a=stackTotal(me,line),b=stackTotal(op,line);
    return(a<10?10-Math.abs(10-a):2)+(a>b?3:0)-(b>=10&&b>a?4:0);
  }

  const humanChooseField=chooseFieldCard;
  chooseFieldCard=async function(title,filter=()=>true,opts={}){
    let actor;
    if(isRole(opts.decisionPlayer))actor=opts.decisionPlayer;
    else if(/PLAGUE 4：自分の裏向きを削除/.test(title)&&isRole(opts.viewer))actor=opts.viewer;
    else actor=cpuActor(opts.viewer);
    if(!cpuMode()||actor!==cpuPlayer())return humanChooseField.apply(this,arguments);
    const cands=cpuFieldCandidates(title,filter,opts);
    if(!cands.length){toast('選択できる対象がありません');return null;}
    await cpuDelay(.38);
    const picked=cpuPickRanked(cands.map(card=>({card,key:cpuCardKey(card),score:cpuTargetScore(card,title)})),{salt:`field:${title}`});
    if(opts.allowCancel&&picked.score<=0){CPU.lastFieldCard=null;return null;}
    CPU.lastFieldCard=picked.card;return picked.card;
  };

  const humanChooseHand=chooseHandCards;
  chooseHandCards=async function(target,opts={}){
    if(!cpuMode()||target!==cpuPlayer())return humanChooseHand.apply(this,arguments);
    const hand=G.players[target].hand;if(!hand.length)return[];
    await cpuDelay(.3);
    const max=Math.min(Number(opts.max??1),hand.length),min=Math.min(Number(opts.min??1),max);
    let count=min;
    if(min===0&&/SPIRIT 1/.test(String(opts.reason||opts.title||'')))count=Math.min(1,max);
    if(/FIRE 4/.test(String(opts.title||'')))count=Math.min(max,Math.max(1,Math.min(2,hand.length)));
    if(opts.allowFewer&&min===0&&count===0)return[];
    const ranked=[...hand].sort((a,b)=>cpuHandValue(a)-cpuHandValue(b)||cpuCardKey(a).localeCompare(cpuCardKey(b)));
    if(cpuLevel()==='easy'&&ranked.length>1)ranked.reverse();
    return ranked.slice(0,count);
  };

  function cpuProtocolOrderScore(target,order){
    let s=0;const sign=target===cpuPlayer()?1:-1;
    for(let l=0;l<3;l++){
      const pr=order[l],total=stackTotal(target,l),opp=stackTotal(other(target),l);
      let lane=(total-opp)*2+(total>=10&&total>opp?12:0)+(pr.compiled?5:0);
      if(target===cpuPlayer())lane+=G.players[target].hand.filter(c=>c.protocol===pr.name).length*1.5;
      s+=sign*lane;
    }
    return s;
  }
  function cpuBestProtocolSwap(target){
    const original=G.players[target].protocols,entries=[];
    for(const[a,b]of[[0,1],[0,2],[1,2]]){
      const order=[...original];[order[a],order[b]]=[order[b],order[a]];
      entries.push({order,key:`${a}:${b}`,score:cpuProtocolOrderScore(target,order)});
    }
    return cpuPickRanked(entries,{salt:`protocol-swap:${target}`})||{order:[...original],score:-Infinity};
  }
  const humanReorder=reorderProtocols;
  reorderProtocols=async function(target,title='プロトコルを並べ替える'){
    if(!cpuMode()||cpuActor()!==cpuPlayer())return humanReorder.apply(this,arguments);
    await cpuDelay(.42);const best=cpuBestProtocolSwap(target);
    G.players[target].protocols=[...best.order];
    log(`${playerName(target)} がプロトコル2枚の位置を1回入れ替えた`);render();
  };

  const humanPrivacyGate=privacyGate,humanPrivacyReturn=privacyReturn;
  privacyGate=function(){if(cpuMode())return Promise.resolve();return humanPrivacyGate.apply(this,arguments);};
  privacyReturn=function(){if(cpuMode())return Promise.resolve();return humanPrivacyReturn.apply(this,arguments);};
  const humanInspectSecret=inspectSecretCard;
  inspectSecretCard=async function(card,viewer){
    if(cpuMode()&&viewer===cpuPlayer()){await cpuDelay(.24);return;}
    return humanInspectSecret.apply(this,arguments);
  };
  const humanRevealHand=revealHandTo;
  revealHandTo=async function(viewer,target,title){
    if(cpuMode()&&viewer===cpuPlayer()){await cpuDelay(.3);return;}
    return humanRevealHand.apply(this,arguments);
  };

  /* Keep the correct decision owner through nested and triggered effects. */
  const gameActivate=activateVisibleCard;
  activateVisibleCard=function(card,ctx={}){
    const actor=fieldLocation(card)?.player??ctx.holder??G?.current??0;
    return cpuWithActor(actor,()=>gameActivate.call(this,card,ctx));
  };
  const gameBeforeCover=beforeCover;
  beforeCover=function(player,line,incoming){return cpuWithActor(player,()=>gameBeforeCover.call(this,player,line,incoming));};
  const gameAfterDraw=triggerAfterDraw;
  triggerAfterDraw=function(player){return cpuWithActor(player,()=>gameAfterDraw.call(this,player));};
  const gameStartPhase=resolveStartPhase,gameEndPhase=resolveEndPhase;
  resolveStartPhase=function(player){return cpuWithActor(player,()=>gameStartPhase.call(this,player));};
  resolveEndPhase=function(player){return cpuWithActor(player,()=>gameEndPhase.call(this,player));};
  const gameControlRelease=controlReleaseAndOptionalReorder;
  controlReleaseAndOptionalReorder=function(player){return cpuWithActor(player,()=>gameControlRelease.call(this,player));};
  const gameMovePrompt=moveCardPrompt;
  moveCardPrompt=function(card,chooser){return cpuWithActor(chooser,()=>gameMovePrompt.call(this,card,chooser));};

  /* ---------- State-based play execution ---------- */
  async function cpuCommitPlay(player,card,forcedPlan=null){
    if(!G.players[player].hand.includes(card))return false;
    const queued=CPU.pendingPlan?.card===card?CPU.pendingPlan:null;CPU.pendingPlan=null;
    const plan=forcedPlan||queued||cpuBestPlay(player,card);if(!plan)return false;
    const legal=plan.mode==='up'?legalFaceUpLines(player,card):legalFaceDownLines(player);
    if(!legal.includes(plan.line))return false;
    removeFromHand(player,card);card.faceDown=plan.mode==='down';
    await beforeCover(player,plan.line,card);
    const covering=G.players[player].lines[plan.line].length>0;
    G.players[player].lines[plan.line].push(card);
    log(`${playerName(player)} が${card.faceDown?'裏向きカード':cardName(card)}をLINE ${plan.line+1}へ${card.faceDown?'裏向き':'表向き'}でプレイ`);
    render();fxAtCard(card,40);await pace(.6);
    if(!card.faceDown&&fieldLocation(card))await activateVisibleCard(card,{reason:'play',holder:player,line:plan.line,covering});
    return true;
  }
  const humanPromptPlay=promptPlayCard;
  promptPlayCard=function(player,card,opts={}){
    if(cpuMode()&&player===cpuPlayer()&&cpuActor(player)===cpuPlayer())return cpuCommitPlay(player,card);
    return humanPromptPlay.apply(this,arguments);
  };
  function cpuHasLosingThreat(plan=null){
    const me=cpuPlayer(),op=humanPlayer(),add=plan?(plan.mode==='up'?(Number(plan.card?.value)||0):2):0;
    if(cpuCompiledCount(op)!==2)return false;
    return[0,1,2].some(line=>{
      if(G.players[op].protocols[line].compiled)return false;
      const mine=stackTotal(me,line)+(plan&&plan.line===line?add:0),theirs=stackTotal(op,line);
      return theirs>=10&&theirs>mine;
    });
  }
  function cpuShouldRefresh(plan,need){
    if(!plan)return true;
    if(plan.mode==='refresh')return true;
    const level=cpuLevel();
    if(cpuHasLosingThreat(plan))return false;
    if(level==='easy')return need>0&&cpuUnit(cpuDecisionKey('easy-refresh',cpuCardKey(plan.card)))<.3;
    if(level==='normal')return need>=3&&plan.score<8;
    if(level==='hard')return need>=4&&plan.score<4;
    if(level==='expert')return need>=4&&plan.score<0;
    return false;
  }
  async function cpuTakeAction(tokenTurn){
    const player=cpuPlayer();if(!cpuOwnTurn()||G.turn!==tokenTurn||G.phase!=='action')return;
    stableState=false;G.busy=true;render();await cpuDelay(.8);
    let plan=cpuBestPlay(player),played=false;
    const need=Math.max(0,5-G.players[player].hand.length);
    const shouldRefresh=cpuShouldRefresh(plan,need);
    if(!shouldRefresh&&plan)played=await cpuCommitPlay(player,plan.card,plan);
    if(!played){await refreshPlayer(player);}
    if(G&&G.winner==null&&G.current===player&&G.turn===tokenTurn)await finishAction();
  }

  const humanMainPlay=mainPlay,humanMainRefresh=mainRefresh;
  mainPlay=function(card){
    if(cpuMode()&&G?.current!==humanPlayer()){toast('CPUの手番です');return;}
    return humanMainPlay.apply(this,arguments);
  };
  mainRefresh=function(){
    if(cpuMode()&&G?.current!==humanPlayer()){toast('CPUの手番です');return;}
    return humanMainRefresh.apply(this,arguments);
  };

  async function cpuRunScheduledTurn(turn,player,phase,token){
    if(token!==CPU.turnToken||CPU.running||!cpuMode()||!G||G.turn!==turn||G.current!==player||G.phase!==phase||!['handoff','action'].includes(phase))return;
    CPU.running=true;
    try{
      if(phase==='handoff')await cpuWithActor(player,()=>runTurn());
      else{G.busy=false;stableState=true;render();}
      if(token!==CPU.turnToken||!G||G.turn!==turn||G.current!==player||G.winner!=null)return;
      if(player===cpuPlayer()&&G.phase==='action'&&!G.busy)await cpuTakeAction(turn);
    }catch(e){
      console.error('CPU turn',e);toast('CPUの処理でエラーが発生しました',4000);
      if(G?.phase==='action'){G.busy=false;render();}
    }finally{CPU.running=false;}
  }
  function cpuScheduleTurn(){
    cpuSyncMode();if(!cpuMode()||!G||G.winner!=null)return;
    clearTimeout(CPU.turnTimer);const turn=G.turn,player=G.current,phase=G.phase,token=++CPU.turnToken;
    CPU.turnTimer=setTimeout(()=>void cpuRunScheduledTurn(turn,player,phase,token),player===cpuPlayer()?Math.max(300,CPU.thinkMs):160);
  }
  const gameShowHandoff=showHandoff;
  showHandoff=function(){
    cpuSyncMode();
    if(!cpuMode())return gameShowHandoff.apply(this,arguments);
    $('#handoff')?.classList.remove('show');
    if(typeof showNetWait==='function')showNetWait(false);
    render();cpuScheduleTurn();
  };

  /* ---------- Fixed human view and safe local controls ---------- */
  function cpuRenderSidebars(viewer){
    const opponent=other(viewer),canAct=G.current===viewer&&G.phase==='action'&&!G.busy;
    const canRefresh=canAct&&G.players[viewer].hand.length<5;
    $('#sideOpp').innerHTML=`<div class="playername">${esc(playerName(opponent))}</div>${backsHTML(G.players[opponent].hand.length)}${pileHTML('deck',G.players[opponent].deck.length,'DECK')}${pileHTML('trash',G.players[opponent].discard.length,'TRASH')}`;
    $('#sideMe').innerHTML=`<div class="playername currentname">${esc(playerName(viewer))}</div>${pileHTML('deck',G.players[viewer].deck.length,'DECK')}${pileHTML('trash',G.players[viewer].discard.length,'TRASH')}${phaseHTML()}<div class="actions"><button id="sideRefresh" ${canRefresh?'':'disabled'}>更新</button><button class="view" id="sideHand">手札一覧</button><button class="view" id="sideField">場一覧</button><button class="view" id="sideLog">ログ</button></div>`;
    $('#sideRefresh').onclick=mainRefresh;$('#sideHand').onclick=openHandAll;$('#sideField').onclick=openFieldAll;$('#sideLog').onclick=openLog;
  }
  const gameRender=render,gameRenderSidebars=renderSidebars;
  render=function(){
    cpuSyncMode();if(!cpuMode()||!G)return gameRender.apply(this,arguments);
    const viewer=humanPlayer(),opponent=other(viewer);
    renderProtos('#myProtos',viewer);renderProtos('#oppProtos',opponent);
    renderStacks('#myStacks',viewer,viewer);renderStacks('#oppStacks',opponent,viewer);
    renderHandView(viewer);renderBarsView(viewer);cpuRenderSidebars(viewer);renderControlView(viewer);
    const canAct=G.current===viewer&&G.phase==='action'&&!G.busy;
    const hand=G.players[viewer].hand,empty=document.querySelector('#hand .handempty');
    if(empty)empty.innerHTML='手札がありません<br><b>「リフレッシュ」で5枚まで補充できます</b>';
    const playHint=document.getElementById('playHint');if(playHint)playHint.disabled=!canAct;
    const refreshDisabled=!canAct||hand.length>=5;
    for(const id of['refreshBtn','sideRefresh']){const b=document.getElementById(id);if(b)b.disabled=refreshDisabled;}
    setTimeout(()=>{
      if(!cpuMode()||!G)return;
      const pulse=G.current===viewer&&G.phase==='action'&&!G.busy&&G.players[viewer].hand.length<5;
      for(const id of['refreshBtn','sideRefresh'])document.getElementById(id)?.classList.toggle('pulsebtn',pulse);
    },0);
    const note=$('#note');if(note)note.textContent=G.current===viewer?(G.phase==='action'?`${playerName(viewer)}：手札をタップしてプレイ、またはリフレッシュ`:'あなたの手番を処理中'):`CPU（${cpuProfile().label}）が考えています…`;
  };
  renderSidebars=function(){if(cpuMode()&&G)return cpuRenderSidebars(humanPlayer());return gameRenderSidebars.apply(this,arguments);};
  const humanOpenField=openFieldAll;
  openFieldAll=function(){
    if(!cpuMode())return humanOpenField.apply(this,arguments);
    const viewer=humanPlayer();openOverlay('フィールド全体 — 全カード',openFieldAll);const list=$('#ovList');
    for(let l=0;l<3;l++)for(const p of[other(viewer),viewer]){
      const h=document.createElement('div');h.className='sechead';h.innerHTML=`<b>LINE ${l+1}</b> ${p===viewer?'自分':'相手'}側 ・ ${esc(G.players[p].protocols[l].name)}<span class="tt">合計 ${stackTotal(p,l)}</span>`;list.appendChild(h);
      const grid=document.createElement('div');grid.className='ovgrid';const cards=G.players[p].lines[l];
      if(!cards.length)grid.innerHTML='<div style="color:#5a5a66;font-size:11px;padding:8px">カードなし</div>';
      cards.forEach((card,i)=>grid.appendChild(miniItem(card,i<cards.length-1,p===viewer,viewer)));list.appendChild(grid);
    }
  };

  /* ---------- Entry, save/resume, and online exclusion ---------- */
  const gameNewGame=newGame;
  newGame=function(){cpuStop();return gameNewGame.apply(this,arguments);};
  if(typeof netHost==='function'){
    const gameNetHost=netHost;netHost=async function(){cpuStop();return gameNetHost.apply(this,arguments);};
  }
  if(typeof netJoin==='function'){
    const gameNetJoin=netJoin;netJoin=async function(){cpuStop();return gameNetJoin.apply(this,arguments);};
  }
  const gameRenderWelcome=renderWelcome;
  function cpuStoredLevel(saved){
    if(saved?.mode==='cpu')return cpuNormalizeLevel(saved.cpuLevel);
    try{return cpuNormalizeLevel(localStorage.getItem('compile-cpu-level')||CPU.level);}catch(e){return cpuNormalizeLevel(CPU.level);}
  }
  function cpuInstallDifficultyUI(actions,saved){
    if(!actions||document.getElementById('cpuDifficultyBox'))return;
    CPU.level=cpuStoredLevel(saved);
    const box=document.createElement('div');box.id='cpuDifficultyBox';
    box.style.cssText='max-width:620px;margin:14px auto 16px;padding:13px 15px;border:1px solid #30384d;border-radius:12px;background:rgba(10,14,25,.72);text-align:left';
    box.innerHTML=`<label for="cpuDifficulty" style="display:flex;gap:12px;align-items:center;justify-content:space-between;font-weight:800">CPU難易度<select id="cpuDifficulty" style="min-width:132px;padding:8px 10px;border-radius:8px;background:#111827;color:#f4f6ff;border:1px solid #59637a">${Object.entries(CPU_LEVELS).map(([id,p])=>`<option value="${id}" ${id===CPU.level?'selected':''}>${p.label}</option>`).join('')}</select></label><div id="cpuDifficultyHelp" style="margin-top:7px;color:#aeb8cf;font-size:12px;line-height:1.5"></div>`;
    actions.parentNode.insertBefore(box,actions);
    const select=box.querySelector('#cpuDifficulty'),help=box.querySelector('#cpuDifficultyHelp');
    const update=()=>{CPU.level=cpuNormalizeLevel(select.value);help.textContent=cpuProfile(CPU.level).description;try{localStorage.setItem('compile-cpu-level',CPU.level);}catch(e){}};
    select.onchange=update;update();
  }
  renderWelcome=function(){
    cpuSyncMode();const out=gameRenderWelcome.apply(this,arguments),actions=document.querySelector('.setupactions');
    const saved=loadSave?.();cpuInstallDifficultyUI(actions,saved);
    if(actions&&!document.getElementById('cpuStartBtn')){
      const b=document.createElement('button');b.id='cpuStartBtn';b.textContent='CPU対戦：ドラフト開始';b.onclick=cpuStartDraft;
      actions.insertBefore(b,document.getElementById('netHostBtn')||null);
    }
    if(saved?.mode==='cpu'){
      const cont=document.getElementById('continueGame');if(cont)cont.textContent='CPU対戦を続ける';
    }
    return out;
  };

  CPU.start=cpuStartDraft;CPU.stop=cpuStop;CPU.isActive=cpuMode;
  CPU.setThinkMs=ms=>{CPU.thinkMs=Math.max(0,Number(ms)||0);};
  CPU.setLevel=level=>{
    CPU.level=cpuNormalizeLevel(level);
    if(G?.mode==='cpu'){G.cpuLevel=CPU.level;autosave(true);}
    try{localStorage.setItem('compile-cpu-level',CPU.level);}catch(e){}
    return CPU.level;
  };
  CPU.getLevel=()=>cpuLevel();
  CPU.getSearchDiagnostics=()=>CPU.lastSearch?JSON.parse(JSON.stringify(CPU.lastSearch)):null;
  CPU.takeAction=()=>G?cpuTakeAction(G.turn):Promise.resolve();
  CPU.boardScore=cpuBoardScore;
  CPU.levels=Object.freeze(Object.fromEntries(Object.entries(CPU_LEVELS).map(([id,p])=>[id,Object.freeze({label:p.label,description:p.description,depth:p.depth})])));
  CPU._test=Object.freeze({
    normalizeLevel:cpuNormalizeLevel,
    profile:level=>({...cpuProfile(level)}),
    hash:(value,seed=1)=>cpuHash32(value,seed),
    rankChoice:(entries,level='normal',seed=1)=>{
      const normalized=(entries||[]).map((entry,index)=>typeof entry==='number'?{value:index,key:String(index),score:entry}:{...entry,key:String(entry.key??index)});
      const chosen=cpuPickRankedPure(normalized,{level,salt:'test-rank',seed});return chosen?{...chosen}:null;
    },
    fixtureScore:(plan,level='normal')=>cpuFixtureScore(plan,level),
    choosePlan:(plans,level='normal',seed=1)=>cpuChooseFixturePlan(plans,level,seed),
    draftSchedule:first=>cpuDraftSchedule(first),
    chooseCurrentPlay:(level='normal',seed=1,depthOverride=null)=>{
      if(!G?.players)return null;
      const oldLevel=CPU.level,oldSeed=CPU.seed,oldGLevel=G.cpuLevel,oldGSeed=G.cpuSeed;
      try{
        CPU.level=cpuNormalizeLevel(level);CPU.seed=Number(seed)>>>0;G.cpuLevel=CPU.level;G.cpuSeed=CPU.seed;
        const plans=[];for(const card of G.players[cpuPlayer()].hand)plans.push(...cpuPlansForCard(cpuPlayer(),card));
        const detail=CPU.level==='invincible'?cpuPerfectSearchPlans(plans,depthOverride):cpuSearchPlans(plans,CPU.level,depthOverride),chosen=cpuPickRanked(plans,{level:CPU.level,salt:'test-current',seed:CPU.seed});
        const search={level:CPU.level,legalPlans:plans.length,...detail,chosen:chosen?{card:cpuCardKey(chosen.card),mode:chosen.mode,line:chosen.line,score:chosen.score,baseScore:chosen.baseScore??chosen.score,searchScore:chosen.searchScore??0}:null};
        CPU.lastSearch=search;
        return{level:CPU.level,chosen:search.chosen,search:JSON.parse(JSON.stringify(search))};
      }finally{CPU.level=oldLevel;CPU.seed=oldSeed;G.cpuLevel=oldGLevel;G.cpuSeed=oldGSeed;}
    },
    currentSearch:()=>CPU.lastSearch?JSON.parse(JSON.stringify(CPU.lastSearch)):null,
    terminalPriorityFixture:(seed=1)=>{
      const plans=[
        {key:'ordinary',score:999999999},
        {key:'block',score:0,opponentImmediateWin:true,blocksImmediateWin:true},
        {key:'loss',score:999999999,opponentImmediateWin:true},
        {key:'win',score:-999999999,ownWin:true}
      ];
      const selected=cpuChooseFixturePlan(plans,'invincible',seed);
      const withoutWin=cpuChooseFixturePlan(plans.filter(p=>!p.ownWin),'invincible',seed);
      return{win:selected?.key||null,block:withoutWin?.key||null};
    }
  });

  if(G?.mode==='cpu'){cpuSyncMode();render();if(G.phase==='handoff')cpuScheduleTurn();}
  else if(document.querySelector('#setup:not(.hidden)'))renderWelcome();
})();

</script>
<script id="skin-pro-v9fx">
/* ==== v9: プレミアム演出 — プロトコル別攻撃・ドロー/削除強化・裏向きプレイ可視化 ==== */
'use strict';
/* skin-cpu.js の後、skin-audio.js の前に注入する（audioが最終定義に効果音を巻き付けるため） */
(()=>{
const TAU=Math.PI*2;
const lerp=(a,b,t)=>a+(b-a)*t;
const easeOut=t=>1-Math.pow(1-t,3);
const rnd=(a=1,b=null)=>b==null?Math.random()*a:a+Math.random()*(b-a);
function pal5(proto){
  try{const m=pmeta(proto);return{cols:[m.pal[2],m.pal[3],m.pal[4],m.pop,'#ffffff'],ac:m.ac};}
  catch(e){return{cols:['#8fb4ff','#b9ccff','#dce6ff','#ffffff','#ffffff'],ac:'#9fb4ff'};}
}
function noMo(){try{return matchMedia('(prefers-reduced-motion: reduce)').matches;}catch(e){return false;}}
function domFX(el,ms){try{fxLayer().appendChild(el);}catch(e){return;}setTimeout(()=>el.remove(),ms);}
function ring9(x,y,color,size=110,thin=false){
  if(!SET.fx||noMo())return;
  const d=document.createElement('div');d.className='fxring'+(thin?' thin':'');
  d.style.cssText=`left:${x}px;top:${y}px;--rc:${color};--rs:${size}px`;domFX(d,1000);
}
function glint9(x,y,color){
  if(!SET.fx||noMo())return;
  const d=document.createElement('div');d.className='fxglint';
  d.style.cssText=`left:${x}px;top:${y}px;--gc:${color}`;domFX(d,700);
}
function shards9(x,y,colors,n=14,power=1){
  if(!SET.fx||noMo())return;
  for(let i=0;i<n;i++){
    const a=rnd(TAU),r=(46+rnd(96))*power;
    const d=document.createElement('div');d.className='fxshard';
    d.style.cssText=`left:${x}px;top:${y}px;--sc:${colors[i%colors.length]};`
      +`--dx:${(Math.cos(a)*r)|0}px;--dy:${(Math.sin(a)*r-34*power)|0}px;`
      +`--rr:${(rnd(520)-260)|0}deg;--sd:${(0.65+rnd(.5)).toFixed(2)}s;--ss:${(0.7+rnd(.7)).toFixed(2)}`;
    domFX(d,1300);
  }
}
function vignette9(color,ms=520){
  if(!SET.fx||noMo())return;
  const d=document.createElement('div');d.className='fxvignette';
  d.style.setProperty('--vc',color);d.style.setProperty('--vd',ms+'ms');domFX(d,ms+80);
}

/* ================= 攻撃演出：12プロトコル個別レンダラー ================= */
/* 各レンダラー: (ctx,s,k,f) — s={x0,y0,x1,y1,dx,dy,dist,ang,dpr,cols,ac,P}, k=0..1 */
function seedParts(s,n,make){if(!s.P){s.P=[];for(let i=0;i<n;i++)s.P.push(make(i));}return s.P;}
function head(s,adv){return{x:lerp(s.x0,s.x1,adv),y:lerp(s.y0,s.y1,adv)};}
function glow(ctx,x0,y0,x1,y1,w,color,alpha){
  ctx.strokeStyle=color;ctx.globalAlpha=alpha;ctx.lineWidth=w;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();
}
function dotP(ctx,x,y,r,color,alpha){
  ctx.fillStyle=color;ctx.globalAlpha=alpha;ctx.beginPath();ctx.arc(x,y,Math.max(.4,r),0,TAU);ctx.fill();
}
function arcP(ctx,x,y,r,w,color,alpha,a0=0,a1=TAU){
  ctx.strokeStyle=color;ctx.globalAlpha=alpha;ctx.lineWidth=w;
  ctx.beginPath();ctx.arc(x,y,Math.max(.5,r),a0,a1);ctx.stroke();
}
const ATTACKS={
  FIRE(ctx,s,k,f){ /* 火炎槍：揺らめくコア＋火の粉＋着弾ファイア */
    const adv=Math.min(1,k*1.55),h=head(s,adv),d=s.dpr,flick=.75+.25*Math.sin(f*1.9);
    glow(ctx,s.x0,s.y0,h.x,h.y,11*d*flick,s.cols[0],.34*(1-k*.4));
    glow(ctx,s.x0,s.y0,h.x,h.y,5.5*d*flick,s.cols[3],.6*(1-k*.3));
    glow(ctx,s.x0,s.y0,h.x,h.y,2.2*d,'#fff',.85*(1-k*.3));
    const P=seedParts(s,26,i=>({t:rnd(),v:rnd(.4,1),a:rnd(TAU),sz:rnd(1.4,3.4)}));
    for(const p of P){const q=(p.t+k*p.v)%1;if(q>adv)continue;
      const px=lerp(s.x0,s.x1,q)+Math.sin(f*.3+p.a)*7*d,py=lerp(s.y0,s.y1,q)-((k*p.v*90)%46)*d*.5;
      dotP(ctx,px,py,p.sz*d,f%3?s.cols[3]:s.cols[4],.7*(1-q*.4));}
    if(k>.52){const u=(k-.52)/.48,r=easeOut(u)*46*d;
      arcP(ctx,s.x1,s.y1,r,7*d*(1-u),s.cols[3],.7*(1-u));
      for(let i=0;i<8;i++){const a=i/8*TAU+u*2;dotP(ctx,s.x1+Math.cos(a)*r*.8,s.y1+Math.sin(a)*r*.6,(3.4-u*2.4)*d,s.cols[4],.8*(1-u));}
      dotP(ctx,s.x1,s.y1,r*.4,'#fff',.5*(1-u));}
  },
  WATER(ctx,s,k,f){ /* 奔流：うねるリボン＋飛沫＋波紋 */
    const adv=Math.min(1,k*1.5),d=s.dpr;
    for(let rb=0;rb<4;rb++){
      ctx.strokeStyle=s.cols[rb%4];ctx.globalAlpha=.5*(1-k*.35);ctx.lineWidth=(4.4-rb)*d;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(s.x0,s.y0);
      const mx=(s.x0+s.x1)/2+Math.sin(f*.5+rb*2)*40*d,my=(s.y0+s.y1)/2+Math.cos(f*.44+rb*1.4)*30*d;
      ctx.quadraticCurveTo(mx,my,lerp(s.x0,s.x1,adv),lerp(s.y0,s.y1,adv));ctx.stroke();}
    const P=seedParts(s,18,()=>({t:rnd(),g:rnd(.5,1.6),a:rnd(TAU)}));
    for(const p of P){const q=(p.t+k*.8)%1;if(q>adv)continue;
      dotP(ctx,lerp(s.x0,s.x1,q)+Math.cos(p.a)*10*d,lerp(s.y0,s.y1,q)+q*q*p.g*38*d,1.7*d,s.cols[4],.65*(1-q*.5));}
    if(k>.55){const u=(k-.55)/.45;
      ctx.globalAlpha=.55*(1-u);ctx.strokeStyle=s.cols[3];ctx.lineWidth=2.2*d;
      for(let i=1;i<=3;i++){ctx.beginPath();ctx.ellipse(s.x1,s.y1,easeOut(u)*52*d*i/3,easeOut(u)*20*d*i/3,0,0,TAU);ctx.stroke();}
      for(let i=0;i<7;i++){const a=-TAU/4+(i-3)*.4,r=easeOut(u)*44*d;
        dotP(ctx,s.x1+Math.cos(a)*r,s.y1+Math.sin(a)*r+u*u*30*d,2.2*d*(1-u*.5),s.cols[4],.8*(1-u));}}
  },
  PLAGUE(ctx,s,k,f){ /* 疫病：毒塊の山なり弾道＋滴り＋瘴気リング＋胞子 */
    const d=s.dpr,peak=Math.min(Math.max(60*d,s.dist*.22),Math.max(40*d,Math.min(s.y0,s.y1)*.85));
    const P=seedParts(s,5,i=>({off:i*.09,sz:rnd(5,9)}));
    for(const p of P){
      const q=Math.min(1,Math.max(0,k*1.5-p.off));if(q<=0||q>=1)continue;
      const px=lerp(s.x0,s.x1,q),py=lerp(s.y0,s.y1,q)-Math.sin(q*Math.PI)*peak;
      const sq=1+Math.sin(f*.8+p.off*9)*.25;
      ctx.fillStyle=s.cols[1];ctx.globalAlpha=.75;
      ctx.beginPath();ctx.ellipse(px,py,p.sz*d*sq,p.sz*d/sq,q*4,0,TAU);ctx.fill();
      dotP(ctx,px-2*d,py-2*d,p.sz*d*.4,s.cols[4],.5);
      if(f%3===0)dotP(ctx,px,py+p.sz*d,1.8*d,s.cols[2],.5); /* 滴り */
    }
    if(k>.5){const u=(k-.5)/.5,r=easeOut(u)*54*d;
      ctx.fillStyle=s.cols[1];ctx.globalAlpha=.2*(1-u*.5);
      ctx.beginPath();for(let i=0;i<=14;i++){const a=i/14*TAU,rr=r*(1+Math.sin(a*3+f*.2)*.18);
        i?ctx.lineTo(s.x1+Math.cos(a)*rr,s.y1+Math.sin(a)*rr*.7):ctx.moveTo(s.x1+r,s.y1);}ctx.fill();
      arcP(ctx,s.x1,s.y1,r,2.4*d,s.cols[3],.5*(1-u));
      for(let i=0;i<9;i++){const a=i/9*TAU+u;dotP(ctx,s.x1+Math.cos(a)*r*.6,s.y1+Math.sin(a)*r*.42-u*26*d,2*d,s.cols[3],.7*(1-u));}}
  },
  DEATH(ctx,s,k,f){ /* 断命：暗転＋大鎌の三日月斬撃＋魂の燐光 */
    const d=s.dpr;
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='#000';ctx.globalAlpha=.22*Math.sin(Math.min(1,k*1.2)*Math.PI);
    ctx.fillRect(0,0,ctx.canvas.width,ctx.canvas.height);
    ctx.globalCompositeOperation='lighter';
    const u=Math.min(1,k*1.35),sw=easeOut(u);
    const a0=s.ang-1.9+sw*2.6;
    ctx.save();ctx.translate(s.x1,s.y1);ctx.rotate(a0);
    ctx.strokeStyle=s.cols[3];ctx.globalAlpha=.85*(1-u*.6);ctx.lineWidth=3.4*d;ctx.lineCap='round';
    ctx.beginPath();ctx.arc(0,0,44*d,-.9,1.1);ctx.stroke();
    ctx.strokeStyle='#fff';ctx.globalAlpha=.55*(1-u*.6);ctx.lineWidth=1.4*d;
    ctx.beginPath();ctx.arc(0,0,40*d,-.8,1);ctx.stroke();ctx.restore();
    const P=seedParts(s,9,()=>({t:rnd(),x:rnd(-30,30),v:rnd(.5,1.2),sz:rnd(1.6,3.2)}));
    for(const p of P){const q=(p.t+k*.7)%1;
      const px=lerp(s.x0,s.x1,q)+p.x*d,py=lerp(s.y0,s.y1,q)-q*44*p.v*d;
      dotP(ctx,px,py,p.sz*d,s.cols[2],.5*(1-q));
      dotP(ctx,px,py+5*d,p.sz*d*.5,s.cols[4],.3*(1-q));}
    if(k>.62){const w=(k-.62)/.38;
      glow(ctx,s.x1-34*d,s.y1-30*d,s.x1+34*d,s.y1+30*d,2.6*d*(1-w),'#fff',.8*(1-w));
      glow(ctx,s.x1+30*d,s.y1-34*d,s.x1-30*d,s.y1+34*d,2.6*d*(1-w),s.cols[3],.8*(1-w));}
  },
  LIFE(ctx,s,k,f){ /* 生命：伸びる蔓＋葉＋開花 */
    const adv=Math.min(1,k*1.4),d=s.dpr,nx=-(s.y1-s.y0)/s.dist,ny=(s.x1-s.x0)/s.dist;
    for(let v=0;v<2;v++){
      ctx.strokeStyle=v?s.cols[3]:s.cols[1];ctx.globalAlpha=.7*(1-k*.3);ctx.lineWidth=(2.8-v)*d;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(s.x0,s.y0);
      const seg=18;for(let i=1;i<=seg*adv;i++){const t=i/seg;
        const wob=Math.sin(t*9+v*2.4)*14*d*(1-t*.5);
        ctx.lineTo(lerp(s.x0,s.x1,t)+nx*wob,lerp(s.y0,s.y1,t)+ny*wob);}ctx.stroke();}
    const P=seedParts(s,10,i=>({t:.12+i*.08,a:rnd(TAU),sz:rnd(2.4,4.2)}));
    for(const p of P){if(p.t>adv)continue;const px=lerp(s.x0,s.x1,p.t),py=lerp(s.y0,s.y1,p.t);
      ctx.save();ctx.translate(px,py);ctx.rotate(p.a+k*1.5);ctx.fillStyle=s.cols[2];ctx.globalAlpha=.7;
      ctx.beginPath();ctx.ellipse(p.sz*d,0,p.sz*d,p.sz*d*.45,0,0,TAU);ctx.fill();ctx.restore();}
    if(k>.55){const u=(k-.55)/.45,r=easeOut(u)*40*d;
      for(let i=0;i<6;i++){const a=i/6*TAU+u*.8;
        ctx.strokeStyle=s.cols[3];ctx.globalAlpha=.7*(1-u);ctx.lineWidth=3*d;ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(s.x1+Math.cos(a)*r*.25,s.y1+Math.sin(a)*r*.25);
        ctx.quadraticCurveTo(s.x1+Math.cos(a+.35)*r*.7,s.y1+Math.sin(a+.35)*r*.7,s.x1+Math.cos(a)*r,s.y1+Math.sin(a)*r);ctx.stroke();}
      dotP(ctx,s.x1,s.y1,r*.24,'#fff',.6*(1-u));}
  },
  LIGHT(ctx,s,k,f){ /* 内光：天からの裁きの光柱＋十字フレア */
    const d=s.dpr,u=Math.min(1,k*1.45),w=easeOut(u)*26*d;
    dotP(ctx,s.x0,s.y0,10*d*(1-u),s.cols[4],.5*(1-u));
    const grad=ctx.createLinearGradient(s.x1,0,s.x1,s.y1);
    grad.addColorStop(0,'rgba(255,255,255,0)');grad.addColorStop(.7,s.cols[3]);grad.addColorStop(1,'#ffffff');
    ctx.fillStyle=grad;ctx.globalAlpha=.5*Math.sin(Math.min(1,k*1.2)*Math.PI);
    ctx.fillRect(s.x1-w/2,0,w,s.y1);
    ctx.fillStyle='#fff';ctx.globalAlpha=.8*Math.sin(Math.min(1,k*1.2)*Math.PI);
    ctx.fillRect(s.x1-w*.14,0,w*.28,s.y1);
    for(let i=0;i<10;i++){const a=i/10*TAU+f*.05;
      glow(ctx,s.x1,s.y1,s.x1+Math.cos(a)*easeOut(u)*46*d,s.y1+Math.sin(a)*easeOut(u)*30*d,1.2*d,s.cols[3],.4*(1-u*.6));}
    if(k>.45){const q=(k-.45)/.55,r=easeOut(q)*54*d;
      glow(ctx,s.x1-r,s.y1,s.x1+r,s.y1,2*d*(1-q),'#fff',.85*(1-q));
      glow(ctx,s.x1,s.y1-r,s.x1,s.y1+r,2*d*(1-q),'#fff',.85*(1-q));
      arcP(ctx,s.x1,s.y1,r*.5,1.6*d,s.cols[4],.6*(1-q));}
  },
  DARKNESS(ctx,s,k,f){ /* 暗黒：這い寄る触手＋吸引崩壊 */
    const d=s.dpr,adv=Math.min(1,k*1.4);
    ctx.globalCompositeOperation='source-over';
    for(let tn=0;tn<4;tn++){
      const seg=16,ph=tn*1.7;
      for(const[wd,col,al]of[[6.5*d,'#05030c',.85],[2.4*d,s.cols[3],.65]]){
        ctx.strokeStyle=col;ctx.globalAlpha=al*(1-k*.3);ctx.lineWidth=wd;ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(s.x0,s.y0);
        for(let i=1;i<=seg*adv;i++){const t=i/seg;
          const nx=-(s.y1-s.y0)/s.dist,ny=(s.x1-s.x0)/s.dist;
          const wob=Math.sin(t*7+f*.25+ph)*20*d*(1-t*.6);
          ctx.lineTo(lerp(s.x0,s.x1,t)+nx*wob,lerp(s.y0,s.y1,t)+ny*wob);}
        ctx.stroke();}}
    const rg=ctx.createRadialGradient(s.x1,s.y1,0,s.x1,s.y1,60*d);
    rg.addColorStop(0,'rgba(2,1,8,.85)');rg.addColorStop(1,'rgba(2,1,8,0)');
    ctx.fillStyle=rg;ctx.globalAlpha=Math.sin(Math.min(1,k*1.2)*Math.PI);
    ctx.beginPath();ctx.arc(s.x1,s.y1,60*d,0,TAU);ctx.fill();
    ctx.globalCompositeOperation='lighter';
    const P=seedParts(s,16,()=>({a:rnd(TAU),r:rnd(30,64),v:rnd(.7,1.3)}));
    for(const p of P){const q=Math.min(1,k*1.3*p.v),r=p.r*d*(1-q);
      dotP(ctx,s.x1+Math.cos(p.a+q*2)*r,s.y1+Math.sin(p.a+q*2)*r*.7,1.8*d,s.cols[2],.6*q);}
    if(k>.72){const u=(k-.72)/.28;arcP(ctx,s.x1,s.y1,easeOut(u)*48*d,1.6*d*(1-u),'#fff',.8*(1-u));}
  },
  GRAVITY(ctx,s,k,f){ /* 重力：歪曲リング＋螺旋吸引＋崩壊衝撃 */
    const d=s.dpr;
    ctx.strokeStyle=s.cols[1];ctx.globalAlpha=.4*(1-k*.4);ctx.lineWidth=1.8*d;
    ctx.beginPath();ctx.moveTo(s.x0,s.y0);
    ctx.quadraticCurveTo((s.x0+s.x1)/2,(s.y0+s.y1)/2+40*d,s.x1,s.y1);ctx.stroke();
    for(let i=0;i<3;i++){
      ctx.strokeStyle=s.cols[i+1];ctx.globalAlpha=.5*(1-k*.3);ctx.lineWidth=1.6*d;
      ctx.beginPath();ctx.ellipse(s.x1,s.y1,(46-i*10)*d*(1-k*.4),(20-i*4)*d*(1-k*.4),f*.06+i*.9,0,TAU);ctx.stroke();}
    const P=seedParts(s,22,()=>({a:rnd(TAU),r:rnd(26,70),v:rnd(.8,1.4),sz:rnd(1.2,2.6)}));
    for(const p of P){const q=Math.min(1,k*1.25*p.v),r=p.r*d*(1-q),a=p.a+q*5;
      dotP(ctx,s.x1+Math.cos(a)*r,s.y1+Math.sin(a)*r*.66,p.sz*d,s.cols[3],.7*q);}
    if(k>.68){const u=(k-.68)/.32;
      dotP(ctx,s.x1,s.y1,easeOut(u)*10*d,'#fff',.7*(1-u));
      ctx.strokeStyle=s.cols[4];ctx.globalAlpha=.7*(1-u);ctx.lineWidth=2.2*d*(1-u);
      ctx.beginPath();ctx.ellipse(s.x1,s.y1,easeOut(u)*58*d,easeOut(u)*24*d,0,0,TAU);ctx.stroke();}
  },
  METAL(ctx,s,k,f){ /* 鋼鉄：レールガン弾3連＋火花＋破片 */
    const d=s.dpr;
    for(let sl=0;sl<3;sl++){
      const q=Math.min(1,Math.max(0,(k-sl*.11)*2.1));if(q<=0||q>=1)continue;
      const hx=lerp(s.x0,s.x1,q),hy=lerp(s.y0,s.y1,q);
      const tx=lerp(s.x0,s.x1,Math.max(0,q-.16)),ty=lerp(s.y0,s.y1,Math.max(0,q-.16));
      glow(ctx,tx,ty,hx,hy,3.2*d,s.cols[3],.85);
      glow(ctx,tx,ty,hx,hy,1.2*d,'#fff',.95);
      if(f%2===0)dotP(ctx,hx+rnd(-6,6)*d,hy+rnd(-6,6)*d,1.4*d,s.cols[4],.8);
      if(q<.2)dotP(ctx,s.x0,s.y0,(8-q*30)*d,'#fff',.6);}
    if(k>.42){const u=Math.min(1,(k-.42)/.5);
      for(let i=0;i<10;i++){const a=s.ang+Math.PI+rnd(-1,1)*(i/10)*1.4,r=easeOut(u)*(20+i*4)*d;
        glow(ctx,s.x1,s.y1,s.x1+Math.cos(a)*r,s.y1+Math.sin(a)*r,1.5*d*(1-u),i%2?'#fff':s.cols[4],.8*(1-u));}
      const P=seedParts(s,8,()=>({a:rnd(TAU),v:rnd(.5,1),rot:rnd(TAU)}));
      for(const p of P){const r=easeOut(u)*52*d*p.v;
        ctx.save();ctx.translate(s.x1+Math.cos(p.a)*r,s.y1+Math.sin(p.a)*r*.7+u*u*20*d);ctx.rotate(p.rot+u*4);
        ctx.fillStyle=s.cols[2];ctx.globalAlpha=.75*(1-u);
        ctx.fillRect(-2.6*d,-1.4*d,5.2*d,2.8*d);ctx.restore();}}
  },
  SPEED(ctx,s,k,f){ /* 迅速：残像ダッシュ斬り＋スピードライン */
    const d=s.dpr;
    const P=seedParts(s,4,i=>({off:i*.14,ang:s.ang+rnd(-.7,.7),len:rnd(50,80)}));
    P.forEach((p,i)=>{
      const q=Math.min(1,Math.max(0,(k-p.off)*2.4));if(q<=0)return;
      const sw=easeOut(q),cx=s.x1-Math.cos(p.ang)*p.len*d*(1-sw)*2,cy=s.y1-Math.sin(p.ang)*p.len*d*(1-sw)*2;
      for(let e=0;e<3;e++){const off=e*10*d;
        glow(ctx,cx-Math.cos(p.ang)*p.len*d-off,cy-Math.sin(p.ang)*p.len*d,cx+Math.cos(p.ang)*p.len*d-off,cy+Math.sin(p.ang)*p.len*d,
          (2.6-e*.8)*d,e?s.cols[2]:'#fff',(e?.3:.8)*(1-q*.5));}
      if(q>.9&&q<1)dotP(ctx,s.x1,s.y1,8*d,'#fff',.7);});
    for(let i=0;i<8;i++){const t=((f*.09)+i/8)%1,q=Math.min(1,k*1.6);if(t>q)continue;
      glow(ctx,lerp(s.x0,s.x1,Math.max(0,t-.07)),lerp(s.y0,s.y1,Math.max(0,t-.07)),
        lerp(s.x0,s.x1,t),lerp(s.y0,s.y1,t),1.2*d,s.cols[3],.5*(1-k*.4));}
    if(k>.6){const u=(k-.6)/.4;
      for(let i=0;i<6;i++){const a=i/6*TAU+.3;
        glow(ctx,s.x1+Math.cos(a)*10*d,s.y1+Math.sin(a)*7*d,s.x1+Math.cos(a)*easeOut(u)*50*d,s.y1+Math.sin(a)*easeOut(u)*34*d,1.3*d*(1-u),s.cols[4],.6*(1-u));}}
  },
  SPIRIT(ctx,s,k,f){ /* 精霊：光の魂が弧を描いて収束＋柔らかな燐光 */
    const d=s.dpr,adv=Math.min(1,k*1.35);
    const P=seedParts(s,5,i=>({off:i*.07,amp:rnd(22,46),ph:rnd(TAU),sz:rnd(2.6,4.6)}));
    const nx=-(s.y1-s.y0)/s.dist,ny=(s.x1-s.x0)/s.dist;
    for(const p of P){
      const q=Math.min(1,Math.max(0,adv-p.off));if(q<=0)continue;
      for(let tr=0;tr<5;tr++){

const lastPlay={};

function sfx(name,opt){

  const now=performance.now();

function bgmMode(){

function padTone(f,d,when,i,opt={}){
  const t0=AC.currentTime+when,wave=opt.wave||'sawtooth',cutLo=opt.cutLo??520,cutHi=opt.cutHi??920,g=opt.g??.042,q=opt.q??.7,dets=opt.det||[-5,4];
  for(const det of dets){
    const o=AC.createOscillator();o.type=wave;o.frequency.value=f;o.detune.value=det+i*1.3;
    const fl=AC.createBiquadFilter();fl.type='lowpass';fl.Q.value=q;
    fl.frequency.setValueAtTime(cutLo,t0);
    fl.frequency.linearRampToValueAtTime(cutHi,t0+d*.5);
    fl.frequency.linearRampToValueAtTime(cutLo*.88,t0+d);
    const v=AC.createGain();v.gain.setValueAtTime(.0001,t0);
    v.gain.linearRampToValueAtTime(g,t0+d*.3);v.gain.linearRampToValueAtTime(.0001,t0+d);
    o.connect(fl);fl.connect(v);v.connect(bgmBus);o.start(t0);o.stop(t0+d+.1);
  }
}
/* 疾走感のあるサウ・ベース（フィルターエンベロープ付き） */
function sawBass(f,d,when,g=1){
  const t0=AC.currentTime+when;
  const o=AC.createOscillator();o.type='sawtooth';o.frequency.value=f;
  const o2=AC.createOscillator();o2.type='square';o2.frequency.value=f;o2.detune.value=-8;
  const fl=AC.createBiquadFilter();fl.type='lowpass';fl.Q.value=6;
  fl.frequency.setValueAtTime(190,t0);fl.frequency.exponentialRampToValueAtTime(1500,t0+.04);fl.frequency.exponentialRampToValueAtTime(230,t0+d);
  const v=AC.createGain();v.gain.setValueAtTime(.0001,t0);v.gain.exponentialRampToValueAtTime(.125*g,t0+.012);v.gain.exponentialRampToValueAtTime(.0002,t0+d);
  o.connect(fl);o2.connect(fl);fl.connect(v);v.connect(bgmBus);
  o.start(t0);o.stop(t0+d+.05);o2.start(t0);o2.stop(t0+d+.05);
}
/* スネア（バックビート用） */

  s.connect(hp);hp.connect(v);v.connect(bgmBus);s.start(t0);s.stop(t0+.2);
  const o=AC.createOscillator();o.type='triangle';o.frequency.setValueAtTime(220,t0);o.frequency.exponentialRampToValueAtTime(150,t0+.1);
  const ov=AC.createGain();ov.gain.setValueAtTime(.0001,t0);ov.gain.exponentialRampToValueAtTime(.06*g,t0+.004);ov.gain.exponentialRampToValueAtTime(.0002,t0+.12);
  o.connect(ov);ov.connect(bgmBus);o.start(t0);o.stop(t0+.15);

/* 明るいシンセ・リード（アルペジオ/主旋律用） */

  const v=AC.createGain();v.gain.setValueAtTime(.0001,t0);v.gain.exponentialRampToValueAtTime(.055*g,t0+.01);v.gain.exponentialRampToValueAtTime(.0002,t0+dur);

function hat(when,d,g){

  const fl=AC.createBiquadFilter();fl.type='highpass';fl.frequency.value=7800;

  v.gain.exponentialRampToValueAtTime(.045*g,t0+.004);v.gain.exponentialRampToValueAtTime(.0002,t0+d);

function kick(when){

  v.gain.exponentialRampToValueAtTime(.2,t0+.006);v.gain.exponentialRampToValueAtTime(.0002,t0+.22);

function scheduleStep(step,t,spb,tr){
  const when=Math.max(0,t-AC.currentTime),bars=tr.prog.length,bar=(step>>4)%bars,pos=step&15,ch=tr.prog[bar];
  if(pos===0)BGM.mode=bgmMode();
  const intense=BGM.mode==='battle';
  try{tr.step(pos,bar,ch,when,spb,intense);}catch(e){}
}
function bgmScheduler(){
  if(!AC)return;
  if(bgmGainVal()<=0){clearInterval(BGM.timer);BGM.timer=0;return;}
  if(AC.state!=='running'){BGM.next=AC.currentTime+.1;return;}
  const tr=currentTrack(),spb=60/tr.bpm/4,loop=tr.prog.length*16;BGM.bpm=tr.bpm;
  if(BGM.next<AC.currentTime-1)BGM.next=AC.currentTime+.05;/* サスペンド復帰時の追い付き防止 */
  while(BGM.next<AC.currentTime+1.2){
    scheduleStep(BGM.step,BGM.next,spb,tr);
    BGM.next+=spb;BGM.step=(BGM.step+1)%loop;
  }
}
function startBGM(){
  if(!AC||BGM.timer||bgmGainVal()<=0)return;
  BGM.next=AC.currentTime+.1;BGM.step=0;
  BGM.timer=setInterval(bgmScheduler,250);
}

const _sho8=showHandoff;
showHandoff=function(...a){sfx('turn');return _sho8(...a);};
document.addEventListener('pointerdown',e=>{
  if(e.target&&e.target.closest&&e.target.closest('button'))sfx('ui');
},{capture:true,passive:true});

/* ---------- 設定画面（音量スライダー追加のため再定義） ---------- */
openSettings=async function(){
  const body=`<div style="display:flex;flex-direction:column;gap:14px;padding:4px 2px">
    <div class="setrow"><label>演出速度</label><div class="segbtns" id="fxSeg"></div></div>
    <div class="setrow"><label>能力表示時間</label><input type="range" id="setAnn" min="2" max="15" step="0.5" value="${SET.annSec}"><b id="setAnnVal">${SET.annSec}秒</b></div>
    <div class="setrow"><label>カード表示サイズ</label><input type="range" id="setScale" min="55" max="170" step="5" value="${SET.scale}"><b id="setScaleVal">${SET.scale}%</b></div>
    <div class="setrow"><label>BGM音量</label><input type="range" id="setBgm" min="0" max="100" step="5" value="${SET.bgmVol}"><b id="setBgmVal">${SET.bgmVol}%</b></div>
    <div class="setrow"><label>BGM曲</label><select id="setBgmTrack" class="setsel">${TRACKS.map(t=>`<option value="${t.id}" ${t.id===SET.bgmTrack?'selected':''}>${esc(t.label)} — ${esc(t.sub)}</option>`).join('')}</select></div>
    <div class="setrow"><label>効果音量</label><input type="range" id="setSfx" min="0" max="100" step="5" value="${SET.sfxVol}"><b id="setSfxVal">${SET.sfxVol}%</b></div>
    <div class="setrow"><label>画面シェイク</label><div class="segbtns" id="shakeSeg"></div></div>
    <div class="sub" style="padding:0">能力表示（カットイン）はタップでいつでも早送りできます。演出速度「オフ」はカットインごと省略します。BGM・効果音はすべて端末内で合成しています。</div></div>`;
  const p=showModal({title:'設定',sub:'変更は即座に保存されます。',body,buttons:[{label:'閉じる',value:true,className:'primary'}]});
  const speeds=[['演出オフ',0],['はやい',.6],['ふつう',1],['ゆっくり',1.6]];
  const seg=$('#fxSeg');
  const build1=()=>{seg.innerHTML='';speeds.forEach(([lb,v])=>{const b=document.createElement('button');b.textContent=lb;b.className='choice'+(SET.fx===v?' on':'');b.onclick=()=>{SET.fx=v;saveSettings();build1();};seg.appendChild(b);});};
  build1();
  const sh=$('#shakeSeg');
  const build2=()=>{sh.innerHTML='';[['オン',true],['オフ',false]].forEach(([lb,v])=>{const b=document.createElement('button');b.textContent=lb;b.className='choice'+(SET.shake===v?' on':'');b.onclick=()=>{SET.shake=v;saveSettings();build2();};sh.appendChild(b);});};
  build2();
  $('#setAnn').oninput=e=>{SET.annSec=+e.target.value;$('#setAnnVal').textContent=SET.annSec+'秒';saveSettings();};
  $('#setScale').oninput=e=>{SET.scale=+e.target.value;$('#setScaleVal').textContent=SET.scale+'%';saveSettings();};
  $('#setBgm').oninput=e=>{SET.bgmVol=+e.target.value;$('#setBgmVal').textContent=SET.bgmVol+'%';saveSettings();applyVolumes();};
  $('#setBgmTrack').onchange=e=>{setTrack(e.target.value);if(SET.bgmVol<=0){SET.bgmVol=45;$('#setBgm').value=45;$('#setBgmVal').textContent='45%';saveSettings();applyVolumes();}};
  $('#setSfx').oninput=e=>{SET.sfxVol=+e.target.value;$('#setSfxVal').textContent=SET.sfxVol+'%';saveSettings();applyVolumes();sfx('flip');};
  await p;
};

globalThis.COMPILE_AUDIO=Object.freeze({
  sfx,duck,applyVolumes,setTrack,
  previewCompile:(protocol='SPIRIT',opt={})=>{unlockAudio();sfx('compile',{base:CUTIN_BASE[protocol]||293.66,...opt});},
  tracks:()=>TRACKS.map(t=>({id:t.id,label:t.label,sub:t.sub,bpm:t.bpm})),
  state:()=>({ctx:AC?AC.state:'none',bgm:!!BGM.timer,mode:BGM.mode,track:SET.bgmTrack,sfxVol:SET.sfxVol,bgmVol:SET.bgmVol})
});
})();
