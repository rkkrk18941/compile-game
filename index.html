<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0e0e11">
<title>COMPILE — Pro Edition</title>
<style>

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{ --gold:#c9a2ff; }
  html,body{height:100%;}
  body{
    background:#0e0e11;
    background-image:
      radial-gradient(ellipse at 50% 0%, #1a1a20 0%, #0e0e11 60%),
      repeating-linear-gradient(45deg, rgba(255,255,255,.01) 0 2px, transparent 2px 4px);
    color:#cfcfd6; font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",system-ui,sans-serif;
    height:100dvh; display:flex; flex-direction:column; overflow:hidden; user-select:none; -webkit-user-select:none;
  }

  .pile{ display:flex; flex-direction:column; align-items:center; gap:2px; }
  .pile .p{ width:34px; height:46px; border-radius:4px; display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:900; color:#e8e2ff; }
  .pile .lbl{ font-size:8px; letter-spacing:.15em; color:#7a7a88; }
  .p.deck{ background:radial-gradient(60% 50% at 50% 45%, #1b1440, #0b0818);
    border:1px solid rgba(180,160,255,.4); box-shadow:2px 2px 0 #0b0818, 3px 3px 0 rgba(180,160,255,.25); }
  .p.trash{ background:#14141a; border:1px dashed rgba(255,255,255,.25); color:#8f8fa0; }

  .bar{ display:flex; align-items:center; gap:12px; padding:4px 12px; flex:0 0 auto; }
  .bar.opp{ justify-content:space-between; }
  .opphand{ display:flex; }
  .opphand .b{ width:26px; height:38px; border-radius:3px; margin-left:-14px;
    background:radial-gradient(60% 50% at 50% 45%, #1b1440, #0b0818);
    border:1px solid rgba(180,160,255,.35); transform:rotate(var(--r)); }
  .opphand .b:first-child{ margin-left:0; }
  .oppname{ font-size:10px; letter-spacing:.2em; color:#8f8fa0; }

  .field{ flex:1; display:grid; grid-template-rows:1fr auto auto auto 1fr; padding:2px 8px; min-height:0; }
  .stackrow{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; min-height:0; }
  .protorow{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:3px 0; }

  .proto{ height:42px; border-radius:6px; position:relative; cursor:pointer; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    background:linear-gradient(150deg, var(--a), var(--b));
    border:1px solid rgba(255,255,255,.4); box-shadow:0 4px 12px -6px rgba(0,0,0,.8); }
  .proto .nm{ font-family:"Arial Black",sans-serif; font-size:10.5px; font-weight:900; color:#fff;
    letter-spacing:.1em; text-shadow:0 0 6px rgba(0,0,0,.6); }
  .proto .bar2{ width:56%; height:5px; border:1px solid rgba(255,255,255,.55); display:flex; gap:1px; padding:1px;}
  .proto .bar2 i{ flex:1; background:rgba(255,255,255,.85); animation:load 1.4s infinite alternate;}
  .proto .bar2 i:nth-child(2){animation-delay:.25s} .proto .bar2 i:nth-child(3){animation-delay:.5s; background:rgba(255,255,255,.3);}
  @keyframes load{ from{opacity:.25} to{opacity:1} }
  .proto .stamp{ font-family:monospace; font-size:7px; letter-spacing:.28em; color:#fff;
    border:1px solid rgba(255,255,255,.85); padding:0 7px; background:rgba(255,255,255,.14); }
  .proto.done{ box-shadow:0 0 16px var(--b), inset 0 0 14px rgba(255,255,255,.28); }
  .proto .corner{ position:absolute; inset:3px; border:1px solid rgba(255,255,255,.22); pointer-events:none;}

  .stack{ position:relative; display:flex; flex-direction:column; min-height:0;
    justify-content:flex-start; overflow:hidden; border-radius:6px; padding:2px; cursor:pointer; }
  .stack.mine{ justify-content:flex-end; }
  .stack:active{ background:rgba(255,255,255,.03); }
  .total{ position:absolute; z-index:5; right:4px; font-family:monospace; font-size:11px; font-weight:700;
    color:#fff; background:rgba(10,8,20,.8); border:1px solid rgba(255,255,255,.4); padding:1px 6px; border-radius:3px; }
  .stack.opp .total{ top:4px; } .stack.mine .total{ bottom:4px; }
  .total.win{ border-color:var(--gold); color:var(--gold); box-shadow:0 0 8px rgba(201,162,255,.4); }

  .tag{ flex:0 0 auto; font-family:monospace; font-size:7px; font-weight:700; letter-spacing:.05em;
    border:1px solid rgba(255,255,255,.55); padding:0 3px; border-radius:2px; color:#fff; background:rgba(0,0,0,.25);}
  .tag.val{ font-size:8.5px; border-color:#fff; background:rgba(255,255,255,.14); }

  .strip{ height:19px; border-radius:3px 3px 0 0; margin-bottom:-2px; position:relative; z-index:1;
    background:linear-gradient(150deg, var(--a), var(--b));
    border:1px solid rgba(255,255,255,.35); border-bottom:none;
    display:flex; align-items:center; gap:4px; padding:0 5px;
    font-size:7.5px; font-weight:700; color:rgba(255,255,255,.92); white-space:nowrap; overflow:hidden; }
  .strip .txt{ overflow:hidden; text-overflow:ellipsis; }
  .strip.fd{ background:repeating-linear-gradient(135deg,#171034 0 6px,#0f0a22 6px 12px);
    border-color:rgba(180,160,255,.4); color:rgba(200,190,255,.75); font-family:monospace; letter-spacing:.1em; }

  .minicard{ position:relative; z-index:2; border-radius:4px;
    background:linear-gradient(160deg, var(--a), var(--b) 80%);
    border:1px solid rgba(255,255,255,.5); padding:4px 5px;
    box-shadow:0 6px 14px -6px rgba(0,0,0,.9); }
  .minicard .head{ display:flex; align-items:center; gap:4px; margin-bottom:2px;}
  .minicard .nm{ font-family:"Arial Black",sans-serif; font-size:9px; font-weight:900; color:#fff;}
  .minicard .vv{ margin-left:auto; font-family:monospace; font-size:12px; font-weight:900; color:#fff;
    border:1px solid rgba(255,255,255,.7); padding:0 5px; background:rgba(255,255,255,.12);}
  .minicard .row{ display:flex; align-items:center; gap:3px; font-size:7px; line-height:1.35;
    color:rgba(255,255,255,.92); margin-top:1.5px; }
  .minicard .row .t{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .minicard .row.none{ opacity:.35; }
  .minicard.fd{ background:radial-gradient(70% 60% at 50% 45%, #1b1440, #0b0818);
    border-color:rgba(180,160,255,.5); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:2px; min-height:46px;}
  .minicard.fd .fdv{ font-family:monospace; font-size:14px; font-weight:900; color:#cfc2ff;
    border:1px solid rgba(180,160,255,.6); padding:0 6px; background:rgba(20,12,50,.7);}
  .minicard.fd small{ font-size:7px; letter-spacing:.3em; color:rgba(200,190,255,.5); font-family:monospace;}
  .empty-slot{ flex:0 0 40px; border:1px dashed rgba(255,255,255,.15); border-radius:4px;
    display:flex; align-items:center; justify-content:center; font-size:8px; color:#4a4a55; letter-spacing:.2em; }

  .ctrlrow{ display:flex; justify-content:center; align-items:center; height:40px; position:relative; }
  .ctrl{ width:88px; height:30px; cursor:pointer;
    clip-path:polygon(10px 0,calc(100% - 10px) 0,100% 50%,calc(100% - 10px) 100%,10px 100%,0 50%);
    background:linear-gradient(120deg,#2a2440,#3d3560,#2a2440);
    border:1px solid rgba(201,162,255,.6);
    display:flex; align-items:center; justify-content:center;
    font-family:monospace; font-size:8.5px; letter-spacing:.24em; color:#d8ccff;
    box-shadow:0 0 12px rgba(160,130,255,.35);
    transition:transform .4s cubic-bezier(.3,.9,.3,1); }
  .ctrl.opp{ transform:translateY(-34px); box-shadow:0 0 14px rgba(255,110,110,.5); border-color:#ff9a9a;}
  .ctrl.mine{ transform:translateY(34px); box-shadow:0 0 14px rgba(120,255,180,.5); border-color:#8af0b0;}
  .ctrl-lbl{ position:absolute; right:12px; font-size:8px; color:#6a6a78; letter-spacing:.15em; }

  .phase{ display:flex; gap:3px; flex:1; justify-content:center; flex-wrap:wrap;}
  .phase span{ font-size:8px; letter-spacing:.08em; padding:3px 6px; color:#5f5f6c;
    border:1px solid #2c2c34; clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%); }
  .phase span.now{ color:#0e0e11; background:var(--gold); border-color:var(--gold); font-weight:900;}
  .actions{ display:flex; gap:6px; flex-wrap:wrap; justify-content:center;}
  .actions button{ font-family:inherit; font-size:10px; letter-spacing:.08em; font-weight:700;
    padding:6px 11px; color:#e8e2ff; background:rgba(255,255,255,.06);
    border:1px solid rgba(201,162,255,.5); cursor:pointer;
    clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px); }
  .actions button.view{ border-color:rgba(120,220,255,.55); }
  .actions button:active{ background:rgba(201,162,255,.25); }

  .hand{ flex:0 0 auto; display:flex; justify-content:center; align-items:flex-end;
    padding:4px 8px calc(10px + env(safe-area-inset-bottom)); height:112px; }
  .hcard{ width:68px; height:94px; border-radius:6px; margin:0 -10px; position:relative;
    background:linear-gradient(160deg, var(--a), var(--b) 80%);
    border:1px solid rgba(255,255,255,.55); padding:5px 5px 4px;
    transform:rotate(var(--r)) translateY(var(--y));
    box-shadow:0 8px 18px -8px rgba(0,0,0,.9); transition:transform .18s; cursor:pointer; }
  .hcard:active{ transform:rotate(0) translateY(-18px) scale(1.08); z-index:9; }
  .hcard .head{ display:flex; align-items:center; }
  .hcard .nm{ font-family:"Arial Black",sans-serif; font-size:7.5px; color:#fff; font-weight:900;}
  .hcard .vv{ margin-left:auto; font-family:monospace; font-size:12px; font-weight:900;
    color:#fff; border:1px solid rgba(255,255,255,.7); padding:0 4px; background:rgba(0,0,0,.3);}
  .hcard .row{ display:flex; gap:2px; font-size:6.4px; line-height:1.3; color:rgba(255,255,255,.92); margin-top:2.5px;}
  .hcard .row .t{ display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
  .hcard .row.none{ opacity:.35; }
  .hcard .tag{ font-size:6px; padding:0 2px; }

  /* ==== オーバーレイ ==== */
  .overlay{ position:fixed; inset:0; background:rgba(8,8,12,.94); z-index:50;
    display:none; flex-direction:column; padding:16px 10px calc(14px + env(safe-area-inset-bottom)); }
  .overlay.show{ display:flex; }
  .overlay h3{ font-size:11px; letter-spacing:.3em; color:#9a9aa8; margin:0 6px 8px; font-weight:600;}
  .overlay .list{ flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; align-items:center; width:100%;}
  .sechead{ width:100%; font-size:10px; letter-spacing:.2em; color:#9a9aa8;
    border-bottom:1px solid #26262e; padding:6px 6px 4px; display:flex; gap:8px; align-items:baseline;}
  .sechead b{ color:#e8e2ff; font-weight:700; }
  .sechead .tt{ margin-left:auto; font-family:monospace; color:var(--gold); }
  .ovgrid{ display:flex; flex-wrap:wrap; gap:10px 8px; justify-content:center; width:100%; }
  .ovmini{ display:flex; flex-direction:column; align-items:center; gap:3px; }
  .ovmini .st{ font-size:8px; font-family:monospace; letter-spacing:.06em; color:#cfc2ff;
    border:1px dashed rgba(180,160,255,.4); padding:1px 7px; background:rgba(20,12,50,.5); max-width:44vw; text-align:center;}
  .ovmini .st.warn{ color:#ffcf9a; border-color:rgba(255,190,120,.4); }
  .ovitem{ display:flex; flex-direction:column; align-items:center; gap:6px; flex:0 0 auto;}
  .ovitem .st{ font-size:9.5px; font-family:monospace; letter-spacing:.1em; color:#cfc2ff;
    border:1px dashed rgba(180,160,255,.45); padding:3px 10px; background:rgba(20,12,50,.5);}
  .ovitem .st.warn{ color:#ffcf9a; border-color:rgba(255,190,120,.45);}
  .overlay .close{ margin-top:8px; align-self:center; font-family:inherit; font-size:11px; letter-spacing:.2em;
    padding:8px 26px; color:#e8e2ff; background:rgba(255,255,255,.06); border:1px solid rgba(201,162,255,.5); cursor:pointer;}
  .note{ font-size:9px; color:#6a6a78; text-align:center; letter-spacing:.06em; padding-bottom:2px;}

  /* --- 正式カード(基準幅250px、scaleで可変) --- */
  .scale{ position:relative; width:var(--w); height:calc(var(--w)*1.4); flex:0 0 auto; }
  .fc{ position:absolute; top:0; left:0; width:250px; height:350px; border-radius:14px; overflow:hidden;
    transform:scale(var(--sc,1)); transform-origin:top left;
    background:#0c0817; box-shadow:0 10px 26px -10px rgba(0,0,0,.9), 0 0 0 1px rgba(255,255,255,.08); }
  .fc .art{ position:absolute; inset:-8%;
    background:
      radial-gradient(120% 90% at 82% 12%, var(--c4) 0%, transparent 42%),
      radial-gradient(100% 80% at 12% 30%, var(--c3) 0%, transparent 50%),
      radial-gradient(130% 110% at 40% 95%, var(--c2) 0%, transparent 55%),
      linear-gradient(160deg, var(--c1) 0%, #08060f 100%);
    filter:url(#marble) saturate(1.15); }
  .fc .sheen{ position:absolute; inset:0; z-index:3; pointer-events:none;
    background:linear-gradient(115deg,
      rgba(255,0,128,0) 20%, rgba(255,60,60,.5) 34%, rgba(255,220,80,.5) 42%,
      rgba(60,255,140,.5) 50%, rgba(60,180,255,.5) 58%, rgba(180,80,255,.5) 66%,
      rgba(255,0,128,0) 80%);
    background-size:280% 280%; background-position:35% 30%;
    mix-blend-mode:color-dodge; opacity:.3; }
  .fc .frame{ position:absolute; inset:0; z-index:2; padding:15px 15px 16px; display:flex; flex-direction:column; color:#f2ecff;}
  .fc .toprow{ display:flex; align-items:flex-start; gap:8px; margin-bottom:5px; height:50px;}
  .fc .title{ background:rgba(8,6,16,.82); border:1px solid rgba(255,255,255,.35);
    padding:4px 10px 3px 7px; align-self:flex-start; margin-top:7px;
    clip-path:polygon(0 0,100% 0,calc(100% - 8px) 100%,0 100%); min-width:84px;}
  .fc .title h2{ font-family:"Arial Black",sans-serif; font-size:15px; letter-spacing:.05em;
    font-weight:900; color:#fff; text-shadow:0 0 6px rgba(255,255,255,.35);}
  .fc .title small{ display:block; font-size:5px; letter-spacing:.28em; color:rgba(255,255,255,.55); margin-top:1px; font-family:monospace;}
  .fc .valuebox{ margin:0 auto; border:1px solid rgba(255,255,255,.5); background:rgba(255,255,255,.06);
    width:50px; height:100%; display:flex; align-items:center; justify-content:center;}
  .fc .valuebox .v{ font-family:"Arial Black",sans-serif; font-size:29px; font-weight:900; color:#fff;
    text-shadow:0 1px 8px rgba(255,255,255,.5);}
  .fc .hexicon{ width:36px; margin-top:6px; filter:drop-shadow(0 0 4px rgba(255,255,255,.3));}
  .fc .boxes{ flex:1; display:flex; flex-direction:column; gap:6px;}
  .fc .box{ position:relative; border:1px solid rgba(255,255,255,.42); background:rgba(10,8,20,.4);
    padding:7px 11px; font-size:11.5px; line-height:1.45; font-weight:600; display:flex; align-items:center;}
  .fc .box::before,.fc .box::after{ content:""; position:absolute; width:8px; height:8px;
    border-color:rgba(255,255,255,.85); border-style:solid;}
  .fc .box::before{ top:-1px; left:-1px; border-width:2px 0 0 2px;}
  .fc .box::after{ bottom:-1px; right:-1px; border-width:0 2px 2px 0;}
  .fc .box.top{ flex:1.25;} .fc .box.mid{ flex:1.15;} .fc .box.bot{ flex:1.05;}
  .fc .box.empty{ opacity:.26; border-style:dashed;}
  .fc .box.dead{ opacity:.35; }
  .fc .kw{ font-weight:900; text-decoration:underline; text-underline-offset:2px;}
  .fc .side{ position:absolute; right:6px; top:38%; writing-mode:vertical-rl; font-family:monospace;
    font-size:8px; letter-spacing:.35em; color:rgba(255,255,255,.6); z-index:2;}
  .fc.back{ display:flex; align-items:center; justify-content:center;
    background:radial-gradient(80% 60% at 50% 45%, #1b1440 0%, #0b0818 70%);}
  .fc.back .bframe{ position:absolute; inset:11px; border:1px solid rgba(180,160,255,.35);}
  .fc.back .emblem{ text-align:center; z-index:2;}
  .fc.back .emblem svg{ width:80px; filter:drop-shadow(0 0 14px rgba(140,110,255,.5));}
  .fc.back .logo{ font-family:"Arial Black",sans-serif; font-size:18px; font-weight:900;
    letter-spacing:.34em; text-indent:.34em; color:#e8e2ff; margin-top:8px;
    text-shadow:0 0 12px rgba(160,130,255,.8);}
  .fc.back .sub{ font-family:monospace; font-size:8px; letter-spacing:.5em; text-indent:.5em;
    color:rgba(220,210,255,.5); margin-top:4px;}
  .fc.back .fdv{ position:absolute; top:10px; right:12px; z-index:3;
    font-family:monospace; font-size:16px; font-weight:900; color:#cfc2ff;
    border:1px solid rgba(180,160,255,.6); padding:0 7px; background:rgba(20,12,50,.7);}
  .bigproto{ width:min(88vw,360px); aspect-ratio:7/5; border-radius:10px; position:relative; overflow:hidden;
    background:linear-gradient(150deg, var(--a), var(--b));
    border:1px solid rgba(255,255,255,.45); flex:0 0 auto;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:#fff;}
  .bigproto .pl{ font-family:monospace; font-size:10px; letter-spacing:.5em; text-indent:.5em; color:rgba(255,255,255,.6);}
  .bigproto .pn{ font-family:"Arial Black",sans-serif; font-weight:900; font-size:38px; letter-spacing:.1em;
    text-shadow:0 0 18px rgba(255,255,255,.45);}
  .bigproto .bar2{ width:56%; height:11px; border:1px solid rgba(255,255,255,.6); display:flex; gap:2px; padding:2px;}
  .bigproto .bar2 i{ flex:1; background:rgba(255,255,255,.85); animation:load 1.4s infinite alternate;}
  .bigproto .bar2 i:nth-child(2){animation-delay:.25s} .bigproto .bar2 i:nth-child(3){animation-delay:.5s; background:rgba(255,255,255,.3);}
  .bigproto .stamp{ font-family:monospace; font-size:13px; letter-spacing:.4em; text-indent:.4em;
    border:1px solid rgba(255,255,255,.85); padding:7px 16px; background:rgba(255,255,255,.12);
    box-shadow:0 0 20px var(--b);}

  .side-opp,.side-me{ display:none; }
  @media (orientation:landscape){
    body{ flex-direction:row; }
    .bar.opp,.bar.me{ display:none; }
    .side-opp,.side-me{ display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:12px; flex:0 0 96px; padding:8px 4px; }
    .side-opp{ border-right:1px solid #1e1e26; } .side-me{ border-left:1px solid #1e1e26; }
    .main{ flex:1; display:flex; flex-direction:column; min-width:0; }
    .field{ padding:6px 12px; }
    .hand{ height:100px; }
    .hcard{ width:62px; height:86px; }
    .side-me .phase{ flex-direction:column; align-items:stretch; flex:0; }
    .side-me .phase span{ text-align:center; }
    .side-me .actions{ flex-direction:column; }
  }
  .main{ display:flex; flex-direction:column; flex:1; min-height:0; }

  :root{ --danger:#ff8f9c; --ok:#8af0b0; --cyan:#78dcff; --panel:#121219; }
  body{ position:relative; }
  button{ touch-action:manipulation; }
  .hidden{ display:none!important; }
  .main{ position:relative; }
  .topline{ display:flex; align-items:center; justify-content:space-between; padding:5px 10px 2px; gap:8px; }
  .brand{ font:900 11px/1 "Arial Black",sans-serif; letter-spacing:.42em; text-indent:.42em; color:#d8ccff; white-space:nowrap; }
  .turnbadge{ font:700 9px/1.2 monospace; color:#8f8fa0; border:1px solid #34343e; padding:4px 8px; }
  .bar{ min-height:54px; }
  .bar.me{ padding-bottom:2px; }
  .playername{ font-size:10px; letter-spacing:.18em; color:#aaaab8; font-weight:700; }
  .currentname{ color:#e8e2ff; }
  .statusline{ font-size:8px; color:#656574; letter-spacing:.08em; margin-top:2px; }
  .p.trash,.p.deck{ cursor:pointer; }
  .stack{ outline:1px solid transparent; transition:outline-color .18s,background .18s; }
  .stack.legal{ outline-color:var(--cyan); background:rgba(80,190,255,.06); box-shadow:inset 0 0 16px rgba(80,190,255,.12); }
  .stack.blocked{ opacity:.48; }
  .minicard.selected,.hcard.selected{ outline:2px solid var(--cyan); box-shadow:0 0 18px rgba(100,220,255,.5); }
  .hcard{ flex:0 0 auto; }
  .hand{ justify-content:flex-start; overflow-x:auto; overflow-y:hidden; scrollbar-width:none; padding-left:max(18px,calc(50vw - 44px)); padding-right:max(18px,calc(50vw - 44px)); scroll-snap-type:x proximity; }
  .hand::-webkit-scrollbar{ display:none; }
  .hcard{ scroll-snap-align:center; }
  .actions button[disabled]{ opacity:.28; cursor:not-allowed; }
  .actions button.primary{ color:#0e0e11; background:var(--gold); border-color:var(--gold); }
  .actions button.danger{ border-color:rgba(255,110,125,.65); color:#ffb0b8; }
  .actions button.small{ padding:5px 8px; font-size:9px; }
  .phase span.done{ color:#8f8fa0; border-color:#44444e; }
  .phase span.now{ box-shadow:0 0 12px rgba(201,162,255,.35); }
  .toast{ position:fixed; left:50%; top:12px; transform:translateX(-50%) translateY(-20px); z-index:120;
    max-width:min(92vw,560px); opacity:0; pointer-events:none; transition:.22s;

const PROTOCOLS=Object.keys(DB);

const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const other=p=>1-p;
const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};

/* ==== 設定・演出ヘルパー ==== */
const SET=Object.assign({fx:1,scale:100,shake:true},(()=>{try{return JSON.parse(localStorage.getItem('compile-settings')||'{}');}catch(e){return{};}})());
function saveSettings(){try{localStorage.setItem('compile-settings',JSON.stringify(SET));}catch(e){}}
const pace=(m=1)=>sleep(340*m*SET.fx);
function gridW(){return Math.round(Math.min(innerWidth*.45,190)*SET.scale/100);}
function inspectW(){return Math.round(Math.min(innerWidth*.62,240)*SET.scale/100);}
function elOf(card){return card?document.querySelector(`[data-cid="${card.id}"]`):null;}
function chip(msg){const box=$('#chips');if(!box)return;const d=document.createElement('div');d.className='chip';d.textContent=msg;box.prepend(d);while(box.children.length>4)box.lastChild.remove();setTimeout(()=>{d.classList.add('out');setTimeout(()=>d.remove(),380);},2600);}
function flashWhite(){if(!SET.fx)return;const f=$('#fw');f.classList.remove('go');void f.offsetWidth;f.classList.add('go');}
function shakeScreen(){if(!SET.shake||!SET.fx)return;const m=$('#gameMain');if(!m)return;m.classList.remove('shake');void m.offsetWidth;m.classList.add('shake');setTimeout(()=>m.classList.remove('shake'),500);}
function fxAtCard(card,n=36){const el=elOf(card);if(!el){fxBurst(card.protocol,n);return;}const r=el.getBoundingClientRect();fxBurst(card.protocol,n,{x:r.left+r.width/2,y:r.top+r.height/2});}
function announce(subj,title,desc='',tag='能力発動',cls=''){
  if(!SET.fx)return Promise.resolve();
  const el=$('#ann');const proto=typeof subj==='string'?subj:subj?.protocol;
  const st=STYLE[proto]||STYLE.SPIRIT;
  el.className='announce'+(cls?' '+cls:'');
  el.style.setProperty('--b',st.c[3]);
  const dur=(cls==='gold'?1.75:1.35)*Math.max(SET.fx,.6);
  el.style.setProperty('--adur',dur+'s');
  el.innerHTML=`<div class="abox"><div class="atag">${esc(tag)}</div><div class="aname">${esc(title)}</div>${desc?`<div class="atext">${kw(desc)}</div>`:''}</div>`;
  void el.offsetWidth;el.classList.add('show');
  if(subj&&typeof subj!=='string'){const dom=elOf(subj);if(dom){dom.classList.add('fxhl');setTimeout(()=>dom.classList.remove('fxhl'),1200);}fxAtCard(subj,30);}
  else if(proto)fxBurst(proto,40);
  return sleep(dur*1000*.82);
}

function setPal(el,p){const pal=PAL[p]||["#181820","#55556a"];el.style.setProperty('--a',pal[0]);el.style.setProperty('--b',pal[1]);}
function kw(s){return s?esc(s).replace(/(開始：|終了：)/g,"<span class='kw'>$1</span>"):"";}
function protocolLabel(p){return p;}
function log(msg){
  if(!G)return;
  G.log.unshift({turn:G.turn,phase:G.phase,msg});
  G.log=G.log.slice(0,120);
  chip(msg);
  autosave();
}
function toast(msg,ms=1800){const el=$('#toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),ms);}
function playerName(i){return G?.players?.[i]?.name||`PLAYER ${i+1}`;}
function cardName(c){return `${c.protocol} ${c.value}`;}
function cardText(c){const t=T(c);return [t.t,t.m,t.b].filter(Boolean).join(' / ');}
function cardLocation(card){
  for(let p=0;p<2;p++)for(let l=0;l<3;l++){const i=G.players[p].lines[l].indexOf(card);if(i>=0)return {player:p,line:l,index:i};}
  for(let p=0;p<2;p++){let i=G.players[p].hand.indexOf(card);if(i>=0)return {player:p,zone:'hand',index:i};i=G.players[p].deck.indexOf(card);if(i>=0)return {player:p,zone:'deck',index:i};i=G.players[p].discard.indexOf(card);if(i>=0)return {player:p,zone:'discard',index:i};}
  return null;
}
function topCard(p,l){const a=G.players[p].lines[l];return a[a.length-1]||null;}
function isTop(card){const loc=cardLocation(card);return !!loc&&loc.line!=null&&loc.index===G.players[loc.player].lines[loc.line].length-1;}
function isCovered(card){const loc=cardLocation(card);return !!loc&&loc.line!=null&&loc.index<G.players[loc.player].lines[loc.line].length-1;}
function isFaceUp(card){return !card.faceDown;}
function topFaceUp(p,l,protocol,value){const c=topCard(p,l);return !!c&&!c.faceDown&&c.protocol===protocol&&(value==null||c.value===value);}
function allFieldCards(){const a=[];for(let p=0;p<2;p++)for(let l=0;l<3;l++)for(const c of G.players[p].lines[l])a.push(c);return a;}
function fieldCardsOf(p){return G.players[p].lines.flat();}
function activeTopEffect(card){return !card.faceDown;}
function activeVisibleEffect(card){return !card.faceDown&&isTop(card);}
function sameStackHasDarkness2(p,l){return G.players[p].lines[l].some(c=>!c.faceDown&&c.protocol==='DARKNESS'&&c.value===2);}
function effectiveValue(card){
  const loc=cardLocation(card);
  if(card.faceDown){return loc&&loc.line!=null&&sameStackHasDarkness2(loc.player,loc.line)?4:2;}
  return card.value;
}
function rawStackTotal(p,l){return G.players[p].lines[l].reduce((s,c)=>s+effectiveValue(c),0);}
function stackTotal(p,l){let n=rawStackTotal(p,l);if(topFaceUp(other(p),l,'METAL',0))n-=2;return n;}
function hasSpiritBypass(p){return fieldCardsOf(p).some(c=>!c.faceDown&&c.protocol==='SPIRIT'&&c.value===1);}
function forceFaceDown(p){return [0,1,2].some(l=>topFaceUp(other(p),l,'PSYCHIC',1));}
function lineBlocked(p,l){return topFaceUp(other(p),l,'PLAGUE',0);}
function faceDownBlocked(p,l){return topFaceUp(other(p),l,'METAL',2);}
function skipCache(p){return [0,1,2].some(l=>topFaceUp(p,l,'SPIRIT',0));}
function eligibleCompileLines(p){if(G.players[p].noCompileThisTurn)return[];return [0,1,2].filter(l=>stackTotal(p,l)>=10);}
function createCard(protocol,value,owner){return{id:uid(),protocol,value,owner,faceDown:false};}
function valuesForProtocol(p){const vals=Object.keys(DB[p]).map(Number).sort((a,b)=>a-b);while(vals.length<6)vals.unshift(0);return vals;}
function buildDeck(p,protocols){const d=[];for(const pr of protocols)for(const v of valuesForProtocol(pr.name))d.push(createCard(pr.name,v,p));return shuffle(d);}

function showModal({title,sub='',body='',buttons=[]}){
  const modal=$('#modal'),dialog=$('#dialog');
  dialog.innerHTML=`<h2>${esc(title)}</h2>${sub?`<div class="sub">${sub}</div>`:''}<div class="dialogbody">${body}</div><div class="dialogfoot"></div>`;
  const foot=dialog.querySelector('.dialogfoot');
  return new Promise(resolve=>{
    modalResolve=resolve;
    for(const b of buttons){const btn=document.createElement('button');btn.textContent=b.label;btn.className=b.className||'';btn.disabled=!!b.disabled;btn.onclick=()=>{modal.classList.remove('show');modalResolve=null;resolve(b.value);};foot.appendChild(btn);}
    modal.classList.add('show');
  });
}
function closeModal(value=null){if(modalResolve){const r=modalResolve;modalResolve=null;$('#modal').classList.remove('show');r(value);}else $('#modal').classList.remove('show');}
async function choose(title,sub,options,{allowCancel=false,columns=true}={}){
  if(!options.length){toast('選択できる対象がありません');return null;}
  const body=`<div class="${columns?'choicegrid':''}" id="choiceGrid"></div>`;
  const p=showModal({title,sub,body,buttons:allowCancel?[{label:'キャンセル',value:null}]:[]});
  const grid=$('#choiceGrid');
  options.forEach((o,i)=>{const b=document.createElement('button');b.className='choice';b.innerHTML=`<strong>${o.title||esc(String(o.label??o))}</strong>${o.desc?`<small>${o.desc}</small>`:''}`;b.onclick=()=>closeModal(o.value===undefined?o:o.value);grid.appendChild(b);});
  return p;
}
async function confirmAsk(title,sub,yes='実行する',no='しない'){return await showModal({title,sub,body:'',buttons:[{label:no,value:false},{label:yes,value:true,className:'primary'}]});}
async function chooseLine(title,lines=[0,1,2],allowCancel=false){return choose(title,'配置するラインを選択してください。',lines.map(l=>({title:`LINE ${l+1}`,desc:`${G.players[G.current].protocols[l]?.name||''}`,value:l})),{allowCancel});}
async function chooseFieldCard(title,filter=()=>true,{allowCancel=false,viewer=G.current}={}){
  const opts=[];for(let p=0;p<2;p++)for(let l=0;l<3;l++)G.players[p].lines[l].forEach((c,i)=>{if(filter(c,{player:p,line:l,index:i,covered:i<G.players[p].lines[l].length-1})){const hidden=c.faceDown&&p!==viewer;opts.push({title:hidden?'裏向きカード':cardName(c),desc:`${playerName(p)} / LINE ${l+1} / ${i===G.players[p].lines[l].length-1?'最上段':'覆い'} / 値${effectiveValue(c)}`,value:c});}});
  return choose(title,'対象カードを選択してください。',opts,{allowCancel});
}
async function privacyGate(target,reason){
  if(target===G.current)return;
  await showModal({title:'端末を渡してください',sub:`${playerName(target)} が非公開情報を選択します。${reason||''}`,body:`<div class="privacy"><div class="lock">◇</div><h3>${esc(playerName(target))}</h3><p>画面を相手に見せない状態で端末を渡し、準備ができたら続行してください。</p></div>`,buttons:[{label:'準備完了',value:true,className:'primary'}]});
}
async function privacyReturn(target){
  if(target===G.current)return;
  await showModal({title:'端末を戻してください',sub:`選択が完了しました。${playerName(G.current)} に端末を戻します。`,body:`<div class="privacy"><div class="lock">◇</div><p>非公開情報を閉じてから端末を戻してください。</p></div>`,buttons:[{label:'戻しました',value:true,className:'primary'}]});
}
async function chooseHandCards(target,{min=1,max=1,title='手札を選択',reason='',allowFewer=false}={}){
  const hand=G.players[target].hand;if(!hand.length)return[];
  await privacyGate(target,reason);
  let selected=[];
  const body=`<div class="choicegrid" id="handChoice"></div><div class="sub" id="selCount"></div>`;
  const promise=showModal({title,sub:`${min}〜${Math.min(max,hand.length)}枚を選択`,body,buttons:[]});
  const dialog=$('#dialog'),grid=$('#handChoice'),foot=dialog.querySelector('.dialogfoot'),count=$('#selCount');
  const render=()=>{grid.innerHTML='';hand.forEach(c=>{const b=document.createElement('button');b.className='choice'+(selected.includes(c)?' on':'');b.innerHTML=`<strong>${esc(cardName(c))}</strong><small>${esc(cardText(c))}</small>`;b.onclick=()=>{selected.includes(c)?selected.splice(selected.indexOf(c),1):selected.length<max&&selected.push(c);render();};grid.appendChild(b);});count.textContent=`選択中 ${selected.length}枚`;done.disabled=selected.length<min||selected.length>max;};
  if(allowFewer){const cancel=document.createElement('button');cancel.textContent='選ばない';cancel.onclick=()=>closeModal([]);foot.appendChild(cancel);}
  const done=document.createElement('button');done.textContent='決定';done.className='primary';done.onclick=()=>closeModal([...selected]);foot.appendChild(done);render();
  const result=await promise;await privacyReturn(target);return result||[];
}

function removeFromHand(holder,card){const i=G.players[holder].hand.indexOf(card);if(i>=0)G.players[holder].hand.splice(i,1);}
function sendToDiscard(card){G.players[card.owner].discard.push(card);card.faceDown=false;}
async function discardCardsFromHand(target,cards,{event=true}={}){
  let n=0;for(const c of cards){const i=G.players[target].hand.indexOf(c);if(i>=0){G.players[target].hand.splice(i,1);sendToDiscard(c);n++;}}
  if(n){log(`${playerName(target)} が手札を${n}枚捨て札にした`);render();await pace(.7);if(event)await triggerAfterDiscard(target,n);}return n;
}
async function discardFromHand(target,n,{min=n,reason=''}={}){const cards=await chooseHandCards(target,{min:Math.min(min,G.players[target].hand.length),max:Math.min(n,G.players[target].hand.length),title:'捨て札にするカード',reason,allowFewer:min===0});return discardCardsFromHand(target,cards);}
function reshuffleIfNeeded(p){if(!G.players[p].deck.length&&G.players[p].discard.length){G.players[p].deck=shuffle(G.players[p].discard.splice(0));log(`${playerName(p)} の捨て札をシャッフルしてデッキに戻した`);}}
async function draw(p,n,{trigger=true}={}){
  let drawn=0;for(let i=0;i<n;i++){reshuffleIfNeeded(p);const c=G.players[p].deck.pop();if(!c)break;G.players[p].hand.push(c);drawn++;}
  if(drawn){log(`${playerName(p)} が${drawn}枚引いた`);render();await pace(.7);if(trigger)await triggerAfterDraw(p);}else toast('引けるカードがありません');return drawn;
}
async function triggerAfterDraw(p){
  const spirits=fieldCardsOf(p).filter(c=>!c.faceDown&&c.protocol==='SPIRIT'&&c.value===3);
  for(const c of spirits){if(!cardLocation(c))continue;const yes=await confirmAsk('SPIRIT 3','カードを引いたため、このカードを移動できます。','移動する','そのまま');if(yes)await moveCardPrompt(c,p);}
}
async function triggerAfterDiscard(discardingPlayer,n){
  const op=other(discardingPlayer);const plagues=fieldCardsOf(op).filter(c=>!c.faceDown&&c.protocol==='PLAGUE'&&c.value===1);
  if(plagues.length){log(`PLAGUE 1：${playerName(op)} がカードを引く`);await announce(plagues[0],'PLAGUE 1','相手が手札を捨て札にしたあと：カードを1枚引く。','誘発効果');await draw(op,1);}
}

async function beforeCover(p,l,incoming){
  while(true){const top=topCard(p,l);if(!top)return;
    if(!top.faceDown&&top.protocol==='METAL'&&top.value===6){log('METAL 6：覆われる代わりに削除');await announce(top,'METAL 6','覆われることになったとき：先にこのカードを削除する。','誘発効果');await deleteCard(top,{suppressUncover:true});continue;}
    if(!top.faceDown&&top.protocol==='LIFE'&&top.value===3){await announce(top,'LIFE 3','覆われることになったとき：先にデッキの一番上を他の1ラインに裏向きでプレイ。','誘発効果');const choices=[0,1,2].filter(x=>x!==l);const target=await chooseLine('LIFE 3：先に裏向きでプレイ',choices);if(target!=null)await playTopDeck(p,target,{faceDown:true});}
    if(!top.faceDown&&top.protocol==='FIRE'&&top.value===0){log('FIRE 0：覆われる前に発動');await announce(top,'FIRE 0','覆われることになったとき：先にカードを1枚引き、他のカードを1枚反転させる。','誘発効果');await draw(p,1);const c=await chooseFieldCard('FIRE 0：他のカードを反転',c=>c!==top,{allowCancel:false,viewer:p});if(c)await flipCard(c);}
    return;
  }
}
async function revealTopIfNeeded(p,l,oldTop){const now=topCard(p,l);if(now&&now!==oldTop&&!now.faceDown){await activateVisibleCard(now,{reason:'uncover',holder:p,line:l});}}
async function deleteCard(card,{suppressUncover=false}={}){
  const loc=cardLocation(card);if(!loc||loc.line==null)return false;const del=elOf(card);if(del){const r=del.getBoundingClientRect();fxBurst(card.protocol,55,{x:r.left+r.width/2,y:r.top+r.height/2});}const stack=G.players[loc.player].lines[loc.line],wasTop=loc.index===stack.length-1;stack.splice(loc.index,1);sendToDiscard(card);log(`${cardName(card)} を削除`);render();await pace();if(wasTop&&!suppressUncover)await revealTopIfNeeded(loc.player,loc.line,card);return true;
}
async function returnCard(card){
  const loc=cardLocation(card);if(!loc||loc.line==null)return false;const rel=elOf(card);if(rel){const r=rel.getBoundingClientRect();fxBurst(card.protocol,30,{x:r.left+r.width/2,y:r.top+r.height/2});}const stack=G.players[loc.player].lines[loc.line],wasTop=loc.index===stack.length-1;stack.splice(loc.index,1);card.faceDown=false;G.players[card.owner].hand.push(card);log(`${cardName(card)} を所有者の手札に戻した`);render();await pace(.8);if(wasTop)await revealTopIfNeeded(loc.player,loc.line,card);return true;
}
async function flipCard(card){
  const loc=cardLocation(card);if(!loc||loc.line==null)return false;
  if(!card.faceDown&&card.protocol==='METAL'&&card.value===6){log('METAL 6：反転する代わりに削除');return deleteCard(card);}
  card.faceDown=!card.faceDown;log(`${cardName(card)} を${card.faceDown?'裏向き':'表向き'}に反転`);render();const fel=elOf(card);if(fel&&SET.fx)fel.classList.add('flipin');fxAtCard(card,28);await pace(.9);
  if(!card.faceDown&&isTop(card))await activateVisibleCard(card,{reason:'flip',holder:loc.player,line:loc.line});return true;
}
async function moveCard(card,targetLine=null){
  const loc=cardLocation(card);if(!loc||loc.line==null)return false;const p=loc.player,source=loc.line;if(targetLine==null){const options=[0,1,2].filter(l=>l!==source);targetLine=await chooseLine('移動先を選択',options,true);}if(targetLine==null||targetLine===source)return false;
  const sourceStack=G.players[p].lines[source],wasTop=loc.index===sourceStack.length-1;sourceStack.splice(loc.index,1);if(wasTop)await revealTopIfNeeded(p,source,card);
  await beforeCover(p,targetLine,card);G.players[p].lines[targetLine].push(card);log(`${cardName(card)} をLINE ${source+1}からLINE ${targetLine+1}へ移動`);render();fxAtCard(card,22);await pace(.8);return true;
}
async function moveCardPrompt(card,chooser){return moveCard(card);}
async function playTopDeck(p,l,{faceDown=true,underCard=null}={}){const c=G.players[p].deck.pop();if(!c){toast('デッキが空です');return null;}c.faceDown=faceDown;if(underCard){const st=G.players[p].lines[l],idx=st.indexOf(underCard);st.splice(Math.max(0,idx),0,c);}else{await beforeCover(p,l,c);G.players[p].lines[l].push(c);}log(`${playerName(p)} がデッキ上からLINE ${l+1}へ裏向きでプレイ`);render();fxAtCard(c,20);await pace(.7);return c;}
async function reorderProtocols(p,title='プロトコルを並べ替える'){
  const arr=G.players[p].protocols;let order=[...arr];
  const body='<div class="arrange" id="reorderCards"></div><div class="sub">左右ボタンで順番を変更します。ライン上のスタックは動きません。</div>';
  const promise=showModal({title,sub:`${playerName(p)} の配置`,body,buttons:[]});const holder=$('#reorderCards'),foot=$('#dialog .dialogfoot');
  const renderOrder=()=>{holder.innerHTML='';order.forEach((pr,i)=>{const d=document.createElement('div');d.className='arrcard';setPal(d,pr.name);d.innerHTML=`<span>LINE ${i+1}</span><strong>${pr.name}</strong><div class="arrows"></div>`;const a=d.querySelector('.arrows');const left=document.createElement('button');left.textContent='←';left.disabled=i===0;left.onclick=()=>{[order[i-1],order[i]]=[order[i],order[i-1]];renderOrder();};const right=document.createElement('button');right.textContent='→';right.disabled=i===order.length-1;right.onclick=()=>{[order[i+1],order[i]]=[order[i],order[i+1]];renderOrder();};a.append(left,right);holder.appendChild(d);});};
  const done=document.createElement('button');done.textContent='決定';done.className='primary';done.onclick=()=>closeModal(order);foot.appendChild(done);renderOrder();const result=await promise;if(result){G.players[p].protocols=[...result];log(`${playerName(p)} がプロトコルを並べ替えた`);render();}}
async function controlReleaseAndOptionalReorder(p){if(G.control!==p)return;G.control=null;log('CONTROLを中立へ戻した');render();const yes=await confirmAsk('CONTROL','コンパイル／リフレッシュ前に、自分か相手のプロトコルを並べ替えられます。','並べ替える','並べ替えない');if(yes){const target=await choose('対象プレイヤー','プロトコルカードだけを移動します。',[{title:playerName(p),value:p},{title:playerName(other(p)),value:other(p)}]);if(target!=null)await reorderProtocols(target);}}

function legalFaceUpLines(p,card){if(forceFaceDown(p))return[];return[0,1,2].filter(l=>!lineBlocked(p,l)&&(G.players[p].protocols[l].name===card.protocol||hasSpiritBypass(p)));}
function legalFaceDownLines(p){return[0,1,2].filter(l=>!lineBlocked(p,l)&&!faceDownBlocked(p,l));}
async function promptPlayCard(p,card,{free=false}={}){
  if(!G.players[p].hand.includes(card))return false;
  const up=legalFaceUpLines(p,card),down=legalFaceDownLines(p);const opts=[];
  if(up.length)opts.push({title:'表向きでプレイ',desc:`有効ライン: ${up.map(x=>x+1).join(', ')}`,value:'up'});
  if(down.length)opts.push({title:'裏向きでプレイ',desc:'値は2。効果は無効。',value:'down'});
  const mode=await choose(cardName(card),cardText(card),opts,{allowCancel:true});if(!mode)return false;
  const lines=mode==='up'?up:down;const l=await chooseLine(`${mode==='up'?'表向き':'裏向き'}でプレイ`,lines,true);if(l==null)return false;
  removeFromHand(p,card);card.faceDown=mode==='down';await beforeCover(p,l,card);const covering=G.players[p].lines[l].length>0;G.players[p].lines[l].push(card);log(`${playerName(p)} が${cardName(card)}をLINE ${l+1}へ${card.faceDown?'裏向き':'表向き'}でプレイ`);render();fxAtCard(card,40);await pace(.6);
  if(!card.faceDown)await activateVisibleCard(card,{reason:'play',holder:p,line:l,covering});return true;
}
async function promptExtraPlay(p){if(!G.players[p].hand.length){toast('手札がありません');return false;}const c=await choose('プレイするカード','SPEED 0などの追加プレイです。',G.players[p].hand.map(c=>({title:cardName(c),desc:cardText(c),value:c})),{allowCancel:false});return c?promptPlayCard(p,c,{free:true}):false;}

async function refreshPlayer(p){
  await controlReleaseAndOptionalReorder(p);const cards=[...G.players[p].hand];await discardCardsFromHand(p,cards);log(`${playerName(p)} がリフレッシュ`);await draw(p,5);const speed=fieldCardsOf(p).some(c=>!c.faceDown&&c.protocol==='SPEED'&&c.value===1);if(speed){log('SPEED 1：キャッシュクリア後に1枚引く');await draw(p,1);}}

async function activateVisibleCard(card,ctx={}){
  if(!cardLocation(card)||card.faceDown||!isTop(card))return;
  const loc=cardLocation(card),p=loc.player,l=loc.line,key=`${card.protocol}:${card.value}`;log(`${cardName(card)} の可視効果を解決`);render();
  const rtag={play:'プレイ効果',flip:'反転により発動',uncover:'公開により発動'}[ctx.reason]||'能力発動';
  await announce(card,cardName(card),T(card).m||T(card).t||'',rtag);
  switch(key){
    case'SPIRIT:0':await refreshPlayer(p);await draw(p,1);break;
    case'SPIRIT:1':await draw(p,2);break;
    case'SPIRIT:2':{const c=await chooseFieldCard('SPIRIT 2：カードを反転',()=>true,{allowCancel:true,viewer:p});if(c)await flipCard(c);break;}
    case'SPIRIT:4':await reorderProtocols(p,'SPIRIT 4：自分のプロトコルを並べ替える');break;
    case'SPIRIT:5':await discardFromHand(p,1,{reason:'SPIRIT 5'});break;
    case'LIFE:0':{for(let x=0;x<3;x++)if(G.players[p].lines[x].length)await playTopDeck(p,x,{faceDown:true});break;}
    case'LIFE:1':for(let k=0;k<2;k++){const c=await chooseFieldCard(`LIFE 1：反転 ${k+1}/2`,()=>true,{allowCancel:false,viewer:p});if(c)await flipCard(c);}break;
    case'LIFE:2':{await draw(p,1);const c=await chooseFieldCard('LIFE 2：裏向きカードを反転',c=>c.faceDown,{allowCancel:true,viewer:p});if(c)await flipCard(c);break;}
    case'LIFE:4':if(ctx.covering)await draw(p,1);break;
    case'LIFE:5':await discardFromHand(p,1,{reason:'LIFE 5'});break;
    case'WATER:0':{const c=await chooseFieldCard('WATER 0：他のカードを反転',c=>c!==card,{viewer:p});if(c)await flipCard(c);if(cardLocation(card))await flipCard(card);break;}
    case'WATER:1':for(const x of[0,1,2].filter(x=>x!==l))await playTopDeck(p,x,{faceDown:true});break;
    case'WATER:2':await draw(p,2);await reorderProtocols(p,'WATER 2：自分のプロトコルを並べ替える');break;
    case'WATER:3':{const line=await chooseLine('WATER 3：値2を戻す',[0,1,2]);const targets=[];for(let q=0;q<2;q++)targets.push(...G.players[q].lines[line].filter(c=>effectiveValue(c)===2));await batchRemove(targets,'return');break;}
    case'WATER:4':{const c=await chooseFieldCard('WATER 4：自分のカードを戻す',(c,x)=>x.player===p,{viewer:p});if(c)await returnCard(c);break;}
    case'WATER:5':await discardFromHand(p,1,{reason:'WATER 5'});break;
    case'DEATH:0':for(const x of[0,1,2].filter(x=>x!==l)){const c=await chooseFieldCard(`DEATH 0：LINE ${x+1}から削除`,(c,z)=>z.line===x,{viewer:p});if(c)await deleteCard(c);}break;
    case'DEATH:2':{const line=await chooseLine('DEATH 2：ラインを選択');const v=await choose('削除する値','1か2を選び、その値のカードをすべて削除します。',[{title:'値1',value:1},{title:'値2',value:2}]);const targets=[];for(let q=0;q<2;q++)targets.push(...G.players[q].lines[line].filter(c=>effectiveValue(c)===v));await batchRemove(targets,'delete');break;}
    case'DEATH:3':{const c=await chooseFieldCard('DEATH 3：裏向きカードを削除',c=>c.faceDown,{viewer:p});if(c)await deleteCard(c);break;}
    case'DEATH:4':{const c=await chooseFieldCard('DEATH 4：値0か1を削除',c=>[0,1].includes(effectiveValue(c)),{viewer:p});if(c)await deleteCard(c);break;}
    case'DEATH:5':await discardFromHand(p,1,{reason:'DEATH 5'});break;
    case'PLAGUE:0':await discardFromHand(other(p),1,{reason:'PLAGUE 0'});break;
    case'PLAGUE:1':await discardFromHand(other(p),1,{reason:'PLAGUE 1'});break;
    case'PLAGUE:2':{let n=0;if(G.players[p].hand.length){const cards=await chooseHandCards(p,{min:1,max:G.players[p].hand.length,title:'PLAGUE 2：捨てる手札'});n=await discardCardsFromHand(p,cards);}await discardFromHand(other(p),n+1,{min:Math.min(n+1,G.players[other(p)].hand.length),reason:'PLAGUE 2'});break;}
    case'PLAGUE:3':{const targets=[];for(let q=0;q<2;q++)for(let x=0;x<3;x++){const c=topCard(q,x);if(c&&c!==card&&!c.faceDown)targets.push(c);}for(const c of targets)if(cardLocation(c))await flipCard(c);break;}
    case'PLAGUE:5':await discardFromHand(p,1,{reason:'PLAGUE 5'});break;
    case'GRAVITY:0':{const count=G.players[0].lines[l].length+G.players[1].lines[l].length,n=Math.floor(count/2);for(let k=0;k<n;k++)await playTopDeck(p,l,{faceDown:true,underCard:card});break;}
    case'GRAVITY:1':{await draw(p,2);const c=await chooseFieldCard('GRAVITY 1：このラインから／へ移動',(c,z)=>z.player===p&&(z.line===l||z.line!==l),{viewer:p});if(c){const z=cardLocation(c);if(z.line===l)await moveCard(c);else await moveCard(c,l);}break;}
    case'GRAVITY:2':{const c=await chooseFieldCard('GRAVITY 2：反転してこのラインへ',()=>true,{viewer:p});if(c){await flipCard(c);if(cardLocation(c)?.line!==l)await moveCard(c,l);}break;}
    case'GRAVITY:4':{const c=await chooseFieldCard('GRAVITY 4：裏向きをこのラインへ',c=>c.faceDown,{viewer:p});if(c&&cardLocation(c)?.line!==l)await moveCard(c,l);break;}
    case'GRAVITY:6':await playTopDeck(other(p),l,{faceDown:true});break;
    case'METAL:0':{const c=await chooseFieldCard('METAL 0：カードを反転',()=>true,{viewer:p});if(c)await flipCard(c);break;}
    case'METAL:1':await draw(p,2);G.players[other(p)].noCompileNextTurn=true;log(`${playerName(other(p))} は次の手番にコンパイル不可`);break;
    case'METAL:3':{await draw(p,1);const lines=[0,1,2].filter(x=>x!==l&&(G.players[0].lines[x].length+G.players[1].lines[x].length)>=8);if(lines.length){const x=await chooseLine('METAL 3：8枚以上のラインを削除',lines);const cards=[...G.players[0].lines[x],...G.players[1].lines[x]];await batchRemove(cards,'delete');}break;}
    case'LIGHT:0':{const c=await chooseFieldCard('LIGHT 0：反転するカード',()=>true,{viewer:p});if(c){await flipCard(c);await draw(p,effectiveValue(c));}break;}
    case'LIGHT:2':{await draw(p,2);const c=await chooseFieldCard('LIGHT 2：裏向きカードを公開',c=>c.faceDown,{viewer:p});if(c){await inspectSecretCard(c,p);const act=await choose('公開したカード','移動または反転できます。',[{title:'移動する',value:'move'},{title:'反転する',value:'flip'},{title:'何もしない',value:'none'}]);if(act==='move')await moveCard(c);if(act==='flip')await flipCard(c);}break;}
    case'LIGHT:3':{const target=await chooseLine('LIGHT 3：移動先',[0,1,2].filter(x=>x!==l));for(let q=0;q<2;q++){const cards=G.players[q].lines[l].filter(c=>c.faceDown);for(const c of cards)if(cardLocation(c))await moveCard(c,target);}break;}
    case'LIGHT:4':await revealHandTo(p,other(p),'LIGHT 4：相手の手札');break;
    case'LIGHT:5':await discardFromHand(p,1,{reason:'LIGHT 5'});break;
    case'FIRE:0':{const c=await chooseFieldCard('FIRE 0：他のカードを反転',c=>c!==card,{viewer:p});if(c)await flipCard(c);await draw(p,2);break;}
    case'FIRE:1':{const n=await discardFromHand(p,1,{reason:'FIRE 1'});if(n){const c=await chooseFieldCard('FIRE 1：カードを削除',()=>true,{viewer:p});if(c)await deleteCard(c);}break;}
    case'FIRE:2':{const n=await discardFromHand(p,1,{reason:'FIRE 2'});if(n){const c=await chooseFieldCard('FIRE 2：カードを戻す',()=>true,{viewer:p});if(c)await returnCard(c);}break;}
    case'FIRE:4':{let n=0;if(G.players[p].hand.length){const cards=await chooseHandCards(p,{min:1,max:G.players[p].hand.length,title:'FIRE 4：捨てる手札'});n=await discardCardsFromHand(p,cards);}await draw(p,n+1);break;}
    case'FIRE:5':await discardFromHand(p,1,{reason:'FIRE 5'});break;
    case'SPEED:0':await promptExtraPlay(p);break;
    case'SPEED:1':await draw(p,2);break;
    case'SPEED:3':{const c=await chooseFieldCard('SPEED 3：自分の他のカードを移動',(c,z)=>z.player===p&&c!==card,{viewer:p});if(c)await moveCard(c);break;}
    case'SPEED:4':{const c=await chooseFieldCard('SPEED 4：相手の裏向きを移動',(c,z)=>z.player===other(p)&&c.faceDown,{viewer:p});if(c)await moveCard(c);break;}
    case'SPEED:5':await discardFromHand(p,1,{reason:'SPEED 5'});break;
    case'DARKNESS:0':{await draw(p,3);const c=await chooseFieldCard('DARKNESS 0：相手の覆われたカードを移動',(c,z)=>z.player===other(p)&&z.covered,{viewer:p});if(c)await moveCard(c);break;}
    case'DARKNESS:1':{const c=await chooseFieldCard('DARKNESS 1：相手のカードを反転',(c,z)=>z.player===other(p),{viewer:p});if(c){await flipCard(c);if(cardLocation(c)&&await confirmAsk('DARKNESS 1','そのカードを移動しますか？','移動する','そのまま'))await moveCard(c);}break;}
    case'DARKNESS:2':{const c=await chooseFieldCard('DARKNESS 2：このラインの覆われたカードを反転',(c,z)=>z.line===l&&z.covered,{allowCancel:true,viewer:p});if(c)await flipCard(c);break;}
    case'DARKNESS:3':{if(G.players[p].hand.length){const c=await choose('DARKNESS 3：裏向きでプレイ','手札から1枚選びます。',G.players[p].hand.map(c=>({title:cardName(c),desc:cardText(c),value:c})));const line=await chooseLine('他のラインへ裏向きでプレイ',[0,1,2].filter(x=>x!==l));if(c&&line!=null){removeFromHand(p,c);c.faceDown=true;await beforeCover(p,line,c);G.players[p].lines[line].push(c);render();}}break;}
    case'DARKNESS:4':{const c=await chooseFieldCard('DARKNESS 4：裏向きカードを移動',c=>c.faceDown,{viewer:p});if(c)await moveCard(c);break;}
    case'DARKNESS:5':await discardFromHand(p,1,{reason:'DARKNESS 5'});break;
    case'PSYCHIC:0':await draw(p,2);await discardFromHand(other(p),2,{reason:'PSYCHIC 0'});await revealHandTo(p,other(p),'PSYCHIC 0：相手の手札');break;
    case'PSYCHIC:2':await discardFromHand(other(p),2,{reason:'PSYCHIC 2'});await reorderProtocols(other(p),'PSYCHIC 2：相手のプロトコルを並べ替える');break;
    case'PSYCHIC:3':await discardFromHand(other(p),1,{reason:'PSYCHIC 3'});{const c=await chooseFieldCard('PSYCHIC 3：相手のカードを移動',(c,z)=>z.player===other(p),{viewer:p});if(c)await moveCard(c);}break;
    case'PSYCHIC:5':await discardFromHand(p,1,{reason:'PSYCHIC 5'});break;
  }
  render();
}

async function batchRemove(cards,mode){
  const affected=new Map(),actual=[];for(const c of cards){const loc=cardLocation(c);if(loc&&loc.line!=null){const key=`${loc.player}:${loc.line}`;if(!affected.has(key))affected.set(key,topCard(loc.player,loc.line));actual.push({c,loc});}}
  actual.sort((a,b)=>b.loc.index-a.loc.index);for(const {c,loc} of actual){const stack=G.players[loc.player].lines[loc.line],i=stack.indexOf(c);if(i<0)continue;stack.splice(i,1);if(mode==='return'){c.faceDown=false;G.players[c.owner].hand.push(c);}else sendToDiscard(c);}log(`${actual.length}枚を${mode==='return'?'手札に戻した':'削除した'}`);render();
  for(const [key,oldTop] of affected){const[p,l]=key.split(':').map(Number),top=topCard(p,l);if(top&&top!==oldTop&&!top.faceDown)await activateVisibleCard(top,{reason:'uncover',holder:p,line:l});}
}
async function inspectSecretCard(card,viewer){await showModal({title:'公開されたカード',sub:`${cardName(card)} / 値${card.value}`,body:`<div class="rules">${esc(cardText(card))}</div>`,buttons:[{label:'確認',value:true,className:'primary'}]});}
async function revealHandTo(viewer,target,title){
  await privacyGate(viewer,'相手の手札を確認します。');const body=`<div class="choicegrid">${G.players[target].hand.map(c=>`<div class="choice"><strong>${esc(cardName(c))}</strong><small>${esc(cardText(c))}</small></div>`).join('')||'<div class="sub">手札はありません。</div>'}</div>`;await showModal({title,sub:`${playerName(target)} の手札`,body,buttons:[{label:'確認した',value:true,className:'primary'}]});await privacyReturn(viewer);
}

async function resolveStartPhase(p){
  const cards=[...fieldCardsOf(p)];for(const card of cards){if(!cardLocation(card)||card.faceDown)continue;const key=`${card.protocol}:${card.value}`;
    if(key==='SPIRIT:1'&&isTop(card)){await announce(card,'SPIRIT 1','開始：手札を1枚捨て札にするか、このカードを反転させる。','開始効果');const choice=await choose('SPIRIT 1：開始','手札を1枚捨てるか、このカードを反転します。',[{title:'手札を1枚捨てる',value:'discard'},{title:'このカードを反転',value:'flip'}]);if(choice==='discard')await discardFromHand(p,1,{min:0,reason:'SPIRIT 1'});else await flipCard(card);}
    if(key==='DEATH:1'){await announce(card,'DEATH 1','開始：カードを1枚引くことができる。そうした場合、他のカードとこのカードを削除する。','開始効果');const yes=await confirmAsk('DEATH 1：開始','カードを1枚引き、他のカード1枚とこのカードを削除しますか？','実行する','しない');if(yes){await draw(p,1);const c=await chooseFieldCard('DEATH 1：他のカードを削除',c=>c!==card,{viewer:p});if(c)await deleteCard(c);if(cardLocation(card))await deleteCard(card);}}
    if(key==='PSYCHIC:1'&&isTop(card)){await announce(card,'PSYCHIC 1','開始：このカードを反転させる。','開始効果');await flipCard(card);}
  }
}
async function resolveEndPhase(p){
  const cards=[...fieldCardsOf(p)];for(const card of cards){if(!cardLocation(card)||card.faceDown)continue;const key=`${card.protocol}:${card.value}`;
    if(key==='LIFE:0'&&isCovered(card)){await announce(card,'LIFE 0','終了：このカードが覆われている場合、このカードを削除する。','終了効果');await deleteCard(card);}
    if(key==='PLAGUE:4'&&isTop(card)){await announce(card,'PLAGUE 4','終了：相手は自分の裏向きのカードを1枚削除する。','終了効果');const target=other(p);await privacyGate(target,'自分の裏向きカードを選択します。');const c=await chooseFieldCard('PLAGUE 4：自分の裏向きを削除',(c,z)=>z.player===target&&c.faceDown,{allowCancel:true,viewer:target});await privacyReturn(target);if(c)await deleteCard(c);if(cardLocation(card)&&await confirmAsk('PLAGUE 4','このカードを反転しますか？','反転する','そのまま'))await flipCard(card);}
    if(key==='LIGHT:1'&&isTop(card)){await announce(card,'LIGHT 1','終了：カードを1枚引く。','終了効果');await draw(p,1);}
    if(key==='FIRE:3'&&isTop(card)&&G.players[p].hand.length){await announce(card,'FIRE 3','終了：手札を1枚捨て札にできる。そうした場合、カードを1枚反転させる。','終了効果');const yes=await confirmAsk('FIRE 3：終了','手札を1枚捨て、カードを1枚反転しますか？','実行する','しない');if(yes&&await discardFromHand(p,1,{reason:'FIRE 3'})){const c=await chooseFieldCard('FIRE 3：カードを反転',()=>true,{viewer:p});if(c)await flipCard(c);}}
    if(key==='SPEED:3'&&isTop(card)){await announce(card,'SPEED 3','終了：自分のカードを1枚移動できる。そうした場合、このカードを反転させる。','終了効果');const yes=await confirmAsk('SPEED 3：終了','自分のカードを1枚移動し、このカードを反転しますか？','実行する','しない');if(yes){const c=await chooseFieldCard('SPEED 3：自分のカードを移動',(c,z)=>z.player===p,{viewer:p});if(c&&await moveCard(c)&&cardLocation(card))await flipCard(card);}}
    if(key==='PSYCHIC:4'&&isTop(card)){await announce(card,'PSYCHIC 4','終了：相手のカードを1枚戻すことができる。そうした場合、このカードを反転させる。','終了効果');const yes=await confirmAsk('PSYCHIC 4：終了','相手のカードを1枚戻し、このカードを反転しますか？','実行する','しない');if(yes){const c=await chooseFieldCard('PSYCHIC 4：相手のカードを戻す',(c,z)=>z.player===other(p),{viewer:p});if(c&&await returnCard(c)&&cardLocation(card))await flipCard(card);}}
  }
}
function updateControl(p){let wins=0;for(let l=0;l<3;l++)if(stackTotal(p,l)>stackTotal(other(p),l))wins++;if(wins>=2&&G.control!==p){G.control=p;log(`${playerName(p)} がCONTROLを取得`);announce('SPIRIT','CONTROL',`${playerName(p)} がCONTROLを取得。`,'コントロールフェイズ');fxBurst('SPIRIT',70);}render();}
async function compileLine(p,l){
  await controlReleaseAndOptionalReorder(p);const pr=G.players[p].protocols[l],recompile=pr.compiled;if(recompile){const stolen=G.players[other(p)].deck.pop();if(stolen){G.players[p].hand.push(stolen);log(`再コンパイル：${playerName(p)} が相手デッキ上を手札に加えた`);}else log('再コンパイル：相手デッキが空のため奪えなかった');}else{pr.compiled=true;log(`${playerName(p)} が${pr.name}をコンパイル`);}
  const flash=document.querySelectorAll('.stackrow')[p===G.current?1:0]?.children[l];if(flash){flash.classList.add('flash');setTimeout(()=>flash.classList.remove('flash'),700);}flashWhite();shakeScreen();fxBurst(pr.name,140);await announce(pr.name,`${pr.name} COMPILED`,recompile?'再コンパイル：相手デッキの一番上を手札に加える。':`${playerName(p)} がプロトコルのコンパイルに成功。`,'COMPILE','gold');
  const cards=[...G.players[0].lines[l],...G.players[1].lines[l]];const keep=[];
  for(const c of cards){if(!c.faceDown&&c.protocol==='SPEED'&&c.value===2){const loc=cardLocation(c);if(loc&&isCovered(c)){const yes=await confirmAsk('SPEED 2','コンパイルによる削除の代わりに、このカードを移動します。','移動する','削除する');if(yes&&await moveCard(c))keep.push(c);}}}
  for(let q=0;q<2;q++){const left=G.players[q].lines[l].filter(c=>!keep.includes(c));G.players[q].lines[l]=G.players[q].lines[l].filter(c=>keep.includes(c));for(const c of left)sendToDiscard(c);}render();
  if(G.players[p].protocols.every(x=>x.compiled)){G.winner=p;G.phase='gameover';render();await showModal({title:`${playerName(p)} WIN`,sub:'3つのプロトコルをすべてコンパイルしました。',body:'<div class="privacy"><div class="lock">◇</div><h3 class="winner">COMPILE COMPLETE</h3></div>',buttons:[{label:'新しいゲーム',value:'new',className:'primary'},{label:'盤面を見る',value:'view'}]}).then(v=>{if(v==='new')newGame();});return true;}return false;
}
async function resolveCompilePhase(p){
  const lines=eligibleCompileLines(p);if(!lines.length)return;
  const l=lines.length===1?lines[0]:await chooseLine('コンパイルするライン',lines);if(l!=null)await compileLine(p,l);
}
async function runTurn(){
  if(!G||G.winner!=null)return;stableState=false;G.busy=true;const p=G.current;G.players[p].noCompileThisTurn=!!G.players[p].noCompileNextTurn;G.players[p].noCompileNextTurn=false;
  G.phase='start';render();await sleep(160+240*SET.fx);await resolveStartPhase(p);
  G.phase='control';render();await sleep(160+240*SET.fx);updateControl(p);
  G.phase='compile';render();await sleep(160+240*SET.fx);await resolveCompilePhase(p);if(G.winner!=null)return;
  G.phase='action';G.busy=false;stableState=true;render();autosave();toast(`${playerName(p)}：アクションを選択`);
}
async function finishAction(){
  if(!G||G.winner!=null)return;stableState=false;G.busy=true;const p=G.current;
  G.phase='cache';render();if(!skipCache(p)&&G.players[p].hand.length>5){const n=G.players[p].hand.length-5;const cards=await chooseHandCards(p,{min:n,max:n,title:'キャッシュ確認：5枚まで捨てる'});await discardCardsFromHand(p,cards);}else if(skipCache(p))log('SPIRIT 0：キャッシュ確認を省略');
  G.phase='end';render();await resolveEndPhase(p);if(G.winner!=null)return;
  G.current=other(p);G.turn++;G.phase='handoff';G.busy=true;render();stableState=true;autosave();showHandoff();
}

function fxBurst(protocol,n=55,at=null){
  if(!SET.fx)return;
  const cv=$('#fx'),ctx=cv.getContext('2d'),dpr=devicePixelRatio||1;
  cv.width=innerWidth*dpr;cv.height=innerHeight*dpr;
  const cx=(at?at.x:innerWidth/2)*dpr,cy=(at?at.y:innerHeight/2)*dpr;
  const st=STYLE[protocol]||STYLE.SPIRIT,colors=[st.c[1],st.c[2],st.c[3],'#fff'],parts=[];
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1.6+Math.random()*5;
    parts.push({x:cx,y:cy,vx:Math.cos(a)*s*dpr,vy:Math.sin(a)*s*dpr,life:32+Math.random()*36,t:0,r:(1+Math.random()*2.6)*dpr,c:colors[i%colors.length],trail:Math.random()<.42});}
  const ring={t:0,life:24};
  function tick(){ctx.clearRect(0,0,cv.width,cv.height);ctx.globalCompositeOperation='lighter';let alive=false;
    if(ring.t++<ring.life){alive=true;const k=ring.t/ring.life;
      ctx.globalAlpha=(1-k)*.85;ctx.strokeStyle=st.c[3];ctx.lineWidth=Math.max(.5,(3-2.2*k))*dpr;
      ctx.beginPath();ctx.arc(cx,cy,(8+k*115)*dpr,0,7);ctx.stroke();
      ctx.globalAlpha=(1-k)*.35;ctx.beginPath();ctx.arc(cx,cy,(4+k*70)*dpr,0,7);ctx.stroke();}
    for(const p of parts){if(p.t++>=p.life)continue;alive=true;const px=p.x,py=p.y;
      p.x+=p.vx;p.y+=p.vy;p.vx*=.97;p.vy=p.vy*.97+.035*dpr;
      ctx.globalAlpha=1-p.t/p.life;
      if(p.trail){ctx.strokeStyle=p.c;ctx.lineWidth=p.r;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(p.x,p.y);ctx.stroke();}
      else{ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();}}
    ctx.globalAlpha=1;if(alive)requestAnimationFrame(tick);else ctx.clearRect(0,0,cv.width,cv.height);}
  if(!matchMedia('(prefers-reduced-motion: reduce)').matches)tick();}

function autosave(force=false){if(!G||(!stableState&&!force))return;try{localStorage.setItem('compile-hotseat-save',JSON.stringify(G));}catch(e){}}
function loadSave(){try{const s=localStorage.getItem('compile-hotseat-save');if(!s)return null;const g=JSON.parse(s);if(!g.players||g.players.length!==2)return null;return g;}catch(e){return null;}}

const draft={names:['PLAYER 1','PLAYER 2'],first:0,pool:[],picks:[[],[]],step:0,schedule:[]};
function renderWelcome(){const save=loadSave();$('#setupBox').innerHTML=`<h1>COMPILE</h1><div class="kicker">HOTSEAT // SINGLE HTML EDITION</div><p>同一端末で2人対戦するデジタル版です。6つの候補から3プロトコルずつドラフトし、先に3つすべてをコンパイルしてください。</p><div class="setupform"><label>PLAYER 1<input id="name0" maxlength="18" value="PLAYER 1"></label><label>PLAYER 2<input id="name1" maxlength="18" value="PLAYER 2"></label></div><div class="setupactions"><button class="primary" id="startDraft">ドラフト開始</button><button id="quickStart">クイックスタート</button>${save?'<button id="continueGame">保存データを続ける</button>':''}</div>`;$('#startDraft').onclick=()=>startDraft(false);$('#quickStart').onclick=()=>startDraft(true);if(save)$('#continueGame').onclick=()=>{G=save;G.busy=true;$('#setup').classList.add('hidden');render();showHandoff();};}
function startDraft(quick){draft.names=[$('#name0').value.trim()||'PLAYER 1',$('#name1').value.trim()||'PLAYER 2'];draft.first=Math.random()<.5?0:1;draft.pool=shuffle([...PROTOCOLS]).slice(0,6);draft.picks=[[],[]];draft.step=0;draft.schedule=[draft.first,other(draft.first),other(draft.first),draft.first,draft.first,other(draft.first)];if(quick){for(let i=0;i<6;i++)draft.picks[draft.schedule[i]].push(draft.pool[i]);startArrange(0);return;}renderDraft();}
function renderDraft(){const picker=draft.schedule[draft.step];$('#setupBox').innerHTML=`<h1 style="font-size:38px">PROTOCOL DRAFT</h1><div class="draftinfo">先攻：<b>${esc(draft.names[draft.first])}</b><br>現在の選択：<b>${esc(draft.names[picker])}</b>（${draft.step+1}/6）</div><div class="draftgrid" id="draftGrid"></div><div class="pickedrow"><div class="picked"><h4>${esc(draft.names[0])}</h4><div class="pills">${draft.picks[0].map(x=>`<span class="pill">${x}</span>`).join('')}</div></div><div class="picked"><h4>${esc(draft.names[1])}</h4><div class="pills">${draft.picks[1].map(x=>`<span class="pill">${x}</span>`).join('')}</div></div></div>`;const grid=$('#draftGrid');draft.pool.forEach(p=>{const b=document.createElement('button');b.className='choice protochoice';b.style.setProperty('--glow',STYLE[p].c[3]);b.innerHTML=`<strong>${p}</strong><small>${Object.values(DB[p]).map(x=>x.m).filter(Boolean).slice(0,2).join(' / ')}</small>`;b.onclick=()=>{draft.picks[picker].push(p);draft.pool.splice(draft.pool.indexOf(p),1);draft.step++;if(draft.step>=6)startArrange(0);else renderDraft();};grid.appendChild(b);});}
function startArrange(p){const arr=draft.picks[p];$('#setupBox').innerHTML=`<h1 style="font-size:38px">LINE ORDER</h1><p><b>${esc(draft.names[p])}</b> のプロトコル配置を決めます。</p><div class="arrange" id="setupArrange"></div><div class="setupactions"><button class="primary" id="arrangeDone">配置決定</button></div>`;const holder=$('#setupArrange');const renderA=()=>{holder.innerHTML='';arr.forEach((name,i)=>{const d=document.createElement('div');d.className='arrcard';setPal(d,name);d.innerHTML=`<span>LINE ${i+1}</span><strong>${name}</strong><div class="arrows"></div>`;const a=d.querySelector('.arrows');for(const[txt,di]of[['←',-1],['→',1]]){const b=document.createElement('button');b.textContent=txt;b.disabled=i+di<0||i+di>=arr.length;b.onclick=()=>{[arr[i],arr[i+di]]=[arr[i+di],arr[i]];renderA();};a.appendChild(b);}holder.appendChild(d);});};renderA();$('#arrangeDone').onclick=()=>{if(p===0)startArrange(1);else finishSetup();};}
function finishSetup(){G={version:1,turn:1,current:draft.first,first:draft.first,phase:'handoff',control:null,winner:null,busy:true,log:[],players:[0,1].map(p=>({name:draft.names[p],protocols:draft.picks[p].map(name=>({name,compiled:false})),deck:[],hand:[],discard:[],lines:[[],[],[]],noCompileNextTurn:false,noCompileThisTurn:false}))};for(let p=0;p<2;p++){G.players[p].deck=buildDeck(p,G.players[p].protocols);for(let i=0;i<5;i++)G.players[p].hand.push(G.players[p].deck.pop());}log(`先攻は${playerName(G.first)}`);stableState=true;autosave(true);$('#setup').classList.add('hidden');render();showHandoff();}

renderWelcome();
</script>

.fchex{width:38px;flex:0 0 auto;margin-top:2px;filter:drop-shadow(0 0 5px rgba(255,255,255,.4));}
.fcboxes{flex:1;display:flex;flex-direction:column;gap:7px;padding:10px 13px 4px;}
.fbox{position:relative;flex:1;border:1px solid rgba(255,255,255,.46);background:var(--panel);

.fbox::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}

.fbox.dead{opacity:.34;}
.fbox p{margin:0;}
.fcfoot{display:flex;justify-content:space-between;padding:2px 14px 10px;

/* card back */

.fc.cback .cbgrid{position:absolute;inset:10px;border:1px solid rgba(170,150,255,.35);}
.fc.cback .cbgrid::before{content:"";position:absolute;inset:5px;border:1px dashed rgba(170,150,255,.18);}

.fc.cback .cbhex{width:84px;filter:drop-shadow(0 0 16px rgba(140,120,255,.55));}
.cblogo{font-size:24px;letter-spacing:.3em;text-indent:.3em;color:#e9e4ff;text-shadow:0 0 16px rgba(150,130,255,.8);}
.fc.cback .cbsub{font:600 7.5px var(--fm);letter-spacing:.44em;text-indent:.44em;color:rgba(210,200,255,.5);}
.fdv2{position:absolute;top:12px;right:14px;z-index:3;font:900 17px var(--fm);color:#cfc4ff;

/* ---- announce cut-in ---- */
.announce .abox2{position:relative;width:min(92vw,520px);overflow:hidden;
  border:1px solid var(--ac,#c9a2ff);

.abox2 .aart{position:absolute;inset:0;background-size:cover;background-position:50% 35%;filter:saturate(1.15);}
.abox2 .ascrim{position:absolute;inset:0;background:linear-gradient(100deg,rgba(6,7,12,.94) 22%,rgba(6,7,12,.72) 55%,rgba(6,7,12,.9));}
.abox2 .acnt{position:relative;padding:15px 30px 16px;text-align:center;}
.abox2 .atag2{font:700 8.5px var(--fm);letter-spacing:.46em;text-indent:.46em;color:var(--ac,#c9a2ff);
  text-shadow:0 0 10px rgba(0,0,0,.9);}
.abox2 .aname2{font-size:26px;letter-spacing:.08em;margin:5px 0 4px;filter:drop-shadow(0 0 14px rgba(0,0,0,.7));}
.abox2 .atext2{font-size:11.5px;line-height:1.65;color:#e8eaf2;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.9);}
.abox2 .acorn{position:absolute;width:14px;height:14px;border-style:solid;border-color:var(--ac,#c9a2ff);}

.abox2 .acorn.br{bottom:4px;right:4px;border-width:0 2px 2px 0;}
.announce.gold .abox2{border-color:var(--gold);box-shadow:0 0 50px rgba(232,201,106,.4),0 26px 60px rgba(0,0,0,.7);}
.announce.gold .aname2{font-size:30px;color:var(--gold);-webkit-text-fill-color:currentColor;}
.announce.gold .atag2{color:var(--gold);}
/* ---- event ticker ---- */
.chip{font-size:9.5px;color:#e2e5ee;background:rgba(9,11,17,.94);
  border-right:2px solid #7fd8f8;padding:4px 10px;box-shadow:0 6px 16px rgba(0,0,0,.5);}
/* ---- control hex ---- */
.ctrl{width:96px;height:32px;background:linear-gradient(120deg,#181c2c,#232a44,#181c2c);

.ctrl.opp{box-shadow:0 0 16px rgba(255,110,110,.5);border-color:#ff9a9a;color:#ffd9d9;}
.ctrl.mine{box-shadow:0 0 16px rgba(120,255,180,.5);border-color:#8af0b0;color:#d2ffe4;}
.ctrl-lbl{font:600 8px var(--fm);letter-spacing:.2em;color:#79809a;}
/* ---- phase / actions ---- */
.phase span{font:600 8px var(--fm);letter-spacing:.1em;padding:3px 7px;color:#6d7389;border:1px solid #2c3040;}
.phase span.done{color:#9aa0b6;border-color:#464c60;}
.phase span.now{color:#0d0e12;background:var(--gold);border-color:var(--gold);font-weight:900;

.actions button{font-size:10px;font-weight:700;letter-spacing:.08em;color:#e8ebf5;

.actions button.primary{color:#0d0e12;background:var(--gold);border-color:var(--gold);
